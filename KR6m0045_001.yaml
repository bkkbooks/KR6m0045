body:
  text: 五臺大萬聖祐國寺開山住持釋源大白馬寺宗主贈邽國公海印開法真覺大師長講沙門文才述將釋茲疏啟以二門初敘論詮旨後隨釋疏義初者梵云阿毗達摩此云無比法謂詮慧最勝故又翻對法對有二義一者對觀觀于四諦二者對向向于涅槃觀則剋聖向則剋滅能對之體即無漏淨慧所對之法即四諦涅槃是法之對慧為主故問佛說三藏皆聖教攝高僧述作何以與去聲焉答從乎本故謂此論義本亦佛說散在方廣分中論主依經作之至簡至要以攝第一中道理智引攝上根樂略之機此則唯在成立佛說與摩訶衍中甚深性理平等一乘而相應故亦得阿毗達摩聖教攝也如佛世迦多演尼舍利弗等造發智論集異門足論等皆攝屬論藏故然論通大小此論唯大大通權實唯實非權五教之中唯一乘終教攝也五宗之中理事無礙宗也何者以四論之中皆辨非有非無中道之理故如下云不釋動以求靜又云即萬物之自虗等亦兼頓說下云目對真而不覺又云觸事而真等此同起信真如門說諸法差別唯依妄念若離心念則法法皆真皆如矣以賢首大師判真如門為頓教分齊故故論之終始極一乘之窈渺盡性理之精深羅有包空開權示實出不遷之理即流動以明宗發不真之談依諦門而演䆳說般若無見無知之旨盡玄中之玄明涅槃不出不在之心極妙中之妙故遺民以謂浴心方等之淵悟懷絕冥之肆不為過也其文則含英綜花敲商擊羽依理而起因質而生非惠施之談虗何晏之尚無所能彷彿也可謂彬彬葱葱談之口則𮌉美梁馨擲之地則金聲玉振如遺民歎曰理微辭險唱獨應稀可謂知言矣後隨釋疏義分三初釋論題目肇即等者謂論主以徹法英悟之智逗機善巧之辨假聲名句文示中道之理令物獲一乘平等之益故作論也人法下准清涼鈔通辨諸經得名之式或以人為目或以法為名約因約果乍複乍單等不同今以二字成題即人法也以四下出立名所以詳梁傳什公出大品之後師著無知論次著不真空等二論什公亡後始著涅槃無名論其次如是今不爾者以意求之葢論主作宗本時大約題中之義排次也謂初示不遷之理次彰第一義真依般若之神心照涅槃之妙境涅槃是三乘究竟之所歸故最後也然非作者之本意且順次敘之又各宗一義者各隨論名是所宗也但實教了義經論中談諸法無生無滅之理皆不遷論所宗乃至談涅槃之旨亦無名論宗之欲合下合四為一不可題中併置四名復作等者葢宗本一章最後作之冠於論初攝四為一也宗釋皆屬者宗即宗本釋即四論此四但演宗中之意宗則略示綱要如起信立義分釋則廣陳理義如彼解釋分而言論者疏略起信疏釋之具云論者建立決了可軌文言判說甚深法相道理依決判義名之為論又論者集法議論也謂假立賓主往復徵析論量正理故名為論往復謂問答也徵謂徵索析謂分析如逐論徵釋及無知無名二論各九次問答是也示物修悟者作論本意故欲令眾生悟理修觀息妄顯真證諸法實相不為文字事業也然有二種者准龍樹末論說馬鳴大士宗百本了義經以作起信唯識亦宗六經等釋論如智度之釋大品地論之解十地等此是宗經攝義之論也疏大秦者即國朝之名當東晉穆帝以來二秦相繼而出前秦符姓後秦姚姓二姓皆秦故史官以前後字別之非自號前後也徤蒲洪之子洪改姓符氏西羗人也洪為趙將麻秋鳩死徤受父命據關內即天王位葢亟谷以西皆號關中堅即東海王雄之子也徤死太子符生繼立生殘虐不道堅殺之自立末年者即建元二十五年堅率兵八十七萬以伐晉至壽春為晉將謝玄所敗歸長安慕容冲姚萇等皆叛之冲圍長安堅力戰不解乃北走五將山復為萇圍之遂執堅縊於新平佛寺今豳州也萇即姚仲弋之子也亦西羗人殺堅自立萇薨子興立改元弘始凡十九年長安縣名也如來姓者釋迦譜引彌沙塞云過去有王名摩有庶子四人一名昭目二名聦目三名調伏象四名尼樓聦明神武有大威德第一夫人有子名長生頑薄醜陋眾人所賤夫人恐國位為四子所有乃以嫵媚要王王喜遂譖四子出國時四子之母并親屬諸力士人民等見四子無罪被黜皆樂隨之王亦聽去於是至雪山北得遐逈曠大之地居數年歸德如市為強國王後思見召之四子辭過不還王歎曰我子釋迦因名釋種種亦姓也釋迦翻能也自尼樓有子名鳥頭羅羅子名瞿頭羅子尸休羅子即智論師子頰王也王四子一曰淨淨子即佛也得姓至佛凡六世矣安公等者即東晉武帝世人事業如梁傳安公已前出家者皆從師姓如竺道潛弟子竺法義等是也安以大師之本莫尊於佛乃以釋命氏當時或從或不及建元二十年三藏曇摩蘭提譯出增一阿含彼經第二十一略云今有四大河水從阿耨達泉出各隨其方入於四海無復本名此亦如是剎利婆羅門長者居士種於如來所剃除鬚髮出家學道無復本姓但言沙門釋迦弟子既懸與經符遂為永式叶合也迄至也本傳乃梁代會稽嘉祥寺慧皎法師作高僧傳論主居義解科傳略云京兆人家貧傭書為業因繕寫遂歷觀經史云云栖神等者栖止栖也神謂神妙之心也冥猶寂也累謂生死猶未盡善者謂未究竟也予亦忝讀莊老之書大秪所宗虗無自然杳冥昏默之道自此降冲和元氣生天生地神鬼神帝生物之用或似不盈其修之之方必倣于道內則谷神守靜挫銳解紛外則和光同塵不矜不恃如莊子說廣成子授黃帝之道曰夫至道之精杳杳冥冥至道之極昏昏默默此談道也下明修云無視無聽抱神以靜必清必淨無勞汝形無搖爾精乃可以長生又云我守其一以處其和故我修身千二百歲吾形未甞衰釋曰守一守前道也處和與物不競也不競則生全守一則道成此莊老大旨也據此未當吾宗擇滅無為假令得之無知無覺淪於太虗而已至于般若神心涅槃妙有依正自在相用圓明寂照同源力通無礙彼何與焉故論主斥其未盡善也不為激過故冲云放辭莫怪譏莊老未入如來數仞墻舊維摩者即漢末支謙所譯方等者謂方正平等即方廣分也三藏即小乘教諸師多憑智論呼小乘為三藏教法華亦云不得親近小乘三藏學者姑臧今西涼也論主聞之越二千里之遠而從之受學什亦賞其神明大器歎之不盡逍遙園者者本國家園苑以施什公為翻經之舘疏辭皆本傳之文具如傳作猶等者隨義訓也以聖人創制名作賢人祖之名述中庸云父作之子述之孔子亦自謂述而不作等今法師之論但祖述經論之義就文亦可云作也疏所崇者崇謂中心宗尚崇尚亦尊也主也然通能所所宗者即此宗本一章也即實相之一心者什公以實相為宗故不遷等法皆實相也實相該通理事不二為一心也吳僧淨源註釋此論號中吳集初解宗本義立一心為宗疏引全是彼文雖殊等者以一心全現諸法法法皆心妄心分別似有起滅若離心念則無去來差別之相非不遷而何次即心所現有而非真非真則其性自空若此亦非有法亦非無法真俗莫覊空色一致觸物而一第一真也般若為心不須會釋涅槃之理均天人同一異總六合以鏡心一去來以成體一心之義亦昭然無惑故知四論皆述一心之義且心即如來藏恒沙佛法並蘊其中矧四法邪若心外談法便同外道別者下如不遷論以不遷為宗等非一心下一心為總相四乃別相攬別為總離別無總開總成別離總無別故一心攝四法而無遺四法示一心而有在義謂義理等者如下四論之中通取其義皆一心法上之義別取其義如不遷一論唯不遷之義餘三例之凡解義理要在徹法法義無分曷為精照故圭峯云今時聽學之人但求文義不尋法體亦不原此義是何法上之義據此下約能詮以明之以宗本之義略與四論張本但有統冠之功而無委示之實四論反之可知以法為本下作釋也初二皆持業後一依主義為能顯法是所顯不言章者尚義而不文也疏此五名下放光有本無品般若鈔經亦有本無品餘之四名經論中標相不須引明義雖等者如下隨名略釋可知前四理也緣會事也所以相躡而解者以論中排名本無居初釋義本無居後故為此釋緣前元無者以下論云未生無有故若約法由緣生無自性性雖今現有有亦即空因緣性殊各亦不生共亦不生故諸法本無也鈔經略云如諸法本無怛薩阿竭亦本無等無相等者謂本無之性遠離男女根塵有無一異等差別之相以凡所有相皆是虗妄故即此等者法為事法事法無性唯以實相為性也此性真空者實性之中無妄染等諸相名空非混茫斷滅之空也復由等者謂依法顯理如指波談水依釧說金理從於事無理非事事自緣生故云緣會依俗諦理因緣和合共生諸法也或名下會異名可知杜順下總證法界觀文疏義依等者顯猶明也謂依法顯義依義識法今云一義亦一體一義也餘辭可解此中下乃依賢首大師起信疏解非一非異之義釋也本謂本無等理末謂緣會之事唯末非本即事能隱理門唯緣會而非實相唯本非末即以理奪事門唯實相而非緣會也若本末下以理事一體不可分其際限如全水是波舉器渾金誰能際限設使鵞王有擇乳之能不能擇乎波水之殊也尤甚也然此三義亦正要第三非前二義亦不能成立第三之義故具彰之若對等者會釋為不遷論之宗可知疏徵也者徵五名一義之所以也疏若色若心者色心該於染淨等一切諸法故如是諸法皆藉因緣會合而起因無獨力能生而有共力能生之義緣亦如此此約俗諦說有生義也故唐譯楞伽第二云但隨世俗故而說有生滅依此世俗而入第一真諦如下性空實相等疏因緣是因等者因緣之因望緣為親生之因如穀芽從穀種生眼識從識種子生等因果之因對果明因生法之因因緣皆是其因也因無下釋未生無有也謂一切法既由緣會方生應知未會諸法元無未會有法故無是處謂道理不相應也後句等者且以比智推窮諸法既自緣會而生四相遷謝緣離之時法當滅謝也故馬勝云諸法從緣生緣離法還滅疏真謂等者謂法既緣生不能自起若生若滅皆在於緣緣起之相非真有也法若真有應不待緣亦無已生亦無當滅所引即不真空論及中觀第四卷文疏即末顯本等者緣生現有之法末也性空之理本也豈待下謂即會即離因緣性空第一義中無合無散故其性本然楞嚴經文謂諸法之性本來空寂清涼者即有唐德宗賜號也故裴公休云能以聖法清涼朕心因賜清涼國師之號觀乎志行凜凜拔萃離羣為帝王師殆聖人也大慧杲公呼為聖師如彼正法眼說之所引即懸談鈔辭疏真空下謂法無自性唯以真空為性耳如波以水為性疏如是等者謂此性空之中無色無受想行識乃至一切世出世法因緣所起亦非有相亦非無相離此諸相名實相也疏緣集下問論中但釋實相自無疏中何以依緣生解邪答由一義故如前本無中說如鏡等者約喻顯法也鏡中之像谷中之響亦待緣而起性相元空推斥者謂推排毀斥之豈待下亦不真空文大論十八云一切諸法性常自空不以智慧方便觀故空等此揀下謂小乘不識體空之理假以慧分折色法至極微邊始見空理大乘體會色心因緣所生即有即空也列名等者原究論中列名釋名之義說有前後法必同時五名故非一義故非異疏諸經論等者放光第七云十二緣起所有亦無作者六波羅蜜所有亦無作者以是因緣諸法亦不有亦不無謂有無下以諸法緣起故有性空故無同時故亦有亦無互奪故非有非無而此四句下論具有引文恐繁又約破計者智論六十五云有人說諸法有四種相一者說有二者說無三者說亦有亦無四者說非有非無是中邪憶念著此四法名為邪道是中正憶念故不著此四名為正道遣謗者謂計諸法是有墮增益謗故破云非有計諸法是無墮損減謗故破云非無又計諸法非有非無墮戲論謗故破云非非有非非無又計諸法亦有亦無墮相違謗故破云非亦有亦無由第三句轉有此計謂聞前非非有計云非謂是非有言有也聞前非非無計云非謂是非無言無也今云為汝計非有非無故破云非非有非非無誰云非非有是有非非無是無故云非亦有亦無此釋并出句與起信疏大同小異為順四謗故苟理有所通則可所以下偏牒此句之所以也為明遣二見等至下論自知然細詳四論皆此句中抽出方信義句句含無邊故金剛三昧經云我所說者義語非文眾生說者文語非義誠哉是言也疏初約下佛性論天親所造解如來藏經成立一乘佛性之義一切諸見者謂斷常一異等前之四句亦成四見因有無起故多在外道所引全是論文文亦易見今隨難釋之一切無因等者不知前世修因感今世果今世立因復招來報撥排弃也不信之謂此同莊老自然而然也故莊子談風云蓬蓬然起於北海而入於南海也孰主張是孰吹噓是言自然也斷見等者謂信唯有現在五蘊等法更無來報相續此同儒宗計有一身不談他世如舜典曰帝乃殂落解者曰殂往也言堯之魂往天也落者言堯之魄落地也故唐李思慎論云死則歸復天地不續不存准此下若以兩句相對釋之因有生常因邪生斷然邪斷二見皆無見也故依佛性論解之經中下會歸不有不無可知疏相因者因猶待也疏釋取楞伽密嚴之義釋之楞伽云大慧兔角亦爾觀待牛角言彼角無密嚴者彼經第二卷初偈頌中文後引密嚴亦次前之偈文易可了偉哉下結歎善巧也前後三次釋不有不無各有經據委曲窮盡聖經之妙也疏約觀行釋等者意云二執既去二見又亡法非有無正解現前依解造修實相可會有解無行譬有目無足遙觀寶所無能至也故華嚴問明品云如人設美膳自餓而不食於法不修行多聞亦如是若有行無解如盲者適遠不免阬穽之患故論主於此示觀行也何以知之以論云觀法不存無觀有不取相非觀行而何但論旨隱微不露頭面說者麤心相背遠矣法即等者法雖通於一切今據行說且屬三學等為法也據疏法通善惡順理之善三學六度等逆理之惡五逆十惡等今以善惡之法對而釋之若云諸法緣生其性本空善惡之行應皆無果今觀法雖無不取於無惡雖空而須斷善雖空而須修故淨名云無我無造無受者善惡之業亦不亡此則觀空不取心無所係一切法中見實相也不取相下大意云於法心生取著雖修三學止觀等行生滅之心不能忘相何由契真由非下不取於有也則終日行於有中未嘗住相建功立德舉善無遺皆與實相符合矣故大論十五云佛法實相非有非無不受不著釋云若受若著不合實也靡無也餘辭可解此中等者今略釋之初句空觀觀不存空體真止也是謂下有觀不取有相即方便隨緣止也若雙取二句中止觀觀無而不存無即無而有觀有而不取相即有而無是謂有無齊觀離二邊分別止也廣如天台止觀及華嚴教迹等說涅槃第二十卷中定慧捨三大意配之定如止慧如觀定慧平等名捨捨如此中中道止觀但此論兼於心境止觀定慧約心也然行相尤多理悟玄妙修心之侶不可不學也彼經第三十三十一中廣說今示大槩云善男子十住菩薩智慧力多三昧力少是故不能明見佛性聲聞緣覺三昧力多智慧力少以是因緣不見佛性諸佛世尊定慧等故明見佛性了了無礙又云奢摩他者名曰寂靜即定也毗婆奢那名為正見即慧也優畢叉者名曰平等即捨也捨即中道止觀上三義等者釋不有不無名也問前之二釋俱離二過有何別目答初離斷常二見此二因有無二見轉生起也故中論第三云定有則著常定無則著斷等第二但祛有無二種邊見所以不同詳論可了非強穿鑿疏聖人者依起信論中住已去斷執取計名少分而見法身亦名聖人賢首教義中引梁攝論十解已去名曰聖人若法相宗登初地時得無分別之智方名聖人論稱聖人通因及果然地前下依起信論會也准彼論修行信心分中依未入正定聚眾生說此修行信心分彼論以十住已上入正定聚十信位中為不定聚彼自有五行第五名止觀門故彼論云若修止者住於靜處端坐正意一切諸想隨念皆除乃至云久修淳熟其心得住漸漸猛利隨順得入真如三昧等性宗下學性宗修行人也雖具足煩惱繫縛之人若曾夙生於此宗中有見聞熏習之力此生必聦明英哲成圓解法器於此無住行中亦可留心而修也問何以論舉聖人也答今舉等規模軌式也疏等謂下謂性空是一三乘觀之各隨其器得果差別聲聞觀之得聲聞菩提等所以下恐不了者見三乘小大之差謂實相亦異此義至涅槃論中自曉不繁預解而不知下約性宗新熏義釋也大鈔第五云謂眾生遇緣熏習三乘種性及不定無性故有五耳何者若唯習近聲聞成聲聞定性習近緣覺成緣覺定性習近菩薩則成菩薩定性若俱習近三乘則成不定性人若都不習近三乘則成無性卒難教化故知熏習成五種性本有則無二疏正邪等者如修淨土觀雖兼修兜率亦為邪也以心用雜想害往生故今以實相為正觀則一切事相之相皆邪大論者即智論彼第五云復次除諸法實相餘殘一切盡名為魔文多不引疏此有二說等者三乘中二乘即般若等被學法空者以二乘修無常苦空無我等觀未達性空實相之理滯於末四倒中不能證自乘果道也此謂小果亦要見空二則可知今此下謂三藏教中所被者不達法空謂之愚法餘可解大疏等者彼疏判教中說宋朝劉虬居士及道場慧觀法師於漸教中開成五時之教第一有相教謂觀有得道清涼疏妨云自違成實彼論云我今等在疏意謂愚法亦觀性空而證也以生空等者然性空之中無我無法眾生妄計執之為有小乘但了蘊中無我見一分理若了我法俱空性空全現此則單雙在人非性空有異也疏所趨下趨向也器有下釋大小之異也通有五對大乘器廣謂發大心行大行等小乘器狹心行等皆劣可知小乘生空般若為淺大乘雙空般若為深小乘羊鹿之車唯堪自運大乘牛車力能兼他任重致遠若大由小起名曰迂不由小起名曰直小乘唯證單空之理大乘深證雙空略釋如此若約二執二障摭諸教理細細出之實為煩黷疏雙牒等者此二名諸經皆有不必的引智論下彼云摩訶秦言大般若秦言慧然慧即智慧不同法相因中名慧果中名智故大論問曰何者是智慧答曰般若波羅蜜攝一切智慧故又四十三中譯為智慧故漚和者放光經云漚和拘舍羅具足梵語也一念下釋大義也一念之中權實雙流照二諦無二之境中道之慧方為大慧應云大智慧就句穩順而言大慧也以此推之雙空之慧尚未為大以真俗別照不能一念兼之況二乘生空邪故疏云爾頴秀也亦出也餘可知疏初二句下有本云諸法實相殊失正理實相雖通般若詳論義目性空之理如下云般若之門觀空等以實相該於理智今以智為能見理為所見由見性空實相之理故成般若下論云萬法雖實非照不得內外相與以成其照功等若以實相即般若復欲證誰邪亦對下方便之文勢亦差異可細求之後二句下由一念兩具所以觀空不形容於證也非智先悲後復引令不滯於寂也出二乘者以彼厭棄有餘入無餘界永沉不起故下疏暗引楞伽及出現兩經皆明二乘躭滅也楞伽第三云三昧酒所醉住於無漏界彼非究竟趣亦復不退轉以得三昧身乃至劫不覺譬如昏醉人酒消然後悟聲聞亦如是覺後當成佛出現品云佛子如來智慧大藥王樹唯除二處不能為作生長利益所謂二乘墮於無為廣大深坑等淨名云下具釋疏亦初下細詳經論之意方便有二種一離相二化生此以大悲利物為方便後二下謂處生死界廣行化利亦不為塵欲所染者以即悲之智無緣之慈了生界空度而無度所以不見染也若以離相為方便亦可悲智互為方便也淨名下經文頗多略云以愛見心莊嚴佛土成就眾生於空無相無作法中自調而伏是名無方便慧縛釋曰此以植眾德本為慧依愛見心中修之不能妄想故成縛也經云不以愛見心莊嚴佛土等名有方便慧解云云又復觀身無常苦空無我是名為慧雖身有疾常在生死饒益一切而不厭倦是名方便等釋曰前則離相名方便此則化生名方便論取化生也以無慧等者愛謂悲愛見謂取著謂緣眾生界如己如親見有可化不唯化有疲厭翻為見網所累沒謂沉沒生死界如林故不了法緣無緣故成有相之悲也欲謂貪欲坌污淨心名塵此之五塵是凡夫所欲之境疏涅槃為空者為對生死為有故也然空有多門隨宗各異今順論意故云爾爾後四句下前二句成前不染塵累後二句成前能不形證也二智雙融者由無二體一念具故空有無二者緣生無性即是涅槃無性緣生即為生死但有二義殊無二體故法界無差別論云眾生界清淨應知即法身法身即涅槃涅槃即如來瞥然者說文曰暫見也今取一念少時之義謂菩薩見色莫非見空如良庖見牛目無全牛下句反此者解不厭有等之言也如觀空時空即是色以不離色何甞瞥然而滯空邪符合也資藉也助也性宗修行之人初學是法須悲公平等成無住之行苟偏一行即沒凡小引喻可知由空門下不修理行無以剪生死之稠林游涅槃之妙苑不修事行無以嚴清淨之佛土盡染染之眾生然理下謂理量智量生死涅槃義釋如前疏念謂等者釋念二義一具慧之念名為慧念非念是慧也二者極少一念謂瞥然心起亦名一念事智名權與物推移唯宜是從故權有逆順隱顯等殊如涅槃說殺邪見婆羅門逆也權也大悲海雲經仙人不食兔兒施身之肉赴火而死順也常也儒者以權為反經合道如孟子男女授受不親禮之常也嫂溺援之以手義之權也內教齋戒守信死而不犯常也大乘之戒成益即開權也今謂涉有利生宜小宜大宜顯宜密萬變千化不可一准故名權智理智名實照實相之理而無虗妄分別故歎其智妙者以一念中二智無違齊觀二諦幽深之理非口舌能狀唯力用其功者久之自倣爾故下勉云好思疏華梵者華謂中華即此界神州大夏也滅與盡理亦相近累盡名滅諦謂審諦亦實也謂苦實苦等疏結使者正取諸惑我法二執下所有種現俱為集諦亦兼取諸業增長生死名集解理者理治也疏苦諦者有漏色心逼迫名苦一煩惱二業繫三生死此三染事聚之一身故云雜也三障如下釋之今約治道等者治謂修治此三治之已盡故若別說下依起信釋也論廣略云十信凡夫覺知前念起惡故能止後念令其不起是信位能滅也惑有下根本惑即迷理而起如論云不如實知真如法一故圭峰略鈔釋云不無也覺明也即根本無明枝末下即迷事而起然疏釋大略論具云復次依不覺故生三種相與彼不覺相應不離三相即業相轉相現相也不覺即三相中無明也此惑方是枝末不覺也三相即名三細四麤者一智相二相續相三執取相四計名字相釋義如彼生死亦二者界內生死名為分段分謂分限或延或促有分齊故段謂形段或長或短有定量故此則六道生死皆分段也界外生死名曰變易變轉也轉麤身為細質故易改也改短壽作長年故此則三乘生死皆變易也廣釋如別自地前下即彼論生滅相中之文論云麤中之麤凡夫境界彼疏云三賢位名內凡能覺此染故染體即執取計名字我執也又下論云不了一法界義者從信相應地觀察學斷等自見道等者疏亦大略為見道中斷法執分別相續相出見已去乃至七地滿心斷法執俱生智相也此二種惑俱名麤中之細亦曰事識之惑斷此惑盡分段亡也自八地等者十地究竟名為盡地謂八地中斷現相入九地斷見相十地窮至佛地始斷業相爾時黎邪行苦變易生死盡也前二細中之麤菩薩所知境界後一細中之細是佛境界餘文可知疏涅槃等者若別有處應有邊際有際則無常也小乘下世謂三世時世即有為諸相間謂中間謂三界有漏墮在其間四相遷滅三世流轉此釋該情非情一切法也若唯約正報說者五蘊始行名生五蘊散滅名死涅槃出世可知以二乘厭世間生死忻出世涅槃故大乘可了豈別等者界內界外方域也惑能下惑性智性無二性故仁王經云菩薩未成佛以菩提為煩惱菩薩成佛時以煩惱為菩提煩惱之相須斷其性無二即般若也故云惑盡等業能下業能繫果不自在故名不解脫業謝報亡了無繫縛名之解脫故解脫者自在為義苦能下二種生死之苦能障法身真樂二死既其謝滅則法身之樂自顯即以無苦為樂無別樂矣故此等者言三障三德敵體相對翻染成淨故知三染即三德之詮門也既依染門詮示若無三染亦無三德自相可說何容更有一盡處爾又三德下亦依涅槃釋彼經第二云何等名為秘密之藏猶如伊字三點若並則不成伊縱亦不成如摩醯首羅面上三目乃得成伊三點若別亦不得成我亦如是解脫之法亦非涅槃如來之身亦非涅槃摩訶般若亦非涅槃三法各異亦非涅槃我今安住如是三法為眾生故名入涅槃如世伊字釋曰出現鈔略云並乃合為一體別乃各居一處竪明此三曰縱謂法身本有次修般若後得解脫等四德者常樂我淨也至本論釋之恒沙義備者不唯三德四德也故起信略云所謂自體有大智慧光明義故乃至具足如是過於恒沙不離不斷不異不思議佛法等一心融拂者謂上三法一心融之無有差別之相等同一味一心三相曰融三相一心曰拂既融既拂相不可得名何名焉尤可下可解疏物即緣會等者此論亦宗諸般若智論中論等作也如下所引可見物謂萬物諸法之總名染謂染分依他如大品所列五陰十二入十八界等淨謂淨分依他亦如大品所列十力四無所畏乃至十八不共法薩雲若等古今等者亦攝一切之時也以下論說寒暑古今等故若唯約人事明之則生死去來動靜遲速長幼逆順是非彼此得喪窮通壽夭貧富貴賤高低等應世諦所攝皆物也以內修言之則行願因果地位等然前後兼以論宗般若只可依經說諸法也不遷等者依宗中指之可知以緣生等者釋成不遷之理也以一義故即一而弗化也故宗鏡云大乘之法緣生無性生即不生滅即不滅故遷即不遷也今約下論亦兼有頓教之說也初終教者以此教說一切眾生成佛之義極盡大乘之理故亦名實教詮如藏性中實之道故隨緣下謂隨染緣則有世間諸法隨淨緣則有出世諸法遷即不遷者非遷外說不遷也初門以理在乎事中故隨事而遷也以理有隨緣義故起信云謂如來藏不生不滅與生滅和合即隨緣義乃至成阿黎邪識此識之相生滅即藏性生滅以識相是真妄和合成故具非異義故引楞伽即唐譯第五卷中文具云如來藏受苦樂與因俱有生滅言因者善不善也不增減經可知第二門以事從理從猶合也引仁王彼初卷也煩惱菩提物也第一義理也一義故遷即不遷也楞伽下同前卷眼等五識者體義聚義依義名身非流轉者五識性空故亦即實相故三此二下謂前之二門隨義排次法必同時矣故此一門雙融前二令二銷鎔遷與不遷交徹一際也此中取義正唯第三然非前二此門不成故初門俱遷次門俱不遷此門即遷不遷方盡一題之義總包一論之玄也又約唯遷則墮斷見無罪無福等若唯不遷則著常見凡應定凡聖應定聖有無窮之過今明不遷而遷遷即不遷諸過齊喪所引涅槃即第八卷云善男子鳥有二種一名迦隣提二名鴛鴦遊止共俱不相捨離第三卷云云何解滿字及與半字義云何共聖行如娑羅娑鳥迦隣提日月等清涼云如此方鴛鴦鳥配偶相將古詩云暫分嶋嶼猶迴首只渡寒溪亦共飛以喻常無常二不相離也引淨名即經第一卷清涼下即玄談大鈔說也然此門中連引三文皆證遷即不遷也頓教者謂直詮真性言絕之理名之為頓法法下如起信云所謂心性不生不滅一切諸法唯依妄念而有差別等若一念下即清涼答順宗皇帝心要中文次云此照體獨立物我皆如非遷下雙遮令忘言會旨仍名下方便安立假以悟物也華嚴即第十九文次此云亦復無有滅若能如是解斯人見如來若依下彼鈔第一今此下初證終教次證頓也疏將明等者迷悟對辨也言倒者不遷見遷故成迷倒初句等者如上列舉生死二法互待互謝遷變云為未嘗少息列子天瑞篇亦云死之與生一往一反故死於是者安知不生於彼哉莊子田子方篇云日出東方入於西極萬物莫不比方乃至是出則存是入則亡萬物亦然有待也而死有待也而生又云生有所乎萌死有所乎歸始終相反乎無端而莫知乎所窮邪次句通一切時者大小諸劫四序晝夜古今延促乃至剎那一念也緣有者緣生之有也後句等者凡夫目未稟外內之教者此輩心識麤淺但知一期生死不達剎那生滅外道計冥性是常微塵常方常等自冥生覺等皆無常亦正為下法相說法身是凝然常報化之身皆有為無漏如大疏具示以一下此論唯一乘之義形對三乘唯見云云在疏如涅槃說吾今此身即是常身法身是亦遷即不遷也疏論主等者法華等經皆以一乘會破三乘故涅槃第二十三卷說三種惡覺一云實無三乘顛倒心故言有三乘一實之道真實不虗顛倒心故言無一實乃至常為諸佛菩薩之所呵責故論主將欲引攝遷與不遷殊見之流故於文前舉其所謬以抑之也疏然實教下涅槃華嚴等經處尤多離文字也經云諸法不來不去非因非緣不生不滅無取無捨不增不減乃至非是文字之所辨說法華即第一上句云是法住法位云云釋云法位即真如異名法住於理故相常住也疏然動靜多體者淺則非情名靜有情名動息事名靜作事名動向夜名靜涉晝名動等深則定靜而慧動真靜而俗動世出世等可例說之且約下依理事無礙之境權實雙彰之心釋也問真諦與理何別邪答真通而理狹以真亦通事也如八諦對分可知今以真俗理事合取真且屬理動靜之意在文可知心者下起信疏解直心云向理之心無別岐路故漚和涉有依有境說其動可知餘文易了論中等者推繹約心境釋之所以也求之捨之非心如何疏動靜等者迷夫任生滅之心遷則一向謂遷不遷則一向謂不遷焉知去住元空動靜一理若是芳舟運而岸亦何移輕雲卷而月元無驟世間下世間動也出世靜也而殊見者不知世間相虗即出世間故智論二十七廣破此見略云世間相即是出世間更無所復又依計者依他遍計動也圓成實性靜也依計性空亦即圓成如何異計疏了義者揀權漸非了之教也保執下叔世澆浮智慧偏淺愽識會理者尠專門黨情者多信有疑空向權背實真如受熏謂起信之悞譯談有為空斥清辨之謬陳若輩多矣聞亦寒心何者起信本攝經之論奘尚弘傳清辨實聖人之徒護法見讓寧容螢火輕議日光戒之戒之勿招犁舌疏意可曉但隨難釋之伸舒也展也正同下圓覺序也彼說圓覺了義隱匿於龍宮海藏之中無人弘闡如陽春雪曲唱者稀而和者寡權淺之典人竟傳之如下里巴歌謳者多而應者繁也然四論等者略彰四論之因起也排挫也所見乖於正理云異敘異可知疏竟辨等者羣異之中談不異之妙從其人則乖法順其法則違人所以難言也疏初二句等者出難言之所以也疏頗明了不煩再述寶所者法華第三云若有多眾欲過此道至珍寶處等葢以一乘為珍寶處也老氏者彼執大象篇云道之出口淡乎其無味謂聞道清虗少私寡欲不美常人也耶疏承前等者謂立功者不辭乎難成仁者不有乎躬黨理者任逆其情正物者弗顧其謗上士下老氏德篇云上士聞道勤而行之中士聞道若存若亡下士聞道則大笑之謂笑其道之質朴也論擬彼書成辭疏中避繁故小變其文節而釋之也疏初句等者目擊耳聞之事色聲香味之相故近也此則事相故近理性故遠疏然者下此中必然有三意焉一要能詮了義之言不滯而流行二在所詮不遷之理明了三欲異見迷子悟入也欲罷下解不能自已也然出論語彼子罕篇云欲罷不能既竭吾才如有所立卓爾雖欲從之未由也已葢顏回歎孔子也依言等者謂真諦故無說無示俗諦故因言顯理也故寶性論初云世諦者謂世間所用之事名字章句言語所說故真一等者即中道不遷之理不居動靜二邊故謙也者謙虗待物焉知來者之不如今也故易曰勞謙君子有終吉論主之謂焉小人少有所得則語氣昂昂眼高四海傍若無人唯懷矜恃之情焉有遜恭之節未得尺寸名已落增上慢疏雙引等者然此論式初須略示正理次出異見後方廣陳自引放光以下略示正理自緣使真言以下出異見為起論之由矣然不能自已以降方廣陳正論餘文可曉緣集等者法之去來在緣之離合法之自性何去何來故來之與去竟無方處也放光第十七云諸法亦不來亦不去亦不合亦不散等疏引放光大品全依南藏頗異北本如善財下舉事以明華嚴七十九略云善財白彌勒言唯願大聖開樓閣門令我得入彌勒彈指其門即開命善財入善財入已乃至見樓閣中廣愽嚴事於後彌勒菩薩即攝神力上之嚴事悉不成就善財問言此莊嚴事何處去邪彌勒答言於來處去乃至云無有去處不能具引疏中撮略經之大義釋之令人易見當處等二句楞嚴經文中觀即第一破去來品亦義引之也論偈云動處則有去如今云觀方知彼去也次前偈云已去無有去未去亦無去離已去未去去時亦無去如今云去者不至方長行釋意云已去故無有去業若未去未有去法去時亦無去者名半去半未去意云如一步初舉未有所至故云半去半不去若此亦不離已去未去故去相本空而不至方也疏中所引是此品最後之文示三法相待而起其性本空知不遷也去法者即去業故長行云隨有作業處是中應有去等此論下會今論意隨俗言遷順真則不遷也涅槃第二十一云佛問東方琉璃光菩薩言善男子汝為到來為不到來答言世尊到亦不來不到亦不來乃至云若人見有眾生性者有來不來我今不見眾生定性云何當言有來不來有憍慢者見有去來無憍慢者則無去來等疏經論下指上所引釋捨也疏初三句等者疏中間而釋之可見疏同見等者物境是一迷悟見殊如二人同席一醒一醉醉者見天地反覆房宇搖蕩醒者見之無一動者迷悟見法其亦如是中吳下惑者逆物未達不遷茅塞其心悟人順物能通若發其覆也疏淨源下道目理也亦性也疏無始等者准起信論謂一切染法始於無明更無始於無明者遍計妄想念念生滅名之為情以情取法法法皆轉致令昏衢劫劫苦海茫茫論主見之故為傷也疏初句汎責者汎然總責六根所對六識所遇皆然論中舉自例諸也耳得之而為聲目得之而為色未達聲色性空之理故云莫覺也賢首下還源觀序文次此前云真空滯於心首恒為緣慮之場意謂聲色性空即是實際次二句下迷者幸知往物不來即可達其今物亦不去如何却計今物遷往邪故往物者唯住往者之法位不能來今今物者亦即今日之性空何能至往不遷之理申述至此雖疑網千重亦可一時隳裂莫嫌露布太曉疏以古等者出意釋理亦昭著可解堯舜五帝之二仁義之主人到于今稱之故舉此也此中等者古過去也今現在也以過現例準未來未來之物亦自在乎未來不至于今也然三世之時亦眾生妄想分別之所顯現依物而說元無實體故十卷楞伽第一云佛告楞伽王汝言過去者即分別相未來現在分別亦爾疏以今等者義勢不殊於前但互望不同但改向作今改今作向來應作去但去字不應作來也疏釋成等者謂無今亦不立昔去來亦爾如前說凡諸二之數如是非高下等皆互緣互生實無自性常情下迷悟對釋常情以所見之法不識唯心所現因緣所生如幻如夢如影如響於夢幻中謂生謂滅反為虗相轉動分別之心悟士了知緣生性空唯心所現去來無相譬之同舟濟壑一見岸移一了舟行互不相是誰得誰失不為所轉予昔下彼錄第七云惑者則為無常不住新新生滅而謂之遷若智者則了性空無知念念無生謂之不遷又曰若能見法是心隨緣了性無一法從外而入無一法從內而生無一法和合而有無一法自然而成如是則尚不見一微毫住相寧觀萬法有去來斯乃徹底明宗也云云甚妙甚妙可返照味之不可下見論文談物未知物即性空之理一向物上求之云前塵非後塵前步非後步等謬之謬矣疏南華者莊子書亦名南華經即彼田子房篇也文多略云丘以是日徂吾終身等云云在疏徂往也言世態遷流日日徂也交臂之義諸說不同疏用郭象等舊義可見然具詳莊子之說孔顏談道其理深遠亦彷彿有不遷之說恨其人已去其書獨存味乎糟粕不具見其真也有心力者亦可以咀之東坡赤壁賦亦云蘇子曰客亦知夫水與月乎逝者如斯而未嘗往也盈虗者如彼而卒莫消長也葢將自其變者而觀之則天地曾不能以一瞬自其不變者而觀之則物與我皆無盡也疏通結下朕初兆也疏連引等者疏總示之亦通於物者時亦物也旋嵐者智論十一云大劫盡時毗藍風起吹須彌如爛草等大疏云亦云隨嵐皆梵音輕重即興雲之風北方風也亦是壞劫時風餘可知白駒者即窻隙日影中飛埃也飄馳甚疾古人亦喻光陰急促如杜工部詩云身世白駒催游氣即莊子舊解若齋解又云游絲即空中時有拂人之面者謂之游絲眼力不可見之然窻隙飛埃甚正故鼓吹詩云窻裏日光飛野馬是也駛馬行疾也日月等者俱舍頌云夜半日沒中日出四洲等謂如此方夜半西牛貨洲則日沒北單越日中東弗提婆日出等故一晝夜周四天下餘文旨不異前疏情計等者誕虗也妄也達觀等者達悟也亦通也觀洞視也亦禪家所謂具眼者體猶會也究也文旨已備者上乃約文敷旨理亦極成也自此而下會通內外之典令知殊途同歸也疏潛妨者含其問意梵網者即彼經序文諸經者涅槃二十三云人命不停過於山水今日雖存明亦難保云何縱心令住惡法壯色不停猶如奔馬等疏初二句等者如法華第二云以佛教門出三界苦謂聞四諦之教悟生空之理修無常等道證預流等果此中正要無常等行若廣釋甚繁緣謂下智論第十八云辟支佛有二種一名獨覺二名因緣覺獨覺是今世成道自覺不從他聞故因緣覺者是人先世因緣故獨出智慧不從他聞等如一國王出在園中游戲清朝見林樹華果蔚茂甚可愛樂王食已而臥王諸夫人婇女皆共取華毀折林樹王覺已見林毀壞而自覺悟一切世間無常變壞皆亦如是思惟是已無漏道心生斷諸結使得辟支佛道具六神通等釋曰論中覺緣離以即真謂覺緣起諸法無常離諸結使得無漏智名即真也與智度因緣少殊修無常是同廣釋如別疏通前等者前亦潛妨此亦潛通研窮也復審也言權旨實者如談無常密顯常義等以常無常亦相待起不相離故偏見之士如言生解聞東迷西圓見之流聞一知二涅槃下經第九略云先陀婆西域呼先陀婆一名四實如是鹽器水馬皆名先陀婆疏此理等者可以神妙之智以會其理不可隨識守名言事相之情求也楞伽下唐譯第五略云爾時大慧菩薩摩訶薩復白佛言世尊如經中說過去未來現在諸佛如恒河沙此當云何為如言而受為別有義佛告大慧勿如言而受乃至廣說生公即竺法汰之資亦學於什公初法顯三藏出六卷泥洹經彼第六卷除闡提不得成佛生公講至於此評曰夫稟質二儀皆涅槃正因闡提含生之類何獨不得成佛應此經度未盡爾是時智公守文生公執理往復移時僧多從智竟為宋文帝黜生虎丘後至廬山得新譯大經生公且講且解每至闡提有佛性之言諸師俛首扼腕而慙初生公被黜含垢忍死以待聖經此經既至證白不謬說經纔了即囑累眾曰生為此經未至忍死來久云云可善流布見麈尾紛然墜地而化時號忍死菩薩也希聲者老氏云大音希聲今謂生公違經談理千古絕唱準式者可為標準軌式也然唯等者却戒之也世有好名之流狂簡僭儗妄生穿鑿斐然成章者是誠厲女效顰梟慕鸚語古人云離經一字便同魔說疏既貴等者躡前以明也防隄防也此之二說等者準略鈔會涅槃經意倒有二種一凡夫本四倒謂凡夫於身無常計常等故佛初成道說無常等以破之二二乘末四倒二乘之人修前無常等行以出三界然未識法身常樂之理故此經中佛性妙有涅槃四德以破之廣如彼經說第二卷說非遷等者第一義諦一切叵說疏雙引下引成具經乃義引之智論五十一云一切諸法不動相故是法無來處無去處無處住等疏中分之各證前義太曉然也皆對治等者即大論彼有四種疏略示二若經中說中道佛性之理名第一義諦悉檀也疏若經等者經論但破執常非常之情諸法之實不必隨言去留也故經論之言雖各一偏其旨未甞不圓也疏初二句等者此一段疏節釋論文顯非重繁各有義意然旨不殊前所以下前舉二乘稟非常之教以證小果今此但會所稟之教含有權實更不會人修之所以故疏示之云爾然以論意酌之教含權實二乘見權而昧實故但住化城未及寶所及至法華與開方便之門而示真實之相疏此會等者內篇太宗師名也彼有三藏藏舟於壑藏山於澤藏天下於天下文多不引固牢也疏中直解貴令易省寓言者謂假寓其辭非實事也彼書寓言者多不能廣示四梵志如常聞新新下亦全用朱文公熹註釋疏二典等者方便善巧引攝他宗令信內法也疏孔子等者順世教說智出人表即名聖人非如內宗智與理冥為聖也故孟子云麒麟之於走獸鳳凰之於飛鳥泰山之於丘垤河海之於行潦類也聖人之於民亦類也出乎其類拔乎其萃自生民以來未有盛於孔子者也莊周著書三十二篇祖黃老述自然以毀仁義蔑禮樂故儒者斥其不經而為諸子之冠人難盡之者聖人之所到聖典之妙趣而凡情未盡識也古人云以小視大則不盡疏此出下且一年為一變爾細而求之如楞嚴第二波斯匿王云豈唯年變亦兼月化何直月化兼又日遷沉思諦觀剎那剎那念念之間不得停住等形亦下亦隨年月乃至剎那新新而變少壯下且約百年為論實亦念念異也若此則念念體異執之為一故成倍迷楞嚴云迷中倍迷謂迷相一倍之多也若知下出不遷之義亦前後剎那隨變隨異分分各住復何相到故法華云是法住法位世間相常住以諸法緣生體用俱離即有即空有之分位即實相性空之位也所以即遷而不遷問明品偈云諸法無作用亦無有體性又云譬如河中水湍流竟奔逝各各不相知諸法亦如是以體用俱空故不相知也疏此以等者顯示論文善巧也如前引內教以聲聞等內事明之此引外典乃以梵志外事證之不善作者之妙奇何能知此論之巧辯哉餘文可知納婚曰娶貴續其後也似昔人諸法無分不善於俗也若是昔人則異位通同不善於真也故白首梵志特今日之新吾朱顏梵志元在昔之故物矣梵志一也然朱白體殊故似是而非真是也莊子田子房略云仲尼告顏回曰汝雖忘乎故吾吾有不忘之者存等疏源師下負載也荷也無常大化之力負天地而趨載萬法而走實有力之大者也疏初至等者此意謂圓器受法覽之殊文解其同理與夫守株待兔執迹求象者天壤隔矣根行下根謂根器即上中下行謂信行樂謂好樂欲謂希欲故起信云以諸眾生根行不等受解緣別依一真等者梁攝論意葢無不從此法界流諸宗多引此不疣贅八萬下且約對治八萬四千煩惱舉數其實恒沙俱舍等云牟尼說法蘊數有八十千起信云如是具足恒沙不思議佛法等梵網下彼經略云時佛觀諸大梵天王網羅幢因為說無量世界猶如網孔各各不同別異無量佛教門亦復如是其旨下教雖差別皆為中道實相爾如法華說三世諸佛種種譬喻言詞演說諸法是法皆為一佛乘故故人之學教不應偏解以教望機若常非常皆防情之說以聖人望教唯宜捨權入實以於凡有益故原佛下亦法華第一云如來唯以一大事因緣故出現於世一事謂一乘知見也而為眾生演說諸法以此量之說非常教本為常也若以理推之則一切諸法必二義兼之如娑羅娑鳥等若反迷之悟則唯示不遷故題云物不遷也疏隨聲等者責守文滯理之士也聲名言也然隨聲取義有五過失如十地論說圓音者略示云謂如來一音之中具一切音說種種法徧投諸類如出現廣示今此取義令於一法圓解多義多義歸於一實不可聞遷只悟無常等疏古今下謂不可指古是今等疏初有等者謂依不動不來各陳三句也甚易疏初二句等者眾典萬殊故曰羣籍千門異說故曰百家然上等者通指向上論文例諸者謂苦空無我等或說苦下多在小乘或說常下多在大乘然大乘中亦有一經而雙彰者如涅槃說藥分千品喻教差愈病無殊喻旨一也教海等者以悟心為主也封守也昔有江行而失劒者刻舟以記之隨行殊方猶指刻舟處失之迷之甚矣刻舟喻守文失劒譬迷旨刻舟弗獲于劒守文焉能悟真瘡疣者謂不能忘言求旨反成文字之病役心焦思徒致功力爾疏自此等者分科也上論雖談今古三世之時仍對物明之故成異也疏謂凡下迷悟對辨可了雲泥者儒者以高低相懸謂雲泥也疏言似相反者謂互相違反亦老氏文如前指去住雖殊其致一也疏執遷等者求推求也謂於今日尋古日也下但反此疏文通等者疏以古今二相雙釋之然執者下迷人常情但計今去古為遷如古詩云昨見春條綠那知秋葉黃蟬聲猶未斷寒鴈已成行又云屈指千萬世過如霹𮦷忙皆謂世態迅速遷去也遷之漸久以成古且以理求之但積時以成古終不遷時而成於古況時者剎那墮滅性亦無在特妄想分別計有三世故維摩經云非謂菩提有去來今論智者解達也疏中括而示之疏四象即四時下易繫辭云易有太極是生兩儀兩儀生四象等解云四象木火金水也今謂四時者以論云風馳故曰時也葢依四象轉取之木王於春火王於夏金王於秋水王於冬也璿璣等者瑤疏云一天樞二璿三璣四權五衡六開陽七瑤光辰謂辰星一點此方觀之在北即論語云譬如北辰居其所而眾星拱之是也謂三台七星等皆繞此而行一晝夜一周天如電而卷言疾遷也源師下以所解理正故名而取之遠公即廬山遠法師答什公之偈略云本端竟何從起滅有無際一毫涉動境成此頹山勢釋曰生死二法窮之無本端也如中論說生在前邪不死何生死在前也不生何死如是推之無端首也起滅即生死有無際者謂此二法緣會而有有非真有緣離則無如論初說一毫等者謂迷此性空之理迷情一毫初起即涉生死紛動之境山崩曰頹謂生死一起勢難可止如山一頹落也此約迷說悟可例知疏初句利他者且依法相宗說二利之行經三阿僧祇劫方滿因位論言萬世百劫且屬對以舉數修鍊者謂修進鍊磨也問者假問以起下文疏初句下論語之義勸人進學具云譬如為山雖覆一簣進吾進也解云為山九仞功始一簣進之不已九仞遂成進之在我故云吾進也老氏亦云九層之臺起於累土積土下就喻以明運行下約法以明謂果自因招非因不果果既昭然知因不化後句下彼六十四篇中文仗亦託也由初下亦喻顯也千謂千里就其句法但云千由行下亦就法顯理不異前通喻二行者行雖有二果法唯一故通證也但舉下中間之行例同初因皆不滅也大疏者即華嚴大疏說佛身十種無礙此即因果無礙也彼宗以因果交徹互不相礙為玄門無礙之義今取果中見因一分之義以證因行不化云云者經云一切功用猶如一念即不遷也圭峯釋云今一念備知炳然齊現猶琉璃瓶盛多芥子義甚同前前問下指疏謂三世互因互待而起念若不生三世相泯則一性顯矣論約下若因若時皆名為事事法體虗即同真也疏真流等者亦懸談文彼云非真流之行無以契真為此宗中先悟毗盧法界後修普賢行海悟理起行名為真流此行無相無住一一契真以契真故所以不遷若住下意用永嘉禪師證道歌彼云住相布施生天福猶如仰箭射虗空勢力盡箭還墜招得來生不如意等疏三灾等者準劫章頌一增一減為一劫經八十增減火灾方起壞三千界乃至初禪八火之後水灾乃起七水灾後風灾乃動如彼廣說酷虐也淪滅也餘可省疏初句中等者佛性論以佛性因中名應得果中名至得二位相遠者因不至果故因若至果果應是因亦因果同位有無窮過因因而果者顯果自因招也果非因招應是自然亦無窮過又果不俱因顯因非常因因而果知因不斷雖舉果下恐人悞解唯依因果事上談不遷之義故會歸性空之理問者假此以辨論旨也前者如前論云諸法無所從來等當知因行諸法之一也何勞再辨答義可知故知論之義脉始終有在唐捐者唐虗也捐棄也童子下約喻辨因讀書喻因至熟喻果若云書功隨滅應不至熟既至於熟知前功不化隨相等者如童子讀書之相意識心思與眼識等俱前念熏後後念引前尚至於熟此法相義也但約熏引剎那相續連至後位其實前滅後生因化果起不同性宗稱理之行與理終始理不違事因相歷然事不違理即因不化所以下前論雖有如來之稱但舉果顯因因理既明果性自顯疏引佛果亦清涼義報身有為也法身無為也由非一異即遷不遷吾今下涅槃文此身即化身也常身即法身也疏無謂等者此中二義一假設之辭假令天崩地陷亦無謂不靜等二據實而說天地亦緣生之法有成有壞當天地倒覆之時亦變之大者苟識性空即無變洪流如水灾者至二禪是也列子湯問篇云然則天地亦物也物有不足故昔者女媧氏鍊五色石以補天缺斷鼇足以立四極其後共工氏與顓頊爭為帝怒而觸不周之山折天柱絕地維故天傾西北日月星辰就焉地不滿東南百川水潦歸焉此亦言有壞未知所以大壞之理也又天瑞篇略云杞人憂天地崩墜身無所寄人曉之曰天積氣而成地積塊而成終日於中行止柰何憂崩墜乎長盧子聞而笑之曰虹霓雲霧風雨四時積氣以成天山岳河海金石水火積形以成地既積之矣奚謂不壞夫天地空中一細物有中之巨者憂其壞者誠為大遠言其不壞亦未是也然論亦潛用莊子意彼逍遙篇云夫大䆮稽天而不溺稽猶至也旨不別前疏詞可了清寧者老氏云昔之得一者天得一以清地得一以寧等今以清寧目不遷也千門下以宗中會緣性空但一義爾論詞風雲變化霞彩交張百態千狀乍現乍隱但以宗義求之無不通矣疏反顯等者賢首宗中物外談空為斷空外明有為常即有而空即空而有中道見解也清涼下引證次云言象非近虗懷體之而目擊禪書載秦主覽此論以盞擲地而辟問法師曰豈非遷乎論主默然是何鄙野之談不近理甚矣以秦主之識法不應有斯問以論主之英悟亦不應有斯默假令問之則必答曰盞緣生一物也以生滅之心對之有完有破性空之智印之無生無滅以體用本寂完破異位故緣集則完緣離則破完破在緣不在於盞若此完不自於破來破亦不從完至兩不相至性各住於一世矣鄙解淺淺亦可以通況論主之高悟哉此論亦宗諸般若及中論等而作之疏一切等者除第一真諦於世諦中所有世間五陰十二入十八界以至出世諸法十力四無所畏十八不共薩云若等有為之法從緣所生皆不真也不真故空如放光第七云五陰不真故空及五陰菩薩等無有異六波羅蜜三十七品乃至佛十八法皆無端緒諸佛法空佛法寂佛法不真等如幻等者經有十喻如夢如光如影如響如陽焰如變化如鏡中像如水中月如乾闥婆城等故自體空也當知諸法但有名字何有實體於相不真於性本空相雖不真緣起非無性本自空從緣非有非有非無第一真也下論云萬物果有其所以不有有其所以不無等又曰觸物而一等廣引恐繁放光第七云須菩提告舍利弗諸法亦不聚亦不散舍利弗言何等不聚何等不散須菩提言五陰乃至善法惡法有為無為有漏無漏法亦不聚亦不散何以故自性爾故以是諸法亦不有亦不無等其文非一疏初句依經標牒者亦義引此辨無生之理也諸摩訶衍中皆示此理為大乘之標相般若尤多中論宗而釋之今疏從之也約心下般若心也以無生之般若照無生之妙理亦非有照亦非無照故論云玄鑑之妙趣也宗體者此性空之理是萬物所宗之體勝義下謂諸法約相名世俗諦約性名勝義諦此諦超出俗世故疏云無上廣解諸諦差別之相如別有無者下論云緣起故非無從緣故非有等一異者中論明中道離於八法故論初云不生亦不滅不常亦不斷不一亦不異不來亦不去等今略云一異論又云若一則無緣若異則無相續等言等者等餘生滅斷常來去也文多不引非自下論義也破因緣品偈云諸法不自生亦不從他生不共不無因是故知無生然中論本頌龍樹菩薩造長行即青目梵志所釋今略依長行以解前頌不自生者謂萬物無有從自體生必待眾因緣而後起亦不從他生者謂自無故他亦無有何者以有自故有他自既不生他豈能有釋曰此義以諸法為自以因緣為他故前云萬物無有從自體生必待眾因緣若餘宗亦以因為自以緣為他然義亦相有廣破如大鈔不共者破自他和合共生義也論中共生則有二過一自生過二他生過不無因者無因而有則為常也應善惡果報不從因招布施持戒應墮地獄十惡五逆應生天上言亦非作者者西域外道計萬物生滅謂有作者準中論或計萬物從自在天生從韋紐天生從時從世生從變化從自然生等然此方亦計造化有主古人云造物小兒多伎倆又接華詩云可笑化工無定準翻紅弄紫只由人皆見萬物生滅變化遷移由化工使之以西域計有作者自然之計此方有之下亦略示尚未達因緣生法之理況識緣生虗假其性本空之理乎無生下會釋中道第一義真以二諦相即故云無生而生等餘可知疏反顯者唯聖人無生之智照前無生之理也疏果極一句依佛位明之示化一句同類成名如下云在天而天在人而人等無上士者會如來十號之一也內通者照理名內出超也釋神心悉覺下華嚴第六十卷中文外應者照事名外極視下謂權智縱目觀色極耳聽聲具於五欲之境略言聲色也了本虗故色不能膠聲亦不制也難陀愛孫陀羅而歸家為色膠也迦葉聽琉璃琴而起舞為聲制也故知未了物虗物即累其神明爾智論十七說有優婆塞一與眾估客遠出治生是時寒雪夜行失伴在一石窟中住時山神變為一女來欲試之說此偈言白雪覆山地鳥獸皆隱藏我獨無所恃惟願見愍傷優婆塞兩手掩耳而答偈言無羞弊惡人設此不淨言水漂火燒去不欲聞此聲有婦心不欲何況造邪婬乃至為之失身命如蛾赴燈火山神聞此偈已即擎此人送至伴中著聲者如五百仙人在山中住甄陀羅女於雪山池中浴聞其歌聲即失禪定心醉狂逸不能自持譬如大風吹諸林樹聞此細妙柔軟清淨生邪念想是故不覺心狂今世失諸功德後世當墮惡道著香者如阿羅漢常入龍宮食已以鉢授沙彌令洗鉢中有殘飯數粒沙彌嗅之甚美便作方便入師繩床下兩手捉繩床俱入龍宮龍言此未得道何以將來師言不覺沙彌得飯食又見龍女身體端正香妙無比心大染著即作要願我當作福奪此龍處居其宮殿龍言後莫將此沙彌來沙彌還已一心布施持戒專求所願願早作龍是時遶寺足下水出自知必得作龍徑至師本入處大池邊以袈裟覆頭而入即死變為大龍福德大故即殺彼龍舉池盡赤未爾之前諸師及僧呵之沙彌言我心已定心相已出時師將眾僧就池觀之如是因緣由著香故著味者如一沙彌心常愛酪檀越餉僧酪時沙彌每得殘分心中愛著樂喜不離命終之後生此殘酪瓶中沙彌師得阿羅漢道分酪時語言徐徐莫傷此愛酪沙彌諸人言此是蟲何以言愛酪沙彌答言此蟲本是我沙彌但坐貪愛殘酪故生此瓶中師得酪分蟲在中來師言愛酪人汝何以來即以酪與之著觸者如波羅柰國山中有仙人以仲春之月於澡槃中小便見鹿合會婬心即動精流槃中鹿飲有孕產子似人鹿足一角仙庵邊而生見子是人付仙而去仙知事己兒養育年大學通經書又學坐禪行四無量心得五神通上山值雨足不便故泥滑躃地破其軍持又傷其足便大嗔恚以軍持盛水呪令不雨穀果不生人民窮乏國王憂惱命臣集議雨事明者議言我聞山中有一角仙人以足不便躃地傷足嗔呪此雨令十二年不墮王思惟言若十二年不雨無復人民矣王即開募有能令此仙失通屬我為民者當分國半治時本國有婬女名曰善陀端正無雙來應募問諸人言此是人非人眾言人耳仙人所生女言若是人者我能壞之語已取金槃盛好寶物語王言我當騎此仙人項來即求美女五百將歡喜丸以藥草和之彩似雜果及持大力美酒色味如水服樹皮衣草衣似象仙人既至仙庵別庵而住仙遊見之眾女出迎花香供養仙人大喜女以美言敬辭問訊仙人將入房中坐好床褥與清酒為水與歡喜丸為果食已語諸女言我生已來初未得此果水女言我行善故天與我願得此果水又問汝何故膚色肥盛答我曹食此果水故女白仙言何不住此間仙曰亦可住耳女言可共澡洗即亦可之女手柔軟觸之心動與女相洗遂成婬事即失神通天為大雨七日七夜七日後酒果皆盡繼山水木果其味不美更索前者答言已盡矣今當共行有可得處仙言隨意即便共出去城不遠女在道中臥言我疲極不能復行仙言騎我頂上女先遣信白王可觀我能王出觀之已而問言何由得爾曰以方便故令住城中供養恭敬拜為大臣身漸羸瘦王問仙言汝何不樂答雖得五欲常憶閑靜諸仙遊處不能去得王自思惟旱患已除當復何緣強奪其志即放還山中精進不久還得五通疏雙出等者出二智不滯之所以此上等者辨二智體一但依照成二如仁王經云於諦常自二於解常自一疏意舉二諦相即為一源真應相融為一心疏中應字謂權智非約身說疏復釋等者謂再以前文研窮審詳申明其理也此文甚隱故疏具示之向下隨難釋之順法等者釋上順也但順法之自虗不如小乘析之令空也若依法析破故不通於無窮之玅不滯寂者不離物故不滯物者了物虗故一氣下如老氏云一生二一謂氣也意云下謂以性空之理而觀諸法無一法而非性空也凡所下六根所對之境六識所生之觸觸所染者色等諸欲其性本空也反聞自性者密用楞嚴經觀音圓通之義具云反聞聞自性聞復翳根除等反聞不循外聲也聞自性者謂聞聲之性不自聲生唯自性也聞性既復十方洞聽碍塵翳根自除滅矣此根既爾諸根皆然故經云一根既返源六用成休復前文下揀別前後可知疏觸謂等者心染於境名觸若細說者根境識三和合生觸觸染於色等諸境今言觸物者凡六識所遇之物也清涼下引大鈔文居然者猶顯然也謂二諦交徹顯然中也又只可下辨論旨致淳而一之意若依二諦交徹會之亦合云混雜而恒一派一而恒雜今但言致淳而一故依此會也疏雲庵下現行本中失此二句檢唐本有之於理甚足疏將破下敘論旨可知心境相收至下當知生公下大鈔引之但以真為是俗為非皆相待起也相待則俱生不待則俱滅故唯一無生諦也四言四諦也莊子齊物篇云彼亦一是非此亦一是非彼是不得其偶謂之道樞三家者論語文彼云三家者以雍徹魯桓公之後一曰季孫二曰仲孫三曰孟孫雍徹詩名也世執魯政僭天子之禮今謂下之三師疏時謬者謂學法之士未知緣生空有之理謬見紛綸如下道恒等由正理下指前物我同根等文七宗者彼疏云梁僧寶昌作續法論述宋僧談清作七宗論一本無宗二玄宗三即色宗乃至第七體會宗等然世遠無行不必屑屑性理隨殊者隨彼所述詮旨成異疏據梁傳等者有云支慜度作恐非予按梁傳度師殊無他述竺法汰傳中載云道恒頗有才力常執心無義大行荊土既云有才力或只此師作之自執己說而行也汰曰此是邪說應須破之乃集名僧令弟子曇壹難之恒辨給弗屈翌日更集慧遠攻之關責鋒起恒自覺差異麈尾扣案未即有答坐者皆笑心無之義於此而息心無諸法等者瑤疏敘云謂我之本心元無諸法諸法自有非我心有疏由心等者心不生於諸法心自無事以當懷故心神寧靜以此為得然大乘正說萬法無體皆唯心現緣會而生其性本空未達此理乃云諸法自有我心無法此其所以失之遠矣又與小乘心外執法實有符同疏東晉下即高僧支遁字道林據瑤疏林公作色不自色猶存假色宗疏依北山錄敘之大義同也彼謂下名青名黃乃至大小長短等皆人之妄情計而名之非色自謂故林公云色不自色心若下達妄計性空苟不執之為實青等諸相自不成立故云雖色非色疏齊去聲此者論主欲破彼說故先示正理正理既達偏見自殞次句下但前之所名青等質碍之色皆依緣生緣生之法元無青黃長短之名無名之法質碍即色豈待人名青等法隨起邪見受想下以諸般若破有之教始自世間五蘊終至出世十八不共等法皆悉空故不獨色也以一切法依乎妄計皆有名相然因緣所生無實體性故皆空也以青等者青黃之名妄計而起青黃之相因緣所生疏初句等者了遍計空釋論初句未達下釋論後句然緣起下潛以起信敘之論說黎邪有二種義一者覺義二者不覺義依不覺義復生三種相一者業相同法相宗中自證分二者轉相同見分三者見相同相分故言亦心之相分能見之心者謂智相相續隨相轉者隨彼黎邪心中所現根身器界五塵等法轉生取著即執取計名字相也故論釋智相等略云依於境界心起分別相續不斷緣念境界心起著故妄執分別假名言相等名屬下依三性釋也名是遍計相是依他如密嚴經義下具引釋疏竺法汰者據傳與安公相友之人圭峯略鈔第四云本無者下至無即無鈔云上皆是先敘所計也賓客也客皆向主今立本無之人言皆趣向於無又引爾雅云賓服也中情賓服於無也尋夫立文下至即物之情哉略鈔釋曰不言非有無却此有非無無却彼無也疏初二句下斥謂斥破可見今詳等者以三家對而辨之心無則實有諸法本無則執法元空皆著一偏故林公則遍計空而不涉有依他有而不即空亦各在於一偏故也若論主者但依緣生諸法上明之緣會故非無從緣故非有中道妙旨爛然懸解以中破偏故三家所以皆不立也問緣生之法非有非無已聞命矣遍計之性如何答有無二見本自情生故以非有非無斥之苟祛此見則一切諸法皆不可說言語道斷心行處滅如起信真如門及大品等廣說然汰公之作實與般若一十八空之理相應但不可說於偏空也若以五教之理隼之恒公多入小教支公同在法相汰公合於空始論主則終教之中空有無碍中道之理然前前淺而後後深以深破淺得俊尤易著空等者空本治有之藥病去藥亡可也服之不已返成其病無可治也非特等者敘見惡猶甚也謂為善惡之惡食鹽者彼論第十八略云譬如田舍人初不識鹽見人以鹽著肉菜中問言何以故爾語言此鹽能令諸物味美故此人便念此鹽能美諸物自味必多便空抄鹽滿口食之醎苦傷口而問言汝何以言鹽能作美人言癡人此當籌量多少和之令美云何純食鹽無智人聞空解脫門不行諸功德但欲得空是為邪見斷諸善根等世間下非世世有斯人也大意以佛法雖起東漢行之猶尠兩晉以降經論未廣圓解明哲如什公者誠罕有也恐人見論主破彼便謂二師聊爾不可不可請覽本傳自生鄭重自下等者敘論旨脉也然此一論旨脉微隱諸師區別亦以不同予前後研覈漸漸得之理似有據可詳逐節疏文不廣敘也初理絕下名謂能詮名言相即所詮義相了法等者華嚴十忍品文二寄詮下若不寄其言相亦不能識中道之性無離文字淨名文三故我下金剛經文文字性空亦淨名文十二分教下金剛三昧經義餘可了疏若依等者謂若依世俗諦說隨相立名依名取相凡是等云云者故般若論云可物於物則名相異陳莊子山木篇云浮遊乎萬物之祖物物而不物於物則烏得而累也論文亦本諸此疏以所名等者大意云名依法有法尚空寂名尤虗假引密嚴者前二句證物空後二句證名空下論亦云不物於物則物而即真疏釋此有二等者於疏易了但逐難釋之性各異者名是遍計相是依他故初句下大意物雖即是名名不即是物顯兩異也見物不知名者謂見未識之物雖覩其相不知其名是物非名也俗假等者於第一義二不相即性本空也局者下謂一論能詮之名所詮之義皆方便安布建立以悟將來疏第一義者承上名相兩虗致令第一義真獨出於名相之表名虗故離言說相虗故離心緣故寶性論第一義諦者所謂心緣尚不能知何況名字章句等疏初引等者摩訶衍即智論也以大品廣說摩訶衍義故論具說四句之義也今但引所用一句復引中論亦同言轉釋者即論主轉以第一真諦釋也以第一真諦二論皆有故引此為下色空真俗等諸法所依之宗皆云者指前二論次下等者謂次此以下凡六節論文初約色空乃至後引二論依有無之法種種開示皆依非有非無以示第一真也細詳疏意自識論旨若迷旨脉何以知作者之意予意凡解經論須善三相一貴識其宗二善解旨脉三深了文義三者不備號虧聖教真俗非二者雙是之中故非真俗之二者雙非之中故疏二論等者以撥喪釋滌除也杜猶閉也滅聲曰寂絕色曰寥無色碍處名曰虗豁目斷空也混茫者謂混混茫茫廣遠之相目頑凝之空也疏就物等者謂順物性之自虗不待洗除以通其性乃即偽而真也疏初四句等者謂躡跡釋成互存互亡句也餘可了疏密嚴下即彼下卷二合名相也由名相故生起心心所等諸識分別次句顯名空自下等者分文亦總示下文大義也疏初依等者空色之義乃法之標相諸般若等皆有故首示也即彼經不二品云色即是空非色滅空色性自空等疏空非下色即物也如水非波外即波是水金非器外全器為金非一者空色兩分事理二殊如法界觀事理相非二門也新譯般若心經亦有色非是空空非是色之文析滅者釋論文宰割也如穿井鑿穴見空之類然即空之義遠矣斷見者外道以蘊滅不續為斷大乘謂小乘析滅為斷如懸談鈔說亂意者一乘究竟實性論說初發心菩薩於空未了有三種疑如下示之疏問疾品者釋曰病亦緣生一法也真有則若來若去應不從緣從緣生滅非真非有超日等者受者五蘊之一命者不相應行中之一皆緣生故諸法空也疏文則等者教逐機異其旨元和疏二依等者放光具云舍利弗問尊者須菩提言欲使從無所生逮得欲使從有所生逮得須菩提言我亦不使從無所生逮得亦復不使從有所生逮得舍利弗言如所言為無所逮無所得邪須菩提言有所逮有所得不以二世俗之事有逮有得但以世事故有須陀洹斯陀含阿那含阿羅漢辟支佛有佛欲論最第一者無有得無有得從須陀洹上至佛亦無逮亦無得釋曰舍利弗問從無生真諦有成得邪從有生俗諦有成得邪須菩提答以般若無所得雙遣之舍利弗以謂於有於無俱無所得故須菩提復答有得無得亦非有異於世俗中有逮有得第一真諦中逮得雙絕此義至無名論知之故下疏指玄得疏勝義下隨論會歸中道疏義引者彼二十四云世尊世諦第一義諦有異邪須菩提世諦第一義諦無異也何以故世諦如即是第一義諦如等前雖下分前後各殊可知疏二諦下宛然殊也故仁王經云於諦常自二譬如牛二角然真以俗為相俗以真為性有何太異哉疏初二句等者謂萬法皆有一非有義非無義也次四句如疏可知次四句超斷常者不絕於虗所以出斷非真有故所以出常後二句下若有者謂依此而見法之有亦不即真亦合云若無不夷跡疏中超文而躡釋之尤明疏古人者相傳靜法苑公未詳齊立曰並並則為二亦非雙真俗相違故云恒乖未曾各亦恒一也疏連引等者淨名之意明言說即如於真諦中亦非有說亦非無說後句不壞言說之相於俗諦中師資因緣會合不生之中言說生也後經者如疏非轉下此談如來一代利生說法凡三百餘會也不捨下智論第二十六云如一長老目闇自縫僧伽黎針絍脫語諸人言誰樂福德為我針絍爾時佛現其前語言我是樂欲福德無厭足人持汝針來比丘知是佛白言佛無量功德海云何無厭佛言我於福德雖盡邊底然無厭足乃至佛為說法肉眼即明慧眼成就等轉而下大般若四百二十五云我從成佛已來不說一字汝亦不聞等放光第十七云如來坦然而不說法舌覆下諸經多說如來將欲說法出廣長舌相遍覆三千大千世界表所說誠諦故身默下淨名不二品中事此意淨名默住亦是說法令人了法無言入無言際故大疏云語默視瞬皆說見聞覺知盡聽得法契神即是說義如楞伽第四云有佛國土直視不瞬口無言說名為說法等疏文通等者覈研詰也物雖等者以此但辨前之所引二經之義故疏順顯下邪見執無所以是惑今云非無以轉此見下句可得疏真諦等者第一義諦轉與非轉二義俱絕故言非有非無疏如來藏者廣如本經以要言之即隨緣真如中道妙有之心然隨言顯示亦有二種一者空如來藏無二十五有故二者不空如來藏具足無量性功德故以含此功德所以名藏也廣釋如佛性論疏義引等者以經但云心非有無故義引中論轉釋云物從等物雖通名順前經義正且目心亦該一切言義引也疏推尋等者以經具繩墨義揩定邪正故衡秤衡也亦平也理量稱而平之義自見爾疏一徵辭者如何者何故牒者為前中觀謂物不有不無何以知然故今牒云所以然者然即如是義葢指前不有不無下方反釋云夫有若等異喻下喻有同異今其異也與前義全殊亦相例而顯以此照彼理極成立也疏初二句等者此釋非有也摘句出之更無別釋疏初句等者此中引論但合集智論上下之義引之釋不無也疏通成等者初對中大旨亦不異前但加一切爾此乃最後引文辨法故明諸法因緣有無及有無二法因緣有無悉舉明之舉此之外更無一法可舉也疏釋前後可知後對等者前依諸法以辨有無有無是義此辨有無有無是法此之二法亦因緣故有等大品十八空中最後云無法有法空論釋甚廣疏略引也涅槃亦略具云一切世間有四種無一者未生名無如泥團時未有瓶用二者滅已名無如瓶壞已是名為無三者各異互無如牛中無馬馬中無牛釋曰若以人事言之如羅云無善星善星無羅云顏子無盜跖盜跖無顏子等四者畢竟名無如兔角龜毛緣亦無數者各隨諸法因緣差殊故如穀種為因必以水土等為緣識種為因所緣等為緣是也疏初句等者以前引論文諸法有無及有無二法皆不出有無故相反者謂有之與無敵體相反也收前初三等者以初句明諸法因緣故應有三句明無法因緣故應有所以收也不應言無顯違反也收前二四等者以前第二句明諸法因緣故不應有第四句明有法因緣故不應有故收之也後三下但例前說之餘可領疏初二句等者應有亦該前初與三也不應有亦該前二與四也釋義如疏事一等者諸法及有無之法皆事也同謂非有非無之中道疏初有等者定執有無即成見取意言者舉要而言即心意分別未形於口謂之意言題示者不真空一題顯示其義也前已通敘者指前破三家之後疏文也知彼則會此義若下意謂上述不真空之義至此已周故結之也推尋也繹細繹思審之貌謂前後思究審玩可知疏彼經下依世諦名相以顯第一真諦名相無生即真諦也已見前文者指前自下之疏也二十四云菩薩以名相行般若波羅蜜亦不當入名相中葢論主依方便道於無名相之法用名相說今復引經示名相本空令不著也故大論八十九云以方便道以無名相說等譬如下亦放光經文非無下論辭幻如結巾為兔擲竹成龍孟欽畫地作平野之溝欒巴噀醪成蜀川之雨等化如蓮色尼作輪王首迎佛於寶階提婆達化小兒惑闍王於內苑等疏此與等者前云物不即名而就實此云物無當名之實等義實無別但文少不同名自情生者遍計性故好惡者情識虗誑苟美一物立以好名苟惡一物立以惡名故云何定一物立多名者如月亦云蟾輪桂輪金波兔魄等一名召多物者如修多羅呼井索席經等如以下本草以蚯蚓名地龍何有龍之實乎木賊非盜也但順下俗諦故有真諦故無諸法且自當論名相以從緣起故假也疏一切等者以世俗諦中物物皆有名相名相體空本來不立則一切諸法悉皆空寂已上者指放光以降疏初句論文者即物無彼此也而人下論主釋之也如二等者非約喻顯且於諸法中舉此以示其空也故寶藏論云約天地為上下約日月為東西約身為彼此約情為是非等疏正舉等者疏釋可見元空者訓初為元也亦可等者又訓初為始也無暫始有者無萌兆之始也無暫始無者迷情念念不停剎那相續也餘喻況可了疏初句等者悟無彼此之定相則所執之法亦寂然彼此之相託法而現如託繩現蛇能所皆妄者遍計蛇所託繩謂依他繩所依麻方為圓成晉書樂廣傳說有客至廣家廣舉杯酌之璧間弓影入客杯中客謂悞吞其蛇尋而病生經年弗愈後見廣廣與辨析客豁然有得病亦即瘳似此類者誠多應識遍計生滅如此論旨以依他諸法即非有非空妄計取之為有為無彼此是非物我等殊雜然而起不知已已苟悟情空則法法非有非無也故論云既悟等故唯識頌曰此遍計所執自性無所有妄執者依性宗說枝末不覺在六麤事識之中法相正唯六七二識如彼云云楞伽等經名為妄想或云分別取體即五見四取等惑皆遍計也疏成具下具云是法無所有法無故強為其名園林下準莊子林希逸序云莊周宋人字子休等吏者曾為漆園吏故云園林疏所引者全是彼文釋詞亦彼疏義此辨是非無定體亦空也與此無殊疏次二句等者名相等法生滅非常聖人情念已亡即化而見不變之常常通下謂凡夫妄想紛紜見諸法定相彼此森然未甞一念而通聖人反之即惑而智矣故大疏開因性云良以眾生包性德而為體依智海以為源但相變體殊情生智隔有人問予華嚴宗中相容之義指柱曰使此柱入彼柱令彼柱容此柱乎余曰汝所問者正犯圓宗太忌彼必超情離見汝用情見求之情見既碍法何相容可去情思之疏放光下依般若論引用彼經第二十九云不動真際為諸法立處謂不壞俗諦名為立處葢真即俗也疏聖即智也者得無分別之心名為聖人初地已上皆名聖人神心也者起信疏云中實神解名心神靈也即靈妙覺心圭峯序云冲虗妙粹炳煥靈明等仁王經意示惑性智性無二性故但迷悟相翻爾今詳下通會前文前隨論文亦旋發其義文旨煥爛確然非謬好思歷歷可解密嚴初句因相立名如謂彼此等次句依他因緣而起諸相此之二句辨名相生起此二者又依名相二法生妄想分別也故楞伽云相名常相隨能生諸妄想故此三法但互緣而起其性本空空則法性如如於斯下若了此三法性空之理即是正智名為下辨定三性相是依他起者細推經意相含二義一遍計所執如依繩見蛇依杌見鬼此之名相皆是遍計二依他心心所等如繩如杌名相也冥搜者冥猶寂也搜求也謂靜意求之始可見理指掌者見理明白如指掌中之物也文用論語
