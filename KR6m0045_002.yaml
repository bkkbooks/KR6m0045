body:
  text: 五臺大萬聖祐國寺開山住持釋源大白馬寺宗主贈邽國公海印開法大師長講沙門文才述疏本覺下依起信釋以般若是智慧與覺義同故龍樹末論呼本始二覺為般若故然此本覺即隨染之名為阿黎邪識一分之義故論云此識有二義故一者覺義二者不覺義所言覺義者謂心體離念離念相者等虗空界乃至説名本覺即衆生等有者謂一切衆生皆有阿黎邪識皆有本覺大論下然論十八卷中翻摩訶般若為大慧釋中皆云智慧準此具足應云大智慧也以是有方便之慧照于雙空及與空後不空之理故名為大華嚴下具云無一衆生而不具有如來智慧但以妄想顛倒執著而不證得二始覺下此始覺名對不覺説謂本不覺今始覺故六度是因行故云六度之一即般若波羅蜜然通淺深者二乘之人但學衆生空未學法空故盡無生智名淺般若菩薩習行照五蘊十二入十八界乃至十力不共一切智等皆緣生性空無法可得無生如實智名深般若此復下謂甚深般若若依因果二位分之以般若之體通因及果故因修下依起信論因有三位一者信位能覺滅相名初生始覺二賢位能覺異相名相似始覺三者聖位能覺住相名隨分始覺故疏云歷位等二果證等者即果位能覺生相名究竟始覺然始本下謂覺至心源以始合本無復始本之異本來平等唯一覺故又有三種等者宗諸般若釋也然大品放光及大論皆説諸法實相故大論第十八云諸法實相是般若波羅蜜等然諸法實相必如智雙融所證如理亦名實相故宗中云見法實相能證之智見此無生實相之理亦名無生亦名實相般若也論初引放光等經云般若無所有相無生滅相等通約實相然論之所示但舉非知非不知非有非無非斷非常離此諸邊名中道般若正為實相故大論六十一云有相是一邊無相是一邊離是二邊行中道是諸法實相等二觀照下以本智照理後得照事亦通因果可以意得三文字下勝天王經第六云總持無文字文字顯總持亦般若也故放光二十三云以般若波羅蜜總持諸善功德之法此以能詮從所詮故故以文字為般若大論五十六云般若波羅蜜無諸觀語言相而因語言經卷能得此般若是故以文字經卷名為般若等若云文字性離即是解脫義該實相然以文字為門亦文字般若十二分教即空文字即般若也仁王經云十方諸佛一切菩薩不離文字而行實相乃至云修文字者亦不著不離是名修諸佛智母等此論下論初未開權實及末後寂用同源義該實相亦本覺離念之般若從然則智有窮幽之鑒以下開成權實即始覺觀照般若一論名句即文字般若然般若種類尤多略示如此無知等者釋別名也此前云般若亦通名爾無知之名特此論有下云等者具云將無以般若體性真淨本無惑取之知不可以知名哉又云以有所知有所不知等二顯真下初義如前二始覺下下云智有窮幽之鑒而無知焉神有應會之用而無慮焉等如下廣釋實相下意以實相同本覺觀照同始覺以體無二故若約詮門細推則實相寬本覺狹也何者實相般若該於諸法通乎因果貫心境遍染淨本覺般若唯因非果唯心非境唯染非淨等今約性同故可配例大理也文字無知者據文字性空空即實相之心於實相中一切叵説非約諸法其性昏鈍以明之修文字下如前已引既依文字以得般若故文字即智母亦因中談果也應知下歎勝總結據諸部般若皆有歎勝之文義類實多舉要而言一者出生德大品舍利品云般若波羅蜜中生諸佛舍利三十二相亦生十力四無所畏乃至大慈大悲五波羅蜜等二總持德經説總持一切諸法則念處正勤神足根力覺道解脫勝處遍處乃至一切智道相智一切種智諸三昧門諸陀羅尼門等淨法功德靡不攝也三破障德破裂分裂也放光初品云菩薩摩訶薩欲具足薩雲若離於生死諸習者當學般若波羅蜜四證入德又云欲過八患十二衰具足佛十力十八法等當習行般若波羅蜜等又大品方便品云欲得阿耨多羅三藐三菩提應學般若波羅蜜等優勝也正覺即佛也據梁傳下且依傳説盡理言之如論所引放光道行等經及智論等皆宗依也吾解下謝猶讓也如曇雍傳云恐後不相推謝等揖亦相揖讓也意云吾於般若知解亦不讓汝而論辭典麗當讓汝在前矣論者下指一論為文字般若可知疏非知等者據論以釋之如下引經云真般若者清淨如虗空無知無見等不有不無者謂非有知非無知智體妙存義理幽密也又四句等者即有無等四下自有之大論亦多明中道無此諸見故三乘下諸般若通被三乘三乘皆修此智各各下謂所修之法無異為智不同故成三乘也清涼云聲聞學無生般若者便云一切諸法皆悉空寂無生無滅等但於嚴土利地不生喜樂而趣於寂故成聲聞乘也若聞無生便知從緣生故無生等成緣覺乘若聞無生便知諸法本自不生今則無滅即生滅而無生滅不礙於生滅以此滅惡生善利自利地成菩薩乘自乘下謂聲聞菩提等大品下具足云欲得須陀洹果斯陀含果阿那含果阿羅漢果當習行般若波羅蜜欲得辟支佛乃至阿耨多羅當習行般若波羅蜜等疏正理下唐明皇孝經序云至當歸一精義無二蓋有不知而作之者亦有知之而不正者隨見各述乖於同歸之理遂成異端紛紛然亂般若之軌轍也疏天竺等者三名之音亦相似漢書張騫傳云騫至西域大夏國得笻竹杖問所從來答東南二千里身毒國來身音虔毒音篤五印者即五印土也亦曰五天竺國天竺此云月彼有千名如贊怛囉等此方月名極多如丹桂素娥玉兔嬋娟等西域記云五天分野周九萬里三陲大海北背雪山彼國四姓頗類此方四民婆羅門德尊國人敬之故云婆羅門國也什公下晉書藝術傳及梁傳皆同父炎亦僧也龜茲音丘慈傳略云聰明有懿節將嗣相位乃辭避出家東度蔥嶺龜茲王聞其棄榮甚敬慕之自出郊迎請為國師王有妹年始二十才悟明敏過目必能一聞即誦其體有赤黶相法合生智子諸國娉之並不肯行及見炎心欲當之乃逼以妻焉既而懷什什在胎時其母慧解倍常聞黎大寺名德既多又有德道之僧即與王族貴女德行諸尼彌日設供請齊聽法什母忽自通天竺語難問之辭必窮淵致衆咸歎異有羅漢達摩瞿沙曰此必懷智子為説舍利弗在胎之證云云及生什七歲隨母能以日誦千偈凡三萬二千言事具如傳言象下略例曹魏時王弼所著以釋易經彖象等義言生等二句全是彼文也言謂卦爻之下所繫之辭象謂卦爻之象此謂因象生言因意生象故云爾也希夷下彼書視之不見章文具云視之不見名曰夷聽之不聞名曰希搏之不得名曰微此三者不可致詰故混而為一今喻下如下云欲言其有無狀無名亦可言希夷也按什公下傳云什初學毗曇年九歲時從旦至中手寫千偈從中至暮亦誦千偈隨母至罽賓遇名德法師槃頭達多從受雜藏中長阿含凡四百萬言後又通六足等論乃至外道經書四圍五明陰陽星算莫不必盡妙達吉凶言若符契等蘇摩者具云須耶離蘇摩才伎絶倫專以大乘為化國人尊之什亦師焉阿耨達經即大乘經也自此專務方等歎曰吾昔學小乘如人以鍮為金也又誦中百十二門等諸論實相者即實相般若也疏異學下謂西域外道等異端之學亦通指下準傳説什九歲時罽賓國王將試其能集外道論師共相攻難外道輕其年幼言頗不遜什乘隙挫之外道折伏又後隨母至溫宿國彼國有一外道神辨英秀名振諸國手擊王鼓求什論義什既至以二義相驗迷悶自失疏殊方下傳云母別什謂曰方等深教應大闡真丹傳之東土汝之力也什欣而從之至符堅建元十二年有星現外國分野太史秦云當有大德智人入輔中國堅曰朕聞西域有鳩摩羅什襄陽有沙門道安將非此邪至十八年乃遣驍騎將軍呂光等帥兵七萬西伐龜茲堅謂光曰若得羅什馳驛送來西出遂破龜茲載什而歸至涼州聞符堅已為姚萇所害光乃竊號自立改元太安又云什停涼積年呂光父子云云與疏略同在涼下始自呂光至呂隆凡三主繼立十三年也浮沉者謂隨時高下也苟非下繫辭文疏萇子興等者興字子略星紀下依瑤疏敘之按智論後序云鳩摩羅耆婆以弘始三年歲在辛丑十二月二十日至長安等梁傳下亦全略傳文據通鑑説秦王興以鳩摩羅什為國師奉之如神親帥羣臣及沙門聽羅什講佛經又命羅什翻譯西域經論三百餘卷大營塔寺沙門坐禪者常以千數公卿已下皆奉佛由是州郡化之事佛者十室而九疏大品下放光及小品般若亦同西域呼漢國為震旦亦曰支那或有翻云思惟國東北者華嚴菩薩住處品云東北方有山名曰清涼等然諸傳及地里圖等皆指佛國在西南疏王謙下故準通鑑亦云興即皇帝位然論主既當代之僧應備識國禮故論但言天王不言皇帝知秦主之謙也準儒書稱皇帝王霸約德業輕重為言包犧神農黃帝謂之三皇皇大也言內外無為行大道也少昊顓頊高辛唐堯虞舜謂之五帝帝體也內體無為迹涉有為行常道也夏殷周三代謂之三王以德行仁者也齊桓晉文等謂之五霸以力假仁者也準國史秦始皇平定六國以為道過三皇德兼五帝自號曰始皇帝後之國君亦皆效之然二秦初起皆即天王位疑興亦去皇帝號也春秋下春秋尊周天子為天王如晉文公召天王於河陽之類是也遊刃下莊子養生主篇略云庖丁為文惠君解牛手足之運合舞奏刀之響中音文惠君歎曰善哉技蓋至此乎庖丁對曰臣之所好者道也進乎技矣始臣之解牛之時所見無非牛者三年之後未嘗見全牛也彼節者有間而刀刃者無厚以無厚入有間乎其於遊刃必有餘地矣是以十九年而刀刃若新發於硎文多如彼蒼蒼即萬物之氣色也亦可下以儒書分四時為四天春曰蒼天亦謂物至春時蒼蒼然也莊子逍遙篇云天之蒼蒼其正色也春天主生故云蒼蒼隨俗説此以內教但云衆生不言天生也所天者儒書説天有二一穹天名天二君主名天皆以恩覆萬物百姓仰戴故也金河下即拘尸羅國之河名如來示迹説涅槃經處彼經第三卷云如來今以無上正法付囑諸王大臣宰相比丘比丘尼優婆塞優婆夷是諸國王及四部衆應當勸勵諸學人等令得增上戒定智慧若有不學是三品法懈怠破戒毀正法者王者大臣四部之衆應當苦治依仗者憑託也疏義學下喜祥傳云一曰譯經如摩騰竺法蘭等二曰義解如安公遠公等三曰神異如杯度史宗等四曰習禪如僧光慧嵬等五曰明律如曇猷僧業等六曰遺身如僧富曇稱等七曰誦經如曇邃道冏等八曰興福如慧達慧力等九曰經師如法橋曇籥等十曰唱道如道照曇頴等草堂寺者晉書與梁傳少有不同晉書略云什與秦之君臣説法忽下座啓帝曰吾夢二小兒登吾肩有欲障須婦人興遣二妓進之一交而生二子梁傳云姚主常謂什曰大士聰悟天下莫二若一旦後世何可使法種有嗣遂以妓女十人逼令受之自是別居廨舍以草為之時人呼為草堂世有題云十房美女遮俗眼一鉢金針見佛心又云什之受妓諸僧多效之什引衆聚針盈鉢謂曰能食此者可相效焉因舉舉進針如常食焉諸僧乃止層觀者即今之樓閣之類晉書下所載與什公本傳略同疏世多下如法華金剛般若等經人多傳誦注時猶此也者尚書云時日害喪豫及女皆亡彼解曰時是也若轉訓是此也非言下文亦逼似莊子莊子知北遊篇云知北遊於玄水之上登隱弅之丘遇無為謂問曰何思知道何處安道何從得道三問而不答非不欲答不知所以答也知乃反於白水之南登孤闋之上見狂屈而又問之狂屈曰唉豫知之將語若中欲言而忘其所欲言知又反問於黃帝答曰無思知道無處安道無從得道知曰我與若知之彼與彼不知也黃帝曰無為謂真是也狂屈似之我與汝終不近也莊子下即天地篇云黃帝遊乎赤水之北登乎崑崙之丘而南望還歸遺其玄珠使知索之而不得使離朱索之而不得使喫詬索之而不得也乃使象罔得之黃帝曰異哉象罔乃以得之乎一本亦作罔象也舊本下此誠誤寫不應承謬定宗者定無知為宗也決分判也亦斷也擇揀擇也疏四相下謂般若真如無緣生緣滅之相圓覺序云不滅不生豈四山之可害四山即生老病死也亦名四相賢首云非生非滅四相之所不遷無去無來三際莫之能易皆敘真心也疏略標下謂略標二經之意下論廣釋此也謂真心下通有三句初句屬體後二句如次釋前兩句疏舉妄者緣生之識名為妄識隨緣起滅故丈夫者密嚴第二云能持世間因所謂阿賴邪第八丈夫識運動於一切釋曰如世之丈夫能任重事又能與物為其依止故此識亦爾能持世間色心種子亦能與諸法作依止故喻之秖臨下潛依圓覺疏敘之法相説第八識能緣根身器界種子常侍等者謂賴邪如君常侍如侍若近臣即第七識也以此識有恆審思量之用又常執第八見分為自內我故名常侍持猶執也謀臣等者第六識也此識內依末那外緣五塵亦遍緣三世所緣之境獨影及性獨影體虗如兔角龜毛性境依他自性非有諸經亦喻如幻夢也此識能分別計慮故名謀臣五將等者即眼等五識也此之五識取外五塵猛利先鋒故喻為將擊攻也囂擾也各有下如前八識所知之境各有分齊互不相通故楞嚴經云見不超色聽不出聲又皆妄心分別故疏云知亦何真後四句等者明般若真心也初釋翻前妄心也本覺下約當體明也可知良以下出一切知之所以也即智之體即真如也擴張大也充遍也無外遍之極也佛性論即彼第二如來藏品具云所言藏者一切衆生悉在如來智內故名為藏以如如智稱如如境故一切衆生決無有出如如境者並為如來之所攝持故名所藏衆生謂如來藏況法下前解法居智內法非是心此解法依心現無法非心也疏文似等者如老氏云明白四達能無知乎又云知其白守其黑又云虗其心實其腹又云絶聖棄智民利百倍又云挫其鋭解其紛又云杳兮冥其中有精皆與此文相似義實非也疏釋之義皆依內教釋之可見返照等者不存智體即歸寂也金光下彼經第一具云佛果無別色聲功德唯有如如及如如智獨存以如智無二故言獨也目深曰窅今取深義慈恩下即大乘法師所作瑞應疏序文質體也即法身真理故云正同自下等者分文屬體也二諦乃所照之境二智即能照之心照理照事俱名觀照般若也以演下會通宗本可知疏幽屬等者明二智雙照真俗俱無知也真諦下順下以緣求知之義釋也謂真諦非有無之相真智非有無之知神謂等者謂達俗之智不徐而徐不疾而疾恍焉而來焉而往常情難測故名曰神繫辭云神也者妙萬物而為言也感之下明有知也然水下顯無知也無緣之悲者即三緣之一也一曰衆生緣見有衆生可化也二曰法緣但見衆生緣生之法五蘊四大假和合爾莊子亦云假以異物合成一體三曰無緣見生界空無可化者白樂天八漸偈略云苦既非真悲亦是假是故衆生實無度者三緣化物始名大化無相之願者即衆生無邊誓願度之願也以無能度所度之念故名無相亦三解脫門也觀機下問意謂觀所化之機可度不可度審能化之法宜大宜小等似有知也答意如下論云千機頓赴而不撓其神又云又非不應但是不應應爾此義應由機感不在於聖華嚴偈云但隨其自心為説如是法教合下釋成觀審之義亦衆生之心也餘可知疏神用等者謂權智入生死有境以化生也正智下謂此智照法各無自性唯見實相無得非得非證不證事何能礙引大疏正唯權智亦即實智以一念具故非太異也疏恐人下以雖等文勢含於縱奪恐有疑云正智居於事外應離有證空事智超於世表應非度生界故論云爾所引起信即真如門文疏初二句等者謂事智順機小大合宜權道推移不失撫會無窮者以生界無盡故悲願無窮隨他下即涅槃文彼三十五略云如我所説十二部經或隨自意説或隨他意説或隨自他意説然文甚廣多疏中略出一義也大底説自所證一實之道為隨自語隨宜之談諸乘差別為隨他語半實半權為隨自他語也清涼圭山皆如此會疏欲揀等者詳前後論文非有非無之義而有二別前約知見以辨有無此依體性以辨有無也雖真照下炳明也直據正體以示之謂即寂而照功用炳然亦非有如虗空若妄計為有乃落常見之坑也雖妙湛下謂即照而寂心境兼亡杳然無朕亦非無如兔角若情計謂無即落斷見之坑也妙存者謂般若之體不出有無亦不在有無而妙體存焉疏即心等者謂無師自然之智非因所作非緣所生心與境而兼亡名及相而雙寂也諸法下此句顯真智覺法之性萬緣下此句明俗智覺法之相由覺法性相故名聖人故佛地論第一釋佛義云謂具一切智一切種智離煩惱障及所知障於一切法一切種相能自開覺亦能開覺一切有情如睡夢覺如蓮華開故名為佛力通者謂十力六神通也依心説之而名十智能勝伏他亦名十力寄於根境所用無礙名六通也疏正漚下此亦取宗中之義釋之義利下義用利生名為義利如圭山云作有義事非仁義之義疏少選者謂頃刻少時也非直下依般若等經釋之即能所兼亡沒同果海有無不可名故言無道處寂用不可狀故心無行處疏淨名即彼經初卷中文心即黎邪和合識也意即末那識放光下義引亦初句寂也後句照也聖迹下大鈔云古譯句為迹如尋迹得兔尋句得義論意總以聖教為迹也疏以所觀等者約二諦之境明二智之心也謂所觀真諦絶有無一異等諸相致令能觀之心亦可亡於有無等知也苟無有無等知又何以寄懷也故知知自無知也心境下分論初二句先心後境後二句先境後心以心下二義出心境先後所以不以下孟子云説詩者不以文害辭不以辭害志以意逆志為得之矣準此不可執其辭之前後謂理有左右也疏前二句等者依即寂之照云知云為然般若之法非定有知非定無知皆不可取不可説也般若下潛引金剛經彼云是諸衆生若心取相即為著我人衆生壽者是故下謂不住有得却住無得亦不可也故大鈔云遣之又遣之以至於無遣若以無遣遣遣無遣亦迹何以故有所得故逈然下亦法界觀文逈遠也謂情盡見除寂然亡照心無所寄即此無寄無得之心成非知非見之般若然燈下亦金剛經略云以實無有法得阿耨多羅三藐三菩提是故然燈佛與我授記作是言汝於來世當得作佛號釋迦牟尼疏自下等者敘下問答之大意粗略也貫網之繩名綱餘可解疏難曰等者疏義如次略釋二智之相諸法之實者實性也釋論中物物斯照言盡者釋知無所遺權智下釋動與事會事亦物也必有等者以知會當然故云不虗也疏初句下亦敘設救也此同下彼天長地久篇略云是以聖人後其身而身先外其身而身存非以其無私邪故能成其私不矜下矜夸誕也恃負恃也如人薄有技能外則矜夸內則負恃君子反之內如不有外亦不矜故云忘知等也此乃賓家會主家無知之義若爾下謂若不矜恃忘知會為無知者此則但是聖人等云云為物等者物亦衆人也推讓也戴頂戴也如人虗心實德忘其知會所長人反推讓竟以知會歸之是聖人本忘其私而反得其私也然解老氏者亦有偎並內教之説似非老氏本意故依古解直消其文令人易解爾疏據上等者釋不自有其知也然此文勢諸書皆有如老氏云生而不有尚書説命云有其善喪厥善矜其能喪厥功解者曰苟有之矜之則私己之心重等大禹謨曰汝唯不矜天下莫與汝爭能汝唯不伐天下莫與汝爭功皆謂有而忘其所以有謂之不有也故論云不自有其知非無下賓意謂有知而不矜只可云不有不可云無知疏二儀下以形言之蒼蒼而上者名天茫茫而下者為地以理求之天陽也其象圓地陰也其象方以色言之天玄也地黃也故周易云夫玄黃者天地之雜也天玄而地黃説文曰天巔也高而無上也地低也又易也謂懷任萬物變易發生也略釋如此內教如劫章頌文出下即彼天地不仁章具云聖人不仁以百姓為芻狗芻草也縛芻為狗將以為祭祭了棄之如莊子云芻狗之將進也巾以文繡尸祝齋戒而將之天地無私者無生物負恃之私林希逸云言與物相忘也餘義如疏論意云下謂聖人大悲權智普度一切長辭生死之鄉永趣涅槃之苑雖天地生物之功未高於此然無緣下釋不仁也不住化相者應云不住化不化相也金剛下卵胎濕化謂之四生有色無色有想無想非有想非無想通名九類經具云如是滅度無量無數無邊衆生實無衆生得滅度者疏中摘經間而釋之義在易曉而無有下復是彼經第十七分之文然上疏義皆約悲智相導化而無化以釋不仁若取上下論文之意釋之者感無不應功高也應由感起初不在聖不仁也故下論云應而不為因而不施又云紜紜自彼於我何為等都無下以智照理不存照相義言昏也餘可知疏我言下謂木石無情之流頑冥之物雖曰無知非般若之無知所以揀也期舊作其誤書疏神妙下釋神明也然出周易上繫云神而明之存乎其人餘疏可解但矜恃互出以就句便此謂般若有知但是神明亦非不矜不恃之情所以揀也比無相下有以不矜為無知般若未識論文簡別之理故此云爾顏子下論語文曾子歎顏子曰以能問於不能以多問於寡有若無實若虗謂顏淵虗心不矜不恃也孟反下伐矜伐也事出春秋論語云孟之反不伐奔而殿將入門䇿其馬曰非敢後也馬不進也解曰之反魯人也魯與齊戰魯師敗奔之反殿後以護魯軍方議行賞之反至國門佯抽箭鞭馬以謂馬困不能進行非敢殿後以護軍也軍前曰啓後曰殿在魯哀公十一年此亦虗懷忘功不矜不恃之流可為世之賢哲豈入理之聖人乎論意以儒老不矜不恃之理恐濫無知無見之心故甄別研審假問答以揀之奈何反取不矜即為無知令人拂臂爾疏復審下全舉前難以審賓意也賓意謂聖人有而不居非無知也疏無乃下然外書多有疏略云爾疏大品下歎淨品亦云虗空清淨故般若清淨等絶相者絶知見作緣之相也大論六十五云作有二種一人作如布施等二法作如火燒等般若非此故云無作無師者非緣生故自然者非因作也意謂本覺般若性出自古法爾圓成非修非作唯寂唯照不同始覺因熏而起依緣而生亦不同法相四智心品種生緣作等疏豈待等者非如小乘滅智厭心淪於寂滅名無知也亦非如莊老之意五色令人目盲五音令人耳聾絶聖棄智絶仁棄義冥冥昧昧守朴略昏默之道為無知也疏假牒下論亦太略應云若謂般若有知但性空故經云清淨者疏惑智下分別之心名為惑智四倒有二一凡夫本四倒謂生死之本即以無常見常等故二小乘末四倒謂生死之末故即以常計無常等廣如略鈔六粗者以能分別現識所現六粗等境名為智相即事識惑也疏即真諦下謂真諦是般若所知之境以所知清淨故遂令般若亦清淨矣疏宛然者猶居然異也疏以軌下謂真諦若有淺深之迹可與般若為軌則令知有際限今既無之豈有不窮之鑑哉差亦差遺疏此但下以論初但總相包舉略示之而已故此問答漸漸委釋非指前四段之宗疏此難等者以知與不知敵體相反般若一法兼具二名所以難也今且下依世間道理故法爾以來由諸有情慣習之力依種種物立一一名召物以通其事然成立聖教方便施設故立三界九地諦緣學度等名依俗諦説亦皆可名之物也故仁王經第一云一切諸名皆假施設乃至云諸佛出現為有情故説於三界六趣染淨無量名字名正下論語子路章云名不正則言不順言不順則事不成等疏二名下論語略亦應難權云聖心無為又云無所不為疏例如下上併舉二喻相違之名以況之亦分喻也以寒暖等體殊般若唯一故言教下言名也名詮諸法自性盡三藏之所説理大同也立名下知者可以名有識無知者可以名無情水火等皆然故疏云定體疏此言下置捨也謂但可依實起名依名索實雙非下謂聖心非有知非無知若是二名尤不可俱立也疏亦義引下但合集放光等上下之文引之不知下正釋論文令忘名下不可守滯互違之名以定神心唯可假乎二名以達妙旨謂般若性淨本無惑取之知可名無知名無知者意在揀妄豈神智之真名謂般若靈鑑靡極可云有知名有知者意表靈明亦非神智之本名故知聖教立名本為攝機於不可明中強名之爾故經云無名無説等法華亦云但以假名字引導諸衆生奈何封名之徒隨名求實守違順之名求同異之理譬執迹為兔認指為月此得名失旨之謂也疏大方便下此義前後頻出疏微妙等者下以前引經真般若者無知無見等用之等者聖智之用照理而恆遍達事而常周聖智苟無孰與道遊邪亦擬下彼谷神章云綿綿若存用之不勤大論下次云順生死流者多著有逆生死流者多著無等疏謂般若等者謂照體妙存豈斷滅之無雖靈鑑炳然亦非常存之有非一者約義異故非異者約體一故中道者六十一論云有相是一邊無相是一邊離是二邊行中道等疏無以等者以體一故二名得以相即據此約二義而立二名非體有二也戒止者戒其執名之人令止之而弗執也疏法性等者釋論之真諦深玄論文反明疏意順釋疏反明者言經辭反明也言見真者證見明見非能所見疏乃引論順示解脫涅槃皆真諦也疏意云下且示妄心妄境以例真也妄心生時託境以起故以境為所緣緣也真即下指定心境當證下彰有知也疏文即等者大品亦第十六卷云佛告須菩提若不緣色生識是名不見色相然二文皆通一切法不獨色也當知般若見色即是見空而不住於色經雖言色乃即空之色空依色顯色空一致舉色全真疏但釋等者亦例釋般若不緣色生識也此中雖舉五陰意以清淨為境不對五陰之相今且下生知則為緣不生知則非緣今且順問意云所知即緣也究竟下指後文今真諦曰真真則非緣真非緣故無物從緣而生也知言者論語云不知言無以為君子也謂識中理之言謂之知言疏初句通標者明知能知該真妄也疏物者下謂心境通呼為物也相與者相因相待之謂與同也亦共也求義無殊謂有則同有無則同無本非下大鈔云謂清淨法界本無內外不屬一多令人悟入義分心境心則諸佛證之以成法身境則諸佛證之以為淨土疏中分文屬體寂照為一心境為一也涅槃下第二十七云佛性者名第一義空第一義空名為智慧寂照湛然者即本論寂用一源理極同無聖所不能異之義也心境互現者謂心亦即境之心境亦即心之境大疏云即心了境界之佛即境見唯心如來以性融之令心境互現疏真非等者謂真諦非緣生之法無相無名智對之時亦不生知是知般若亦非緣生妄自下可知疏所知者等者疏釋生有二妄知託境而起可言生也真知本知以生訓因也真諦等者此謂不唯不能生知又由真諦軌則令不生知也起信云摩訶衍者總説有二種一者法二者義疏解法云法者出大乘法體謂自體故對智故顯義故對智名法蓋與智為軌則也法者軌則為義也疏真則反此者謂真智照理情盡見除無所取相相既無相心亦不生疏自下等者預出後意於中相因為緣有知妄也非因非緣無知真也真妄總問以起下文疏境未等者亦由相待成心境之名未對之時二名不立也起信下即彼釋不覺中文也謂此前説黎邪三細今躡第三現相以示六粗然論有兩重因緣即無明為因生三細境界為緣長六粗今證境能生心也由心下因心生境也問心境相生誰先誰後謂心先邪境無誰生謂境先邪心無焉起答非先後非不先後何則非先後者謂唯一藏識心故即心之見分為心即心之相分為境雖有心境不可先後而行相微細亦非下位可了故楞伽云如是藏識行相微細唯除諸佛及住地菩薩等非不先後者謂即此藏識顯現境界而生七種轉識種種分別此以境界在本識黎邪中先也依之而生末識後也且依本末分相示之其實二識俱時而起心境二法互緣而生楞伽又云藏識海常住境界風所動種種諸識浪騰躍而轉生疏自無主宰者謂法無自性從緣故空緣成如幻故假大論中此義尤廣疏亦義引下文無此文義有此義引此通證上下疏大品云者義引亦如中論第四云未曾有一法不從因緣生論意謂是緣則生非緣何生下約喻例明理亦昭著中論云下具云果不從緣生不從非緣生等亦可下又為一解可知言微妙法者真諦般若皆妙法也疏初二句等者意云取境則生知真智不取知自何生永嘉下諱玄覺嘗謁六祖經宿而去時號一宿覺寂境也以能之心知所知之寂故託寂知起寂為緣也如意者即搔癢如意手也能所執宛然失證會之同疏有所下乃潛用起信具云以一切法從本以來離名字相離言説相離心緣相末論釋之遠離三假相也誰謂下釋論智非無知也疏已上等者通會論意實智可知疏引中吳其義甚通疏設爾下雙關以難意云取與不取有何過謬疏二俱下意謂無知則不取知則取之疏了了等者釋知即不取也遍計下枝末不覺已亡無明下根本不覺又盡大論十八云般若波羅蜜譬如大火炎四邊不可取無取亦不取一切取已捨是名不可取等永嘉下謂亡所知存有能知也亦非下以自知為緣見有知相也如手下雖亡如意猶存能執因手作拳如因心生知也非是下謂存有作拳之手則照體未能無自也苟未亡此何以悟同而沒於果海乎契證之妙理不越此達之則省力而直詣背之則枉工而轉迂疏不取等者以前後二難皆牒不取以難之故疏分之可知謂了物下物通我法也二執下謂執我之見引生煩惱障執法之見引生所知障也聖人已斷故無惑取也疏是者等者憑理印忍名曰忍可不謬釋是也印物等者當印物時心為主質質體也若心下對而釋之今既下意以印可為心之用有當為心之體空空如也論語云子罕篇有鄙夫問於我空空如也我叩其兩端而竭焉疏有當等者依迷悟之懷比對而釋之也初約迷者謂凡印物照境知其是而不忘其當皆惑私之取著也由此生滅微細之心故未得真智淳淨明性求當求是又灼然有心於是當此則有照有覺未能無照無覺也圓覺起信俱有此説今般若下約悟者謂能了此見是見當之覺為病不當下寂滅無心體極一念便契佛家如荷澤會禪師云妄起即覺妄滅覺滅豈云下反責前難也論既云是而無是當而無當蓋即是即當時無是無當豈云一向等邪此亦下大意則同然知則通該是則但於知中説是當一分之理也疏義引下大品照明品云般若波羅蜜能照一切法舍利品云菩薩般若波羅蜜知一切衆生心亦不得衆生乃至知者見者亦不得等疏非不等者難意已達忘是忘當之理物我蕭然無法寄懷疏境空等者意云住是住當猶染有病而是於無是當於無當可乎此非相違之難但問其可不之意疏罪也者轉訓失也謂住無相不失於真諦疏舉聖總遣者宗本中不存無以觀法可謂識法實相矣又云聖人無住於無住孰謂住無得之真乎疏無相等者謂有一無相當懷即是相也引論可知三十八又云佛法不著有不著無有無亦不著非有非無亦不著學般若者學雖通於三乘法則唯是一乘之般若在乘則一致而百慮於法則殊途而同歸住有下建有為功行棄妄求真種種方便一一願門內則未能悟心外則未能忘相住此之心喻之火也住無下謂心寂境空物我兼喪行不涉有心獨住無兀兀冥冥昏昏默默不唯一慧而不明實乃萬德淪滅住此之心而喻之水也若有無下示中道無住之心故疏避有等者釋喻可知以著有下著有之病空藥可治著空之病無藥治也且責偏空之見撥棄因果故此痛呵然非有無以立德非空無以蕩相苟中道而行之則二德齊立二病俱瘳矣如火出水中者中論第二云如火從薪出以水可滅若從水出為用何滅假設其譬然楞嚴説風金二輪相磨海中見火莊子謂水中有火乃焚大塊求其實則亦有之今非正取也病因藥起者中論云譬如有病須服藥可治若藥復為病則不可治亦假設也然世因藥餌致病亦多如唐憲宗服仙藥過多得急燥之病等是也舉此皆喻難治疏處有等者大意取之則二見隨生捨之則二德俱棄不取不捨始為無住之行至下涅槃論中可以精曉疏此約等者先大意斷定老氏之意不與物競和混也同塵同物也論言塵勞即生死界也疏釋往來之義一依大鈔解往復無際之辭及依不遷論中靜動不違之理釋之了知下楞伽第三卷云非於生死外有涅槃非於涅槃外有生死生死涅槃無相違相疏此難等者以論云聖心雖無知遠取則通縱前也近取則但縱無住也今言無知猶云無住機熟等者遺教經云應可度者若天上人間皆已度訖其未度者亦已作得度之緣故謂宿稟修者此生度之今生創信之流或聞名或聽法禮供讚悔等皆成當來得度之緣設若不信邪見之儔亦皆與作遠因爾如華嚴説疏正難等者疑謂權智隨緣生滅也疏前二句下謂心法四緣生緣離則滅如眼識起必具四緣一識種子為親因緣二眼根為增上緣三色境為所緣緣四無有間隔剎那相續為等無間緣也餘識亦然聖心下謂聖人窮盡剎那之極際了證生相之不生一念絶眹三際頓破故放光十三云般若亦無法可生者亦無法可滅者四相者即生住異滅也然此四者亦相因而起剎那循環迷其相則分分歷然達其性則位位皆滅故楞伽剎那品云初生即有滅不為凡人説今生相尚自不生住異焉從而起好思歷然可解疏華嚴等者即第八十頌云佛智廣大同虗空普遍一切衆生心等金光明如前無心心者一無妄念生滅心之心一是寂然無相能照之心餘可知無私者私謂情私之私如見親則度見疏則捨化導不均不普故成私也準清涼釋無私成故亦云無思如摩尼雨寶而應求天鼓出聲而報賊喻後得覺物感之而形應不在我故云無思如前論云神無慮焉等然私思皆用義方周美疏是唯者莊子齊物篇談天籟云是唯無作作則萬竅俱號是唯猶諺云只除也此言不應在乎無感感無不應如谷響答呼月影印清虗無下莊老談道皆宗虗無也謂自然之道至無故老氏云虗而不屈又云虗其心又云當其無有車之用又云復歸於無物等疏依正教釋之亦當論之意也賢首下即起信序大意生滅在機聖無去來據此無憂樹下來而非生力士城邊去而非滅但由吾心緣感之濃淡也疏此辨等者疏意云聖智虗無非生非滅前有明文惑智但云無性未嘗言無生滅故疏會意云約俱無之意説無生滅也惑智之生從緣而有無自性生無自性滅也疏亦猶等者舉例二諦之言皆諦實名諦審諦名諦以真俗分之隨分成異疏謂聖心等者唯識頌云由彼彼遍計遍計種種物謂於無我無法物上周遍計度執實我法準此我法二執皆名遍計也準起信説從地前三賢至第七地滿心二執方盡識相下謂本識三細之相即八地已上至佛地破之但滅識中一分不覺之相不滅一分覺性學論可地永嘉下具云不以知知寂亦不自知知不可為無知其性了然故不同於木石如手不執物亦不自作拳不可為無手以手安然故不同於兔角然此之頌前揀有知之妄後揀無知之非其性了然顯體圓照而非斷也妙哉至哉識悟如此千載之下令人服膺也荷澤下圭峯略鈔引之故序云心寂而知目之圓覺等衆妙之門全老氏文彼云玄之又玄衆妙之門華嚴下謂財首等十人問文殊師利菩薩也然智知各答一頌答智頌曰諸佛智自在三世無所礙如是慧境界平等如虗空答知云非識所能識亦非心境界其性本清淨開示諸衆生略釋如疏此論下本以無知之義顯于真智然智則知矣知亦智矣所以不分非約三種般若分體用也細示恐長疏妄境者五塵等境名妄境也今以下妄心妄境皆緣起性空俱為般若所照真諦之境一心下且依異門分之如何下結責前難也疏此中等者隱猶深峻也見音現難現於心也初句下若不標乎法體寂用等義向何辨之寂用義也者若單云寂用亦法也今對心境故云義也即智下示二法無異體也華嚴下即回向品既如智不相外二而不二也今論下寂如即真諦之境智用即般若之心言用下等者上來通敘大理自此按文細示即體下心境兩分也彼此下以心為此以境為彼雙攬下前二句則前後異説謂如之與用正同而異時唯異非同等此第三中謂正同而異時即異而元同非前後也故云雙攬是以下假以問曰同則唯同異則唯異何言異而同同而異邪舉論答云是以辨於異而同者云云在疏下可例説第四句復由第三中來以其同而異故非異而同等斯則下等者可思得之此中四句非彼此對望義相料簡以寂用一源之法元具此四理宜用心照文理燦然疏釋前等者如一智一故言無二謂如理智也實謂真實者即前真諦之境舉萬法者緣生即空是般若所照故如心經云行深般若照見五蘊皆空不於蘊等諸法之外見空前論云見法實相謂之般若等內外等者釋相與之言疏釋前等者然寂用二名亦心境相待而立依寂起用用許異寂二名立也今明體外無用攝用同寂用亡之時寂亦不立當知寂用雖復略標亦隨俗説第一義中逈無所寄餘義如疏疏鶴長等等者等山嶽太增澗壑太陷鵾鵬之輩太巨蟭螟之儔太細等也然性下以相取之則異以性酌之則同同則本同豈待續之截之夷之盈之而後平等邪即莊子駢拇篇疏引全彼文疏大品等者文小不同大論第一百云色等一切法於般若中亦不一相亦不異相等仁王亦云般若非即五蘊非離五蘊等疏初二句等者謂寂用唯一心也如摩尼寶珠圓體混成寂也清瑩明徹用也離之則二相不同合之則內外一貫可反照而自求勿循言而他覔語借下彼初篇云此兩者同出而異名借以成辭寓論旨之妙亦非下遮異解也恐人見寂用同出復有根荄源於寂用如下答寂照云理極同無既曰為同同無不極又云若稱生同外稱非我也亦合云下以義準之理必然也舉一隅可以三隅反苟執文以定義義之害矣約體下體重可稱為主用輕可呼為賓疏心用等者此中舉心者全實相之一心性相融心境一權實同物我通而依文析理權實殊明約旨會宗寂用一貫疏盡物外者象謂萬象即萬物也以佛理世表故云象外清談者謂上論般若高出有無深超情識真清淨無相之雅談也然上下通敘前文可知初翻亦二智俱説第二亦含有二智第三以緣求智唯談實智第四答不取亦通二智第五答是當亦通論二智第六答住無唯實智第七答生滅唯在事智第八答俱無唯在實智故疏云爾或境智下如答是當及住無等皆含境智同異料簡等可知然論之首尾固不可以淺深酌量然成立之妙疏亦略示今欲縷示又恐厭繁可課虗求之自識精巧疏説文等者詣亦至也諸説者即瑤疏淨源疏等説也漢楚下即高祖弟劉交也封於楚諡曰元遺民其後裔外善下謂周孔六經及諸子之書等內研下研磨也亦切磋之謂又能精治佛理也與儒者下遠公傳云清信之賓並不期而至彭城劉遺民豫章雷次宗鴈門周續之新菜畢頴之南陽宗炳張菜民張季碩等並棄世遺榮依遠遊止廬阜山名在江州十八賢下準遺民蓮社誓辭云同志息心真信之士百有二十三人據此不獨十八賢也唯謝靈運作廬山十八賢贊即遠公生公道敬等九人梵僧覺賢耶舍二人前敘遺民等七人是也以傳多談十八賢故且依謝康樂標之精結下精專也結約也種蓮以象淨土之蓮池準宋李公敘李伯時畫十八賢圖東林蓮池謝康樂開也康樂求入社遠公謂心亂而不可嘗以書招陶淵明淵明辭醉而不應故後世題云陶亮醉多招不得謝公心亂去還來龍光寺名生公所住也生公傳云與慧睿慧嚴同遊長安從什公受業關中僧衆咸謂神悟時與論主相得莫逆者謂相契順也平叔者即魏代何晏字平叔與王弼等善清談故遺民方之以論主為僧中何平叔也起豫者論語云起豫者商也始可與言詩已矣大意孔子欲説詩卜商善識其旨能起孔子之説今以方之瑤和尚下以理詳之實如瑤師所指論注才同者經史亦多通用智度十六云裁欲求出其門已閉瑤本用才字疏遺者下古之高士以道德自居忘身遺世如子陵戴逵之流天子不得臣諸候不能友謂之處士遺民亦斯人之徒也虞仲下論語説作者七人矣謂虞仲夷逸朱張柳下慧少連等皆逸民也柴桑縣名桓玄者即東晉司馬桓溫之子僭逆者謂將取晉室事在安帝世恐繁不敘磐石大石也纍卵者傳略云晉獻公作九層之臺百姓嗸嗸莫敢諫者大夫荀息入獻公逆問曰將諫寡人作臺乎荀曰無聞君好技臣少進之公曰何技曰能纍九卵公喜令纍之至七至八其勢欲傾公曰危哉荀息曰此未危也公築九層之臺境內疲瘁百姓離畔此實危矣公喜曰善諫云云辟除授也命召命也太尉等者宋太祖劉裕嘗為晉之太尉高尚人相禮者裕觀劉志不可力屈與司徒王謐丞相桓玄等群公議遺民之號旌焉沖深也邈遠也高尚者德高志潔可尊尚也仰字者仰慕也疑佇字誤陸沉者陸平陸也意謂有德之士不登顯位在平陸沉隱山林等者指廬山也疏引古等者今古雖遠妙契悠同況南北數千里之遙何能隔乎玄悟繫辭云同聲相應同氣相求此之謂也毛詩棠棣章云況也永歎疏淵對者謂師資深相對偶也已盡下謂過半已盡解徹底也語用下繫辭云智者觀乎彖辭思過半矣慣悶也音悶心志不寧貌疏一所棲等者謂僧具六和一身和共住二語和無諍三意和無違四戒和同修五見和同解六利和同均今疏隨文配之於六或闕疏諸侯盟辭下按春秋傳僖公九年葵丘之會陳牲而不殺讀書加於牲上書謂五命初命曰誅不孝無易樹子無以妾為妻等曰凡我同盟之人既盟之後言歸于好銘刻也銘名也謂名記其志也如殷湯以銘辭刻于盤云苟日新日日新等是也遺民之意以寄託之誠刻銘于心如日月皎然也疏易初卦者即乾卦九三爻辭乾象如此蓋君象也初九潛龍勿用如舜漁於雷澤九二見龍在田利見大人謂大人之德漸顯天下之人利見九三君子終日乾乾夕惕若厲無咎文言曰重剛而不中上不在天下不在田故乾乾因時而愓雖危無咎略解曰謂此爻居上卦之下故曰上不在天處下封之上故曰下不在田乘二爻之陽故曰重剛不中象人君創事上未獲九五之尊下有重剛之嶮正行之難故晝則乾乾而不息夜則憂惕若有危厲未嘗去懷也遺民謂社主行道進德晝講夜禪勤用不息故云乾乾等豫近稟下上師西域烏思人少出家誦五分律并誦諸部般若學瑜伽顯揚攝大乘等諸論中年遇帝師拔思巴上師又稟密藏灌頂主戒常課曉夕禪定三十餘次説法施食日無少暇亦嘗再四問師所解以經律論及密藏略出五百部盛業不能盡述過順者論語為政篇云吾十有五而志于學三十而立四十而不惑五十而知天命六十而耳順七十而從心耳順者朱文公注云謂聲入心通無所違逆也疏謂論主等者謂方廣教理深廣如淵海冥深杳也疏理非等者謂悟理不拘於廣部略部樞門樞紐也機發弩之牙皆取要約處苟得樞機之要則衆理彰矣今此論即諸部般若之樞機八部下古列八部謂放光大品小品光讚道行金剛勝天王文殊問等然今之藏中般若部類尤多未敢詳定疏雪曲者即古之陽春雪曲也以音調極高唱者無幾從有唱者又無和者古人云其調彌高其和愈寡所喻可知反推者蓋反辭以推其理疏中順釋可知意云若非是忘於言象之外者作此之論不能至於如此幽微也若存言象其旨必乖婉轉者他文用宛字禹大禹夏王也禹在堯世治水亦親力行之股無胈脛無毛手足胼胝及登位卑宮室菲飲食孔子歎其德全無間然如論語及邢眪疏疏從容者謂舉動之間暇也疏文借下彼天道篇略云齊桓公讀書於堂上輪扁斫輪於堂下釋椎鑿而上問曰敢問公之所讀者何言也公曰聖人之言也曰聖人在乎公曰已死矣曰然則公之所讀者古人之糟粕矣桓公曰寡人讀書輪人安得議乎有説則可無説則死輪扁曰臣也以臣之事觀之斫輪徐則甘而弗固疾則苦而不入不徐不疾得之於心而應之於手口不能言也云云疏初四句等者知即用也文出下即彼初篇無名者謂天地已前混然無象無象則無名目道也有名者謂氣質已形隨形名物曰天曰地等故無名能始天地有名能母萬物母者生息之義疏遺民下不欲獨任其責疏餘本等者細詳靈字似涉差也何者靈智靈也今言窮靈能窮極者智也所窮又智故不可曉一也極數謂悉覺諸法文闕證真二也下就問而答云夫無寄在乎冥寂冥寂故虗以通之妙盡存乎極數極數故數以應之斯足良證三也故依瑤本問意下以文難故出意釋之寂目真諦之境用屬真知之心妙盡者謂智冥寂智亦兼亡符合為一邪蓋不分心境為二不在下釋自然也不對二諦説之直就智體顯示詳疏可知疏若實智等者意云心境冥一不應存有寂照二名以定慧二故寂照亦二蓋以定慧為寂照也何成冥符若許冥符不應存乎寂用定慧乃緣起因修寂照即本覺性德故以定慧合寂照為問文借下繫辭云乾坤毀則無以見易易不可見則乾坤等疏文總等者皆上句舉論意下句難也疏釋多依瑤疏此亦極難故具出之不合云下如前云獨覺冥冥又云內有獨鑒之明虗不失照等皆是也意云下如前云神無慮故能獨王於世表等詳下等者如下云妙盡存乎極數極數故數以應之意云妙盡極數神乃淳於化表極數故數以應之謂極數故方能應數也難意謂照真之智唯極數不應於數應數則不照於真故兩心成異答意謂正由極數方能應數正由應數而即窮虗何異之有疏深證等者一理量二教量注撫安也亦猶接也權智撫接於物疏先可等者無相真也變動俗也楷準也謂則定也覩觀也意云若唯見其動與之撫接契會於機此居有相而失無相若應會之時但觀緣生性空之理則無生可接得一下得之理失之事等若令下依諦以二于心疏敘前等者謂先舉可疑之文以起難疏例之者而物無不是宜其真是也疏是當等者指前本論已是下即前云物無不是等後復下即前云物無不是故是而無是等矛槊也盾干盾也昔有一人雙衒二物而市之衒矛云能刺十重之盾衒盾云矛刺不入故喻相違膠漆者雖二物似殊而性實符合喻不相違是此也疏恐救下意云至當者非泛常之苟當真是者非泛常之苟是疏惑不等者潛用韓昌黎師説彼云師者所以傳道受業解惑也人非生而知之孰能無惑惑不從師云云疏好相領等者遠公賞歎不妄許也本傳即論主傳恆沙下謂心俱恆沙性德教義詮量亦無量差別遠宗下據遠公傳云嘗注法性論以示什公什公歎曰邊國之人經論未廣所述便暗與理合豈不妙哉什公傳亦與秦主著實相論二卷恨未見之然法性實相皆諸部般若之理名異理同故疏云爾疏聊爾者猶瑣細也疏書式等者古人有之今即未見況猶意也疏初二句下意謂廣之題端若書首便云服象雖殊無所因起無此式也疏嘉遁下即易天山遁也卦象如此陰化至二為山象如秋氣盛時山乃漸長天亦漸高而避之故冬之天曰上天是也以象小人道長君子遁之故第五爻謂之嘉遁嘉善也此爻雖有應在內然知機而作與時消息亦遁之善者也何嘗下舊讀云何嘗不遠今以句法理況推之宜長讀之釋意亦與舊説不同舊云喻林下之雅詠解者林竹林也晉時嵆康山濤向秀阮籍阮咸王戎劉伶七子隱居山陽竹林並清談道德輕蔑仁義放浪酒色不拘禮樂時人謂之曠達然大亂人倫為名教所黜自唐瑤禪師立此説以來歷世承之豫意以謂蓮社清衆不當比於竹林放浪之流念佛之詠亦不當比尚無之作唯聞東林宵夕之修心禪講穆穆未聞半月之一集歌詠紛紛又但云林下則方外之人所居之處皆可名之非七賢之所宜專也亦嘗以此句就名儒盧翰林摯推之句讀同豫又云言集之言亦語辭如詩云采采芣苡薄言采之采采芣苡薄言有之詩注皆云語辭豫固末學苟理致明白當仁不讓誰循覆轍以蔽後昆故前後釋義有異於古者皆此意也亦不一一較乎得失指摘瑕疵依法不依人聖人之良訓餘如疏讀音逗疏清承下等者膺亦𮌎也企望也抱一者老氏載營魄章抱一能無離乎專氣致柔能如嬰兒乎不獨下毛詩云高山仰止景行行止一隅下如符堅云朕統大業四方稍寧唯東南一隅未賓王化亦以晉為一隅疏但欲下於我則不足於君則有餘疏草堂下什公傳云秦主使沙門僧僧遷法欽道流等八百餘人晉書云草堂坐禪者常數三千今云五百從本論也疏俗主者儒者以仁聖之君為英主昏暴之君為虐主庸常之君為俗主五胡者一前趙劉元海胸奴人自西晉慧帝大興四年立凡三世至東晉成帝咸和四年為石勒所滅二後趙石勒北方羯種人自成帝咸和三年立凡四世至穆帝永和八年滅三前秦符洪西域氏人自穆帝永和七年立凡六世至孝武太元十九年為姚萇滅四後秦姚仲弋亦羌酋種自孝武大元九年立凡五世至安帝義熙十三年為晉滅五魏拓拔圭亦丐奴人自武帝太元十一年立改國號魏年曰登國凡一十一世分東西二魏東魏禪于高歡為北齊西魏禪位于宇文泰號後周也塹城外壕塹也不遠下不以萬里為遠也無出下譯場則三藏遍翻弘護則一人親御百官信奉萬姓歸依論其僧則若梵若漢八百許人並白眉互揚青眼相擊唇齒瀉珠璣之美𮌎懷發錦繡之鮮行潔冰霜志堅松柏請對史鏡自識芳猷疏領公等者遠公傳云初經流江東多有未備禪法無聞律藏殘闕遠慨其道缺乃令弟子法淨法領等遠尋衆經踰越沙雪曠歲方返皆獲梵本得以傳譯華嚴下大鈔略云初東晉有沙門支法領志樂大乘損軀求法至遮拘盤國得華嚴前分三萬六千偈等自下疏中皆略各各本傳釋之更引實多疏論主等者秦主弘通三寶明時也什公真正善友也廁次也謂不比行也彩光彩容彩列行列也身子舍利弗也郁郁文盛之貌陳迹者謂已陳之蹤迹然出莊子引之恐繁流芳下謂流傳芳美也晉桓溫云男子不能流芳百世等寥寥者謂法教雖盛而龍象稀疏疏傳説下即慧觀傳也生公融公能通人疑情肇公觀公善靖其問難然當時人物既多評薄隨有如生公傳云生睿發天真嚴觀窪流得慧義彭享進寇淵但默塞者矣釋曰謂生公睿公聰悟發於天性窪深也嚴公觀公深思流連始可繼足彭享言努力方得前進冠姓也名道淵此公對于三人但默塞無言而已然戒行高潔為劉慧林師駢並也八俊者生也肇也融也睿也影也嚴也恆也觀也有説無恆而有憑公然憑公無傳似誤也西河照公意謂公為一亦有云恆者北山録説什門十哲八俊之上又加道恆道標此等皆有正傳同氣下繫辭文具云雲從龍風從虎又云鳴鶴在陰其子和之等莫逆者莊子太宗師略云子𣏌子輿子犁子來四人相語曰與孰能以無為首以生為脊以死為尻孰知死生存亡之一體者吾與之友矣四人相視而笑莫逆於心遂相與為友念佛詠下未見其文遠公詠序云夫念佛三昧者何思專想寂之謂也等比興者毛詩多託物比興如關睢鴟梟之篇皆是疏即弘始等者論主自作注經序粗音粗略也成言者謂什公已成之言論主注之疏郢者下亦少變本文令易知也彼徐無鬼篇略云莊子送葬過慧子之墓顧謂從者曰郢人堊漫其鼻端若蠅翼使匠者斫之匠乃運斤成風聽而斫之盡堊而鼻不傷郢人立不失容釋曰堊白土也此亦寓言疏自疏云下即前論序云般若之體非有非無虗不失照照不失虗等至後斯理之玄固常所迷昧者矣論主再舉以答也疏出問等者亦再舉前難出彼所問之意疏兩言下瑤師之意雖各四字不出權實故亦兩言也人情下遍計識情淺近遲鈍知一暗一隨自所達謂二智兩殊聖豈然哉疏答前等者即窮虗極數至後出過中若窮虗極數乃至定慧之體耳雙絶者謂寂照兼亡無可擬象故寄言同無非有無之無也反責下責其同極之體無相無名此中不可更求定慧兩殊但聖人攝化非開示一言而衆生無由悟入故示其親切處云所言法者謂衆生心復由此心從本已來清淨無染離喧擾之相故曰寂也具靈明覺知故曰照也圭峯云心寂而知目之圓覺然求證此心一悟二修悟則達其本來所有之真從先所無之妄依其悟徹之智修其緣起之行此行約事門修之則不修而修萬行畢備約理門修之則修而無修一心寂寂此之二門亦不可先後故始以止觀統之則止觀皆通事理久之乃成定慧則定慧各通止觀終證此心謂之寂照寂照者心境不二權實雙含體用融空有絶當此融絶之處何容分箇寂照之異邪此實性理之要故略敘之然皆依賢首清涼等義非𮌎臆也疏遣妄等者意云同極乃定慧之源本自同而生異下遣等者謂既有異即乖於同無得下諸部般若之中詮法無量若一言以蔽之不出無所著無所得苟於外無著則法法平等於內無得則心心寂滅然後心無礙般若現前不得而得菩提得也不證而證涅槃證也雖曰證得寧容有得證之相乎故什公悟玄序云忘功者道合虗懷者理通冥心者真一遺智者聖同疏答前答者即前云謂將心體自然乃至群數之應或幾乎息矣等疏初摘句以斷大義後清淨已下方釋文也非色下略遮亦非有非無一切不足也韋提者即瓶沙王之后懇誠懇也切至切也無量壽經略云爾時王舍大城有一太子名阿闍世隨順調達惡友之教收執父王頻婆娑羅幽閉置於七重室內制諸群臣一不得往國太夫人名韋提希恭敬大王澡浴清淨以酥蜜和用塗其身諸瓔珞中盛葡萄漿蜜以上王如是經三七日王顏和悅阿闍世王知之即敕內官閉母深宮時韋提希被幽閉已遙向耆闍崛山為佛作禮乃至佛於山沒即於王宮出等勝鬘下即波斯匿王女仰即慕也祈請也夫人經略云仰惟佛世尊普為世間出亦應垂哀愍必令我得見即生此念時佛於空中現等智則下由智相即令身無礙法報名真無去來故他化皆應應機起故疏自此等者謂非有非無之義通體及用故約用故則亦非有知亦非無知故下云道超名外因為之無等皆目體也又云聖智無知而無所不知等目用也故疏云兼通有知諸心心下略釋如前緣有下釋有不自有託緣而有故論云以其有有等中論云未曾有一法不從因緣生等疏初句等者對妄釋真真非緣生非緣生故聖人之心不因緣有而有既是非有之有故有其真有成非有句以有其無有故則成非無句疏釋太簡疏欲明等者前略示真妄不同今此細明兩殊就答前難以前難云窮虗極數等數謂妄心妄境也體其性虗故能極數等如下示之今躡妄示真為下非有非無之義因初二句下影喻相響喻妄名者質之與聲皆喻妄心謂心下疏亦太略若具釋者謂能現有無之心即黎邪三細中現相也此心能現一切六塵境界一切境界不出有無也以有此境牽起內心內心者即事識智相等也智相於此相續分別謂有謂無依此影響之境而生一切名相即論中計名字也名相既立依名取相種種攀緣疏中指同起信故此釋之不依此論釋義不盡大乘下亦龍樹菩薩造人喻現相羅人喻有無等自畏喻智相等四粗分別大意云境由心起不知即心已為迷謬而又從之種種分別愛不愛等又倍迷也故起信云一切分別即分別自心等疏初句等者躡前不有有下文也謂妄心則隨有而有隨無而無聖心不爾故云廢也翻前等者謂聖心非相因而起疏亦至略今再示之心無影響者謂聖智清淨絶有無諸相言象莫測者謂聖智非名可名非相可相亦離攀緣妄念也道絶群方者道即般若也由非名相所以能窮其虗極其數由窮極故所以妙盡而冥符無寄如疏疏初三句等者前則即俗成真今乃即實名權疏此論等者疏乃通論上下之義此中下揀斷常也論略云超名就句故疏具云雙超名相然般若下論初已釋大意無殊勝熱下即善財所參一善友經云見彼勝熱修諸苦行求一切智四面火聚猶如太山中有刀山高峻無極云云大疏略云勝熱者於五熱中成勝行故體煩惱熱成勝德故等四面火聚者四句般若燒惑薪故中有刀山者無分別智最居中道無不割故高峻下高而無上難可登故又云四句即四邊取則燒之離則成智故大論第十八云般若波羅蜜譬如大炎四邊不可取無取亦不取列子天瑞篇云者趙襄子狩中山藉芿燔林扇赫百里有一人從石壁中出隨煙燼上下衆謂鬼也火過徐行而出人也襄子怪而問曰奚道處石奚道入火人曰何物為石何物為火襄子曰而向之出者石也向之涉者火也人曰不知也釋曰不知是火亦有冥通於物物無所違而火與刀山即是法門彼何與斯疏舍利下即大品意謂知一切衆生亦不得衆生即知而無知之義照明品中照一切法知也畢竟淨故不知也引三慧品證無為而不為可知疏初句下羈係也此下等者謂答前心數既玄而孤運其照細示如前前後照對方知論旨的然可解疏初句等者以前遺民云而今談者欲求聖心之異等故今舉而責之隨聲下十地論釋示説分齊中文論云隨聲取義有五過失一不正信二退勇猛三者誑他四者謗佛五者輕法雷同者謂春雷一發百蟄同起今取同義俱出下彼四十一篇云大方無隅大器晚成等用其文不取其義廉隅廉稜隅角也前識下彼三十八云前識者道之華而愚之始今謂前境所發之識謂之前識疏由前下謂即言定旨等通成此二見也疏不合下中論云因有而生常因無而生斷疏初二句下潛用大鈔謂緣生恆無性無性恆緣生理事無礙也疏初二句下可物執取於物也紛紛紜紜廣多之貌三假者仁王經大意云法假即相也名假即一切諸名受假者謂妄想領納也陳列也如不真空論釋之真空下即還源觀序初二句迷真智而成妄想次二句迷真如以成名相物非下境空也受取下心空也名相性空即圓成性大論四十一云取色取名故名為受等疏不取下依境辨心靡無也意云名相即虗而令智照自寂實相妙存靈知昭昭若依大論釋之不取者取之成過故不捨者捨之失益故論此攀緣等者論出經意謂離心緣相疏初句等者疏示頗略今復釋之智之生者妄智之心依名相而生法本下法謂諸法即指名相名相之法無自性生性相俱離故云無相境既無相心亦寂滅事之初現曰兆華嚴下本疏略云量智則遍入三世理智則悉皆平等四無所畏下放光大品智論等甚廣圓覺普眼章疏云一正知一切法無畏謂佛誠言我是一切正智人等二説盡諸漏及習無畏言我漏盡等三説一切障道法無畏四説出苦道無畏佛作誠言説此四法決定無畏智論云得無所疑無所忌難智慧不却不沒衣毛不竪等汗竟弗生者智論二十六云薩遮尼犍子銅鍱鍱腹自誓言無有人得我難而不流汗破壞者大象乃至樹木瓦石聞我難聲亦皆流汗作是誓已來至佛所與佛論議佛質問之皆不能答汗流淹地舉體如漬佛告尼犍汝先誓言無有聞我難者而不流汗汝今流汗淹地汝試觀佛見有汗相不佛時脫多羅僧示之言汗在何處復次有人言或有頭汗身不汗者佛頭雖不汗身必有汗以是故佛脫多羅僧示其身因是外道大得信向皆入佛法中是智慧因緣身業隨行十力者略以二門示之一依梵行品出名二依智度論釋義初者一是處非處智二過現未來業報智三諸禪解脫三昧智四諸根勝劣智五種種解智六種種界智七一切至處道智八宿命無礙智九天眼無礙智十永斷習氣智然此十智唯一諸法實相智此智約度人因緣有十種用故為十也二依智論釋義者然論文極廣今略示之一是處等者有二意一道理相應名是處不相應名無是處如論云女身作輪王無是處二轉輪王一時出世無是處二佛一時出世亦如是反此男子作輪王等有是處也二因果相應有是處如行善得善報行惡得惡報有是處行善墮三塗行惡生人天無是處二業報智者謂佛知一切衆生所作有過去業過去報亦有過業招現在未來等報現在未來等業招報亦然此則智為能知衆生業報所知也三諸禪解脫三昧智者禪謂四禪佛知是禪佐助道法禪攝一切色界三昧即定定説解脫攝一切定如是一切諸禪定解脫即三昧佛以甚深智力悉知等四諸根勝劣智者佛知衆生利根鈍根上根中根下根是人如是根今世能得初果二果等此人得初禪二禪等如是等一切衆生上下根相皆悉遍知等五種種解智者解謂欲解謂衆生信喜好樂種種不同如孫陀羅難陀好五欲提婆達多好名聞須彌剎多羅好世間財利乃至如舍利弗好智慧等如是佛悉遍知等六種種界智者界名為性佛知世間種種別異性故性名積習從性生欲謂衆生各各之性差殊無量不可數佛知衆生如是生如是欲可度不可度定不定今世可度後世可度等佛悉遍知七一切至處道智者業即是道業因緣故遍行五道業能有所至故如無漏思業至三乘聖道以是故諸業是一切至道一云一切聖道名道以此聖道隨意利益故云一切至處道也又云一切善道一切惡道一切聖道各各知其至處佛悉遍知八宿命無礙智者宿命有三一六通中宿命通二三明中宿住智證明三十力中一力也外道凡夫有通而無明二乘有通有明而無力佛則具之以此知己身及衆生無量無邊世中受如是報因如是業所更種種佛悉遍知九天眼無礙智者佛用天眼見衆生生死處凡夫天眼極多見四天下聲聞傍見小千界梵王亦然辟支佛見百千世界諸佛見無量無邊世界又云得天眼最第一者阿平盧豆色界四大造色半頭清淨如來天眼四大造色遍頭清淨是為差別十永斷習氣智者即漏盡智也煩惱習氣俱名漏智能盡之非二乘所及諸佛自知盡漏亦知盡他人漏等論又問曰是十力何者最勝答曰各各於自事中大如水能漬火能燒各自有力有云初力為大能攝十力故或漏盡力大事辦得涅槃故已上略釋名題欲廣知事義如論事無不契者總相釋云謂説理如理説事如事説業如業説果如果等達僧祗下即華嚴阿僧祇品也此品佛説以此品中僧祇為大數之首數之復至僧祇始名僧祗僧祗乃至不可説不可説復數不可説不可説以至不可説不可説轉等表因位難知故佛親説此乃後得智用之力也塵墨者法華化城喻品云譬如三千大千世界假使有人磨以為墨過於東方千國土乃下一點乃至如是展轉盡地種墨是人所經國土若點不點盡磨為塵等如是微細聖智悉知窮法界下法界雖通事理且屬一真法界此一真法界與餘法界作泉源故何者謂此一真舉體常為萬法舉體常自寂然返流隨流皆依此故故大經雖列四種法界統以一真而無源故疏字誤下定傳寫之謬也正意云為遣有知而生無知有知既祛無知何立第一義中無無知也無有知也故華嚴十六云無中無有二無二亦復無意謂因一生一元無自性論至於此故兼拂之以顯真照非有非無至妙之趣在理實當肇公復起不易吾言矣然自唐迄今諸家皆隨論文釋義人之常見多守文定義是古非今文義乖訛強生穿鑿吾不與也疏權實下初示中道寂照同時故云雙現二德同寂故云雙亡孰能等者疏釋略也據論令使二言似屬權智感而動之令智有也感謝而靜使智無也此釋順文然實智必具故以動為權靜為實此之二智皆非有無論故屬對各一邊説之亦互隱互顯疏且徵等者謂略却無起無滅等起信下即彼中説帶言真如空如來藏非有非無非非有非非無非亦有亦無五句也此中具有四句言非有者謂非斥彼執有之情般若非是非有也餘例知疏放光下至涅槃論具示淨名弟子品亦云其説法者無説無示其聽法者無聞無得以知下知謂情解知見此是迷真之病根事須剪伐然後見法古人云心不可傳相契名傳此之謂也以前下遺民問後索其證據故論主引教出理具足示之末段引放光又示無説之理絶言之道心知非傳貴在玄契爾疏據前下通辨論文問在後而答在前照前可知疏大品等者然諸經多有有執下但內學之人於真空幻色之理未了有是執也一執青黃等色為實異於真空故經云色不異空謂幻色不異真空二有執真空在於色外異色而有故經云空不異色謂真空不異於幻色故三小乘等析破色法始空色非即空四有執空非即色故經云色即是空等廣示如法界觀寶性下即彼論第四略云散亂心失空衆生者謂初發心菩薩起如是心實有法斷滅後時得涅槃是菩薩失空如來藏修行又復有人以空為有物我應得空又生如是心離色等法別更有空我應修行令得彼空等釋曰初計色滅方空今言色即是空此計自遣第二計空別為一物今云空即是色此見即遣三則計空異色今云空不異色等此計亦遣今以下通出上下論意此段辨二諦相即之境後段示權實相融之心疏前四句等者遺民謂心兩異縱而奪之若一下謂一心見色一心見空同時兩心並照二境何有此理疏中以兩心分經四句合而明之從其省約疏謂凡夫下據疏意以依他所執之法緣生性空故令遍計能取之情自空凡夫不了依他性空故起遍計執實定相不同法相存依他之似有但空遍計非色之非斥破之辭疏前二下論意云不於空中非斥其色只於色中非之故云非色疏云色空不異者以非色含空義故疏承上等者意云以境求心境既融而非殊心亦即而不異直以一心齊照約諦分之為權為實豈以諦二二於心乎故仁王經云於諦常自二於解常自一會違等者古釋但會色不異空等四句謂四異執教亦不同豫謂經雖四句不同者大底明色空不異由不異故相即皆二諦相融之意也故今約法相會之彼宗説二智在賴邪識中法爾道理各有種子登地已去別發現行本智照真後智了俗二諦區分三智別照如此何邪答由群情不同等也疏依心等者疏初斷定四句之中皆初示境後辨心初句中既實而恆權如何前云失撫會之功二句中既權而恆實如何前云異乎無相三句中可知四句中下且依句數來勢釋之由非有故所以無由非無故所以有乃亦有亦無句此意正雙遮時而恆雙表此中下辨具心境文理下論語公冶長篇云子在陳曰歸與歸與吾黨之小了狂簡斐然成章不知所以裁之今謂文理明白似不犯乎此責疏即真下顯非二也義引放光等經疏承前等者出論中再標談者之意差謂下差謂差似論主比擬遺民之意非敢直非但差乎空有兩心等也輔教編訓脫忽也亦通疏玄機下疏取前論以釋此前云懷前識以標玄存所存之必當今云若能捨己心等前云即言定旨尋大方而徵隅此云尋玄機於事外等令忘言捨情可契也推移下謂隨宜進止如稱錘在衡推移不定疏為即下依理反責論又云等者答是當之問亦可下就而示之疏心有下凡有所住情念乃生起諸惑業疏有所著者著心只在一可字疏名相等者名相是境起好惡是情生由境有違順令心生好惡好惡既彰則憎愛勃起諸業隨作三報典四生往來皆由一著字苟亡此著則外亡名相內消美惡業華無由而開報果何由而結疏初二句下識以了別為義知即妄知識乃心識知覺識用次二句下約相約名以辨非相非名疏是當等者謂有住之情只住於名相真至者真是至當之情非般若神心疏此有下出意也一令下令遺民等也二顯下論主本意異執下執言定理之儔隨言相而生見由言相異故令諸見不同不能殊途而同歸言象本空者非空不能顯理也聖心本絶者非言非相也迹可例説者但改言字作迹字讀之可了疏擬心等者瞥然而起即成一念亦剎那心也謂念起已差況隨念生分別依分別起言相執言相求玄理展轉相因遠之又遠然遺民下出意也遺民以遠公為師以生公等為友英悟敏識固非淺淺而覽此論豈實有疑但再叩玄關令更析玄理以覺後來而未達者苟見此論謂實不了殆執迹迷旨之儔也
