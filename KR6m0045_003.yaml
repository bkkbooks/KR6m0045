body:
  text: 五臺大萬聖祐國寺開山住持釋源大白馬寺宗主贈邽國公海印開法真覺大師長講沙門文才述疏涅槃者下初略釋通名通名有三謂圓寂滅度無為後二如下論自釋唐譯下即唐奘公三藏法師也常樂我淨名之四德此四且約翻無常等四倒以顯之約治惑業苦三障以顯三德然實具恆沙無盡性德故清涼釋之義充法界德備塵沙曰圓體窮真性妙絶相纍為寂即第一義下指體也然涅槃之體或指三德或指真如實際等今依表中也故大經二十七云佛性者名第一義空第一義空名為智慧等佛性乃涅槃因中之名如大經云是因非果如佛性是果非因如大涅槃該通下經云空者一切生死不空者謂大涅槃又云佛性者即是無上菩提中道種子等約位下凡聖因果皆名曰位二十七云一切衆生悉有十二因緣一切衆生悉有佛性未證者二十一云是大涅槃凡夫未到以有貪欲嗔恚愚癡故三乘下二乘涅槃但離煩惱虗妄其實未得一切解脫二十七云十住菩薩雖見佛性而不了了等皆顯三乘證未盡也剋體下自性涅槃體無不遍法無不具闡提此云無性依法相宗說五種種性有無道理此一闡提焚燒善根謗菩薩藏法爾永無三乘不定乘等入涅槃性若法性宗一闡提輩但是無有聞熏非無本有佛性故大經第九廣斥闡提斷善不得成佛至二十一經以後廣說闡提悉有佛性故二十七云一切衆生悉有佛性乃至一闡提等亦有佛性一闡提等無有善法佛性亦善以未來有故一闡提等悉有佛性何以故一闡提等定當得成無上菩提故二十一又云一切衆生悉有佛性懺四重禁除謗法心盡五逆罪滅一闡提然後得成無上菩提等若爾何以善戒等經說一闡提無種性故雖復勤行精進終不能得無上菩提邪答準清涼生公之意但是毀責之辭令彼不作闡提如世之痛罵不肖之子云此無人性雖強力學之終無所成彼若回心成人可望如來亦爾或曰理性等有行性或無此亦曲會未盡終極之唱何者彼經文云善男子佛性者謂其十力四無所畏大悲三念處一切衆生悉有三種破煩惱故然後得見闡提亦爾又云一切衆生悉有一乘無明覆故不能得見據此何獨爾邪不減者二十二略云闡提斷善不斷佛性等極喜者初地也謂此菩薩初斷二障現行證二空真如即是少分見佛性故非增者謂性本圓成非新增故出處者易繫云君子之道或出或處儒以仕進名出守志名處論主以有餘名出無餘名處如下云生名有餘滅名無餘此亦略辨涅槃種類也準出現疏此四之外更列性淨方便淨或真或應等然論皆有之至文當示彼疏又引唯識云自性涅槃衆生等有二乘無學容有前三唯佛世尊獨言具四等體用者顯大般涅槃也自性體也本也餘三用也末也亦可無住體用兼含言混成者體時恆用末時恆本未有非真之應非應之真也細求下論自識其玄四而非四者謂約出處之跡非四而四約真應之源四而非四無名下初釋依秦主答安城侯書釋之所引即華嚴須彌頂上偈讚品具云有諍說生死無諍即涅槃云云二就下約自性涅槃之體明也涅槃下二十七云十相者謂生老病死色聲香味觸無常遠離十相者名大涅槃亦離有無之相如下論示本經下經說有有因之名如舍利弗母名舍利因母立名故云舍利弗弗子也有無因之名如薩婆車多名為蛇蓋實非蛇蓋是名無因強立名字如坘羅婆夷名為食油實不食油強為立名名為食油是名無因強立名字善男子是大涅槃亦復如是無有因緣強為立名等釋曰有因無因二種之名此方亦多物能捕鼠名曰鼠狼此有因也藥名蜜陀僧等有何因乎皆是情想取相立名名亦何真依相立名尚入虗假無相立名豈非強為淨名下如常所聞遍友下即華嚴七十六云我聞聖者善能誘誨願為我說遍友答言善男子此有童子名善知衆藝學菩薩字智汝可問之當為汝說等即遍友自不答也首唱先言也發越也揮散也謂論主演釋無名之旨發越揮散共稟下謂教中已有無名之言秦主與論主舉而明之也述而不作者論語文自下釋論多依本經及出現大疏釋之凡云大經即大涅槃經引他經則名之疏表端等者端首也謂君臣之禮凡上章秦首必稱臣臣謂臣僕男子賤稱謙禮於君也僧則國君捨之為方外之人是國之賓非國之臣如易之蟲卦上九之辭云不事王侯是也古之沙門行業高者天子不下詔沙門不上表但書相往來如晉慧遠法師唐苑律師等亦有不免而上者如安公之諫符堅支遁之辭晉主表首但名而已流之宋世雖三藏施護亦自稱臣況其他乎然儒之君子亦有肥遁高尚其事避色避世者如子陵不臣光武戴逵不友晉帝等斯人亦多論主時方年少以方外自處能以道賓秦不以禮臣秦故稱名而已其高可知老氏者即三十九章文疏尚書等者舜典曰若稽古帝舜曰重華協於帝𤀹哲文明溫恭允塞東菜解云濬者宏深與𤃒川之濬相近然多見睿字睿與睿同尚書堯典云若稽古帝堯曰放勳欽明文思安安等環中下彼篇次前云彼是莫得其偶謂之道樞樞始得其環中等大意謂是非互指彼此無主彼亦一是非此亦一是非則是非皆虗也彼此無偶也無偶則一一則為道樞故是非往來彼此相向如環之無窮無是無非如環中之虗也此亦少同吾宗法空之理疑亦得乎吾佛之緒餘哉武以下文武乃國之治具武可以禦外難禦止也文可以經內四大即老氏第二十五中文疏放捨等者大經第四云然後要於大般涅槃放捨身命是故名曰大般涅槃等水大貌者正取廣大之義叢筠下叢林藪也筠竹也法華第一云假使滿世間皆如舍利弗盡思共度量不能測佛智又云無漏最後身其數如竹林欲思佛實智莫能知少分等今云地滿智雲即十地菩薩亦最後身也疏十有等者什公在關輔僅八年并去姑臧十有餘年也疏論語下即里仁篇同聲下繫辭云同聲相應同氣相求雲從龍風從虎等言感而會莊子者彼田子方篇大意云雪子楚人因使於齊而舍於魯所以仲尼見之文多如彼二人下繫辭云二人同心其利斷金今謂秦主什公相契始能弘法利世論夫衆生下初則順流下轉門圓覺經云欲因愛生命因欲有等若欲下即返流上轉門愛欲之因若滅則生死之果自喪略同者且約無相體遍之義為喻然無知無覺不必全同是故經說涅槃於世法無喻疏美者讚美也王者下謂富有四海尊極一人非獨萬姓之君實亦三寶之主執去留之柄關盛衰之風至于歎德景行宜其過實也疏謂所等者子夏詩序云情動于中而形于言言之不足故嗟歎之嗟歎之不足故詠歌之詠歌之不足不知手之舞之足之蹈之論津梁者津謂津渡如津處施之橋梁也疏司馬者前漢武帝時人撰史記也易本下繫辭云古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德等文王下謂文王每一卦之下繇辭以明之大意如乾卦云乾元享利貞是也周公下即文王之子凡卦六爻每爻各繫辭以明之如乾卦初爻云潛龍勿用等是也孔子下謂上彖下彖大象小象上繫下繫文言說卦序卦雜卦豈曰等者亦謙也疏末章等者謂秦主答姚嵩之書而有兩端一答無為宗極二破空寂無聖今則後端也不容有聖者謂絶智淪虗似小乘無餘之說莊子下彼逍遙篇略云肩吾問於連叔曰吾聞言於接輿大而無當往而不反太有徑庭不近人情等疏文借下二十一文借以顯理疏疑蓋者謂五蓋之中疑為一也扣擊也宜用叩字叩頭也然文法凡虗心求理皆名為叩如論語云我叩其兩端而竭焉圭峯亦云課虗叩寂是也今用扣字謂扣擊玄關義亦可通但犯粗猛恐後人參正之訛疏作意下傳云什亡之後追悼永往翅思彌厲乃著涅槃無名論等翹舉也思謂哀思時舉未嘗放也厲嚴也或排下小乘以生死為界內涅槃為界外如下有名云然則衆生之性頓盡於五陰之內涅槃至道獨建於三有之外等今大乘衆生即涅槃體無不遍用無不極何有界內外之殊也疏條謂等者謂將演論條段布列於文牒之十繕營也班布也疏西來下謂五天竺國鄉音不同如此方燕鄉越里之殊呼楚國秦之異說疏十演等者謂此論初略示名義直談自性清淨之體以為宗極然後折而演之倣法也命召也彼云開宗明義章第一謂於此一章亦略張孝道之宗明其孝為至德要道之本然後述天子諸侯等五人所行不同同歸于孝疏欲明等者謂小乘教中唯說此二為究竟之果未知此二應物之迹故假有名為難論主以一實之理破此二權直示大方故以無名為演折者如水壅塞演者如水决通然九折之義或唯二乘如初三折或通三乘則第四難差以下皆三乘義至文隨示而十演之義皆一乘也竟顯下謂有無之迹雖殊而自性之體無異疏無為等者料揀二名隨義殊也言無為者謂四相不遷三際莫易又性出自古亦無作法及與作者息障即三障也論略示惑苦生死大患也欲見下此四種惑名四瀑流故本經二十七云一者欲瀑二者有瀑三者見瀑四者無明瀑釋曰欲界之惑除無明名欲瀑上二界惑亦除無明名有瀑身等諸見名見瀑三界無明名無明瀑此四能漂有情入生死海故云瀑流疏義言宅也者二十七經云又涅槃者名為屋宅能遮煩惱惡風雨故等疏出現下經有十門第一名體性真常門經說真如實際等為涅槃故廣引恐繁初二對下無聲故寂離名也無色故寥離形也由雙離故虗虗則無所不遍故曠也曠達也大也非有非無微也不出不在妙也離此諸相故曰無相妄知有心不能知也前離下用論即彼真如門中文群有下謂四洲四惡趣四空并四禪無想與淨居梵王六欲天以二十五有屬三界苦果故本經第十云說正解脫無二十五有等量等者齊等也據永久亦常義疏欲配成四倒故云非空非前下踵去曰隨逆來曰迎即過未也餘可知此約下明離四權潛影四實謂離苦顯樂等亦如下彼二十五云吾不知其名字之曰道強為之名曰大大曰逝等釋曰逝往也言道之大無往而無也往而愈極故曰遠也非獨於遠亦反於近言無不在也然論文亦多擬老氏如彼第十四云無狀之狀無象之象是謂恍惚迎之不見其首隨之不見其後等故世之淺近者謂此論雜莊老之談未知乎假辭以明玄理也問莊老談道亦數當矣與內教何似淺深答佛教宏深懿非豫所盡識悟姑以所得毫芒之見而擬之吾宗玄妙但說我之本心此心之體虗寂也之用靈明也八萬塵勞本離也恆沙性德本具也迷是心而凡夫悟是心而聖人迷唯轉此心心外別無一法莊老言道或謂道降沖相萬物稟之以生成或謂萬物自然而然無張無主率皆心外談理有外明無細研二家天壤自遠五眼者一肉眼見障內之色二天眼見障外之色三法眼了諸法之相四慧眼了諸法之性五佛眼則悉徹性相問肉天法眼不見可爾慧眼佛眼云何不見甚違本經如來了了見於佛性答二眼俱離見相無能所取故云不見如無知論云明逾日月而迷昏等華嚴下第二十八經疏莊公下後二句云一質不成淨穢虧盈異質不成一理齊平疏通引等者須菩提無說釋梵無聞故云兼也反證者謂引無言證前言者失真故也法華下彼第一云於三七日中思惟如是事等大品即第八九卷以來該數品經疏斯皆者下謂唯內證聖智與之相應言說轉遠也論不晦等者謂涅槃之體離晝夜寒暑之相亦可昭昭於心目之際不晦也寂寂於名相之外不明也餘義如下故疏義引等者然經文皆廣不能繁敘今取義釋之準法華經小乘以離虗妄名為解脫其實未得一切解脫一切解脫真解脫也疏初二對等者謂有境尋之而五陰蕭然非有也無鄉求之而靈鑒昭然非無也二種生死皆苦陰也與理下謂理智如如非二也亦文托老氏彼云抱一為天下式等捐棄也亦本來棄離非適也三事即三德祕藏如前宗中神而等者由常湛寂亡照故不居其功由無功故至功之用立無息者下云亭毒蒼生疏而不漏等經即第四卷義用也若各下體用各示超取其文也用可例說者靈不竭故抱一抱一故神而無功無功故至功存功存故非無也自性涅槃體用融通大經二十一云如來涅槃非有非無等疏四無色者即空無邊處等也準禪法要解略云一空無邊處謂觀色是苦若內若外分分析破度一切色相等二識無邊處謂知空中受想行識如病如癰更求妙定則離空緣知是虗空從識而有謂之為真但觀於識等三無所有處行者得識處已更求妙定觀識為幻不住情不住緣不住中間如是思惟得離識處四非想非非想處謂一切想地皆粗可患如病如癰如是觀已則離無所有處入非想也謂無下地粗想名非想有當地微細想故名非非想故云四空九地者謂欲界一五趣雜居地色界四初禪離欲界生名離生喜樂地二禪名定生喜樂地三禪名離喜妙樂地四禪已離喜樂之念名捨念清淨地兼無色四名九地也治世等者班固前漢藝文敘云一曰儒流即周孔等二曰道流即莊老等三曰陰陽流即堯師具茨等四曰法流即皋陶甫刑等五曰名流即高辛氏師赤松子置五行之官等六曰墨流即墨翟禽滑等七曰縱橫流即蘇秦張儀等八曰雜流兼儒墨合名法議國之事九曰農流即神農后稷等馬遷則先黃老而後六經衆聖所會者智論云魚歸於水鳥歸於林聖歸涅槃法歸分別殊途等繫辭文疏王宮下託寄託也謂示生淨飯王宮疏難測用也道約喻也疏三乘等者以有餘無餘三乘之教皆有釋義大同小異若小教菩薩亦唯此二大心大行則別斷證位次則同有宗云身智未盡名有餘若大乘者大鈔引遠公云二死因盡名有餘若法相則通說四種唯識云一有餘依涅槃謂即真如出煩惱礙雖有微苦所依未滅而障永寂故名涅槃等此論有名者但折二種不折所餘乘如下謂乘運三十七菩提分法來至道樹而成正覺此釋如來也揀於下謂二乘菩薩雖亦名覺覺而未極佛果覺圓故稱大也小乘以戒定慧解脫解脫知見為五分法身依報下毗婆沙第一云色身是法身器法身所依故據此則以法身依報身也八解者下俱舍二十九云解脫有八種一內有色想觀外色解脫二內無色想觀外色解脫三淨解脫身作證具足住四無色定為次四解脫滅受想定為第八解脫八中前三無貪為性次四各以本地定善為性第八解脫即滅盡定等謂念下擇法精進喜念定捨輕安為七覺支大小下大鈔引小乘教說菩薩別修六度各有滿時仍滿在頂位依四諦理發四弘誓由苦諦故發度衆生集諦故斷煩惱滅諦故成佛果道諦故修萬行至忍位中趨菩提樹世第一心已去緣上下八諦發苦法智忍等一十六心兼緣九地修惑起九無間九解脫斷惑證理以菩薩根利故五門合斷此義極多且略示一隅大乘教理如常釋之疏三明者俱舍二十七云一宿住智證明二生死智證明三漏盡智證明初心下即衆生無邊誓願度也疏弱喪者弱幻弱也喪失也謂幻弱而喪失鄉國也北山録云使弱喪知其所歸食椹懷其好音是也以喻群生失本性地入生死之野爾凡二十已下名弱二空者謂我法二空天乘之理也八正下持世經八聖道品略云一正見離諸邊邪見故二正思惟斷諸分別故三正語知言虗故四正業滅諸邪業故五正命捨資生販賣故六正精進離相運行故七正念離諸邪念故八正定離諸定相故然經文極廣義皆實相與小乘八正乃別今取意略引以八正大小諸宗皆有故引大也庶孽者庶衆也亦凡庶也孽賤之稱也亦妖也五乘者三歸五戒人乘十善天乘四諦小乘十二因緣中乘六度大乘化儀者化生儀式也疏初二句下釋如來隨宜之應意兼下詳下論意如來本欲趣寂但餘緣未了故住有餘據此出生入死往來化物不在報身在隨類化身也以化依報起故就報身示之化博者八正之道普霑一切也五衍者謂說五乘之法以接五種之機化母者謂造化生物名化母依道書即氣也彼初章云有名萬物之母五十二又云天下有始以為天下母等若云道生之德畜之則亦以道為母也窮盡下依天台判小乘教明因緣生滅四真諦理論中但言因緣始物以攝因緣終物如馬勝比丘云諸法從緣生緣離法即滅疏初句下所證之理喻虗宇之窮三世時遍十方際故云無疆九止者古譯如人本欲生經疏通有等者始自鹿苑終至涅槃十仙外道等皆餘緣也然皆小智所見執化為報以權為實疏初二句下法喻雙明可知意以靈覺獨存通證緣跡未泯疏緣跡等者順論釋之若依成實生死果盡名無餘若大乘則二死果盡也唯識云三無餘依涅槃謂即真如出生死苦煩惱既盡餘依亦滅衆苦求寂故名涅槃疏文有等者初對厭身身為大患生死本故次對厭智智乃勤勞之本故老氏下第十三文然八大人覺亦云心是惡源形為罪藪但欲對治我法二執非如小乘一向厭之以迷背之心而生惡覺謂心為惡疏欲養等者世之聲利養形之物也非智慮之勞不能致之故千思百慮曉夜孜孜越分而謀抵死而竟未得起反側之思既得防劫篋之患至於神疲情困死而後已此則為其形而勞其智故身者智之讐也厭其身則讐亡矣智既下謂身之勞役由智使之晝營夕為春耕秋穫商胡販越輕風雷之千辛航海梯山重錐刀之薄利而形勞弗已日入不息者皆汝心智使之而智者實身之冤也與其存之而苦不若寂滅為樂相役者心役身故令身口作業身役心故令心智作業十業既成三報必感故生死長途等如輪金剛經疏序云惑業襲習報應綸輪塵沙劫波莫之遏絶疏至人等者小乘依滅盡定化火焚身名灰身也群有者九有三有等無為益者以小乘涅槃是擇滅無為故究竟不退故涅槃非無常故疏燈火等者約法分喻以成四物膏油也以燈依四緣方起一燈二油三炷四火謂以燈之總相喻身燈之體性喻智又以膏喻形明喻慮然法喻有少不齊智者不難疏五陰下色蘊即身四蘊即心心所心亦智也疏初二句等者謂名隨理義而生好滅者清涼云謂有一類厭生死苦又聞佛道長遠心生怯弱常欲趣寂也懷德者即小教中六度菩薩據此二乘好無餘菩薩慕有餘也後之下謂本之於教則教亦明示求之於跡則古佛道同疏五音者謂宮商角徵羽也疏出現下略引具云然此文中雖明現身即是三德涅槃之中所流用大亦涅槃攝有無下等者謂虗推涅槃出有無之外無形無名細求論旨不知歸處言無實也措投也舉也疏日也下以喻顯理疏以法問而釋之暗室無聞皆喻機也疏外稱等者謂約出處之跡以名之但謂涅槃尚亦強立況有無跡名非外邪疏由言等者謂依言求理之士多封名志存義相之人多著相也引稜伽即唐譯第三卷偈疏初二句下謂名相之極盡在題目等方圓即相也易繫辭云以制器者尚其象解云天象圓地象方故制器者唯方圓也象是寫字者寫猶描貌也貌音邈疏初句等者謂通許二種涅槃是化生之權用此蓋許其是權下乃奪其非實此中許者非許有名執實之謂但許有無是權故論云信是等縱有下對機明權宜約身明隱顯故成二也疏奪也下一一對破於前可知疏顯超下謂四相之中生相為始滅相為終三際過現未也今已斷之混一非殊故本經二十八云涅槃無因無所作故乃至無處所故無始終故六入者內六入也根即情根今言已過者無漏善色不偶塵也界繫下界內惑業已除後報不起也遮表下方謂方所不在方遮也古人云道無方行者莫能至不離方表也古德云非中非外洞徹十方亦遮表無違出現云佛子如來身者無有方處非實非虗等非有為等唯是雙遮皆影顯其表非有為表即無為也餘句例知皆古下今經亦廣阿閦佛品略云我觀如來前際不來後際不去今則不住乃至云非有相非無相等大疏下即出現涅槃第九體離二邊中疏也既承前等者論之文勢亦似論語里仁篇云君子之於天下也無適也無莫也義之與比非聲下顯自性涅槃為應化之體身非執受者謂阿黎邪識總攝諸根名持身之識故身觸違順一一執受今至人已破此識非身之身何有執受二執者即我法也無漏淨識涅槃之性本自無故無諍下即前引華嚴有諍說生死無諍說涅槃諍者煩惱之異名導引也化也疾前下舉喻謂因疾起藥疏顯無住等者謂依自性之體顯去來無住之用疏初法喻對分來實非來者應不離真故往實非往者真即恆應亦有無在機二跡元虗故虧盈下潛用出現大疏十門涅槃第三名出沒常湛門經云佛子諸佛如來為令衆生生欣樂故出現於世欲令衆生生戀慕故示現涅槃而實如來無有出沒等第四名虧盈不遷門文云佛子譬如日出普照世間於一切淨水器中影無不現普遍衆處而無來往或一器破影便不現乃至云如來智日亦復如是等此則虧盈在器不在於日來去在機不在於聖本經二十五云如閻浮人日入之時衆生不見以黑山障而是日性實無沒入衆生不見生沒入想聲聞弟子亦復如是疏生滅等者謂顯跡息跡示有生滅有無之名又因生滅故知二名外稱應生之假號也疏有無下意云本則無名依本示跡跡則有名名但名跡不名于本隨跡立名名有無量又不但于有無也故論云于何不名二十七經云涅槃云何為字有名稱故等如次論文疏承前等者涅槃之用無不應也隨應隨跡有同類之名故二十二經略云如來非非天非非人非非鬼非非地獄畜生餓鬼等言隨類之身皆遍也經廣多不引無擇下俗智無思感之心應如普門一十九身楞嚴三十二應等本經即上二十二疏正由下非天非人涅槃體也能天能人涅槃用也謂體非一切用方一切故清涼釋涅槃非虗非實云身若是實有不可滅由非實故起滅無恆身若是虗何能起滅由非虗故能無不現皆此義也疏現身等者謂十重他報三類化身通名為應此應萬端皆感而形聖不為之所以如是釋應施者以一論前後多依言相顯理故如衆生下出現品太用無涯經略云佛子如來應正等覺示涅槃時入不動三昧入此三昧已於一一身各放無量百千億那由他大光明一一光明各出阿僧祇蓮華一一蓮華各有不可說妙寶華蘂一一華蘂有師子座一一座上皆有如來結加趺坐其佛身數正與一切衆生數等含具下初意猶云莫之與大謂大之無二也如春秋八世之後莫之與京京大也疏忘乎下謂寄以小成遣乎為大假以無名亡乎施廣顯涅槃之道用而恆體體用一致方曰大般涅槃疏祕藏下謂三德祕藏是大涅槃菩提即摩訶般若如出現品說涅槃為如來智日普觀法界等準宣公論衡云菩提天語則佛陀梵言也今舉一德通證三德以此三法不並不別故可思者假令高而有頂深而有底可以圖思既曰無上無下故圖度絶矣天地下列子天瑞篇云夫天地空中之一細物有中之最巨者等疏執跡者迹即二種涅槃且略下謂果分離言不容一字但示其名以引悟入正位者淨名菩薩品云若以無生得受記者無生即是正位等亦但標其位次無名呼召今謂自性清淨涅槃名殊體同疏幾平聲微者跡之纖細此尚不形故云寂怕疏初引下彼經云吾無生不生雖生不汙於生無形不形雖形不汙於形疏釋頗細不煩更示忍辱太子者報恩經第三略云過去世波羅捺國有王聰睿仁賢第一夫人生子性善不瞋名曰忍辱乃至云太子既長為六大臣所嫉父王嬰病六臣謀損太子向太子言大王病愈須得不瞋人眼髓為藥太子聞之捨己眼髓奉王為藥乃至云爾時波羅捺王者今現我父輸頭檀是時母者摩耶是忍辱太子者今我身是鴈王者雜誦第一略云過去世時波羅捺城邊有池池中多魚龜鵝鴈中有王名為治國作五百鴈主鴈王前行右腳著獵師羂中念言我若出腳餘鴈不食而去食盡方現其腳群鴈飛去有一鴈臣名曰蘇摩不捨王去王語臣言汝代我為王在鴈前行以偈答曰我願隨王死生不變寧共王死勝相離生獵師聞之遂解王腳二鴈俱去乃至云佛言鴈王即我身是蘇摩大臣者即阿難是鸚鵡者僧伽羅叉經上卷略云昔者菩薩現為鸚鵡常處于樹風吹彼樹更相切磨便有火出火漸熾盛遂焚一山鸚鵡思惟猶如飛鴈𨈬止于樹故當反復起報恩心何況於我長夜處之而不能滅火即往詣海以其兩翅取大海水至彼火上而灑於火或以口灑東西奔馳時有善神感其勤苦尋為滅火如此者其類尤多頂生者本經第十二略云過去有王名為善住其王頂上生一肉皰足滿十月皰即開剖生一童子其形端正父王歡喜字之頂生時善住王即以國事委付頂生七寶具足作轉輪帝乃至云轉輪聖王即我身是手生者涅槃三十三云我於往昔作菩薩時為頂生王及手生王馬鳴菩薩撰本行讚云卑偷王手生曼陀王頂生當知人中亦有濕生也涅槃下具云菩薩摩訶薩受羆身時常為衆生演說正法或受迦賓闍羅鳥身為諸衆生說正法故受瞿陀身鹿身兔身象身羖羊獼猴白鴿金翅鳥龍蛇之身受如是等畜生身時終不造作畜生惡業常為其餘畜生衆生演說正法令彼聞法速得轉離畜生身故然但下釋雖生不生等也疏有二義一由感而起機見生形非如來實生二涅槃之道即真而恆應無生而不生即應而恆真雖生不生形亦例之此則就用則能生能形在體則非生非形不為有者下論云處有不有疏初引下即五十一略云善男子我已成就不滅度際菩薩法門住此法門故普見十方一切世界去來今佛無涅槃者除化衆生方便滅度等唐譯下六十八略云瑟胝羅居士告善財言我得菩薩解脫名不般涅槃際善男子我不生心言如是如來已般涅槃如是如來現般涅槃如是如來當般涅槃我知十方一切世界諸佛如來畢竟無有般涅槃者唯除為欲調伏衆生而示現耳善男子我開旃檀座如來塔門時得三昧名佛種無盡等正思者謂不思之思也故遠公云三昧者何思專想寂之謂也正受圓覺疏云不受諸受名為正受皆謂心住定中亡思亡受亦非泯其知照之性故又此下大疏十玄第九名十世隔法異成門謂三世隨一攝三成九九世不出一念為十故華嚴離世間品云菩薩有十種說三世蓋約三世互起為十耳是知下即彼經云善男子我入此三昧隨其次第見此世界一切諸佛所謂迦葉佛拘那含牟尼佛拘留孫佛尸棄佛毗婆尸佛勝觀即毗婆尸也靈鷲下法華第五云衆生見劫盡大火所燒時我此土安隱天人常充滿又云常在靈鷲山及餘諸住處等莫隨下即前引瑟胝羅云我不生心言如是如來已般涅槃等意云生心則見有去來不生則無也本經二十一云一切諸佛無有畢竟入涅槃者出現品云佛子如來不為菩薩說諸如來究竟涅槃亦不為彼示現其事乃至云於一念中見過去未來一切諸佛色相圓滿皆如現在等疏四法者有無言象也教明下法喻對示可見皆釋論中斷字謂斷無移者以教如明鏡等喻合下謂同喻也如前云幽谷之響明鏡之像等符符竹也古者殺竹為符剖而相合為信如晉陸機云入仕帷幄出剖符竹今取合義契者今之合同契券也襲承襲也疏此非等者謂此前正答無餘之難此後并破勞患之見此見下謂以如來無漏常樂之蘊同分段有為勞患之身狹淺之見招深過也以謗佛故責非者先泛責違其教理下方引教會理疏萬機等者謂遍法界中同時異處而感涅槃業用之身亦遍法界同時異處而應撓亂也水澄下如前引出現文摩尼下如前釋行雲由風氣而運雖行而非行有餘因機感而生雖動而非動谷神由呼歇而止雖止而非止無餘因感謝而滅雖靜而非靜道經下彼第六篇云谷神不死是謂玄牝謂空谷中能應人呼速疾如神正明下謂此段論文若動若靜唯明無心疏初句下以心例身也疏躡前等者若有象而應應乃不普心亦義同疏機有等者謂衆生是有身有心之感如下云有心者衆庶是等如來現非身之身等應之故如來身心因衆生身心而起自性涅槃無出無沒非身非心如本經廣說疏此身等者謂非身之身無患非心之心無勤勞也出現下虧盈不遷門中疏也彼疏云法身無相故無器而不形聖智無心故無感而不應相非我有等云云金石下彼說藐姑射音亦山有神人焉肌膚若冰雪綽約若處子不食五穀吸風飲露乘雲氣御飛龍而遊乎四海之外乃至云物莫之傷大浸稽天而不溺大旱金石流土山焦而不熱是其塵垢粃糠將猶陶鑄堯舜者也今借其辭以顯身之無患疏八極等者八方極遠之稱意言極際非有極也列子湯問篇湯問革曰上下八方有極盡乎革曰無極等至于下諸經多有法華涌出品下方菩薩至如來所合掌問訊言世尊少病少惱安樂行不答云善男子如來安樂少病少惱等皆俯隨世範一往一來修敬展情蓋禮之用和為貴也豈曰下淨名經弟子品略云佛遣阿難問居士疾阿難自謂不能任彼問疾憶念昔時世尊身有小疾當用牛乳持鉢詣婆羅門家乞之時維摩詰來問我言何為晨朝住此我言世尊身有小疾當用牛乳故來至此維摩詰言止止阿難莫作是語如來身者金剛之體諸惡已斷衆善普會當有何疾阿難莫謗如來莫使異人聞此粗言等雷居士者略鈔第十一云淨名居士現毗耶離城俗姓雷氏於提婆城取妻曰金姬男名善思女名月上示跡同凡化在家衆等擬繫辭者彼云智周乎萬物而道濟天下故不過疏長阿含下彼經第三卷說在文甚多不能煩示小乘涅槃經等皆說亦大同小異或說於純陀家食旃檀木耳羮患腹痛或說下痢下血病困覔水至樹下令弟子四疊僧伽黎而臥等然大經秪言背痛大乘皆為示現小乘執之為實二十五經云若我所有聲聞弟子說言如來入涅槃者當知是人非我弟子是魔伴黨邪見惡人等豈同下小乘謂如來俱厭身智棄有餘入無餘疏曲見者二十一經云云何名為聲聞緣覺邪曲見耶見於菩薩從兜率下化乘白象降神母胎乃至於此拘尸羅城入般涅槃如是等見是名聲聞緣覺曲見謬執者小乘謂有餘依身雖出煩惱尚有餘苦所依如疾時須乳熱時命扇等故厭之而歸無無則無餘苦所依為樂也殊未知吾今此身即是常身法身無為無漏不墮諸數執跡為實故論主破之會意下謂因言得意不守其言即聽表也表外也玄根下玄妙根源根以生長為義謂衆生等有佛性遇緣則悟故始修世善終修出世善事相下謂有無縱跡名相本虗採取也拔抽也出也疏九折等者切韻云徵明也亦辨明之義責謂結責義頗相近苞舉者與包含之包通用之矣儒老下繫辭云一陰一陽之謂道孔頴達義疏云一者何無之稱也稱尺證切又云易有太極是生兩儀解者亦謂太極無也兩儀有也又曰神無方而易無體老氏云有之以為器無之以為利又云天下之物生於有有生於無又云大象無形道隱無名等流於莊列甚多儒者太極太易之無老氏虗無自然之無名殊而理同皆謂自無生有自有入無然儒宗亦舉太極為生物之端而不設教繫辭略云形而上者謂之道形而下者謂之器道無也器有也只於有中以述三綱五常論道洪範人倫道家乃以虗無為宗故棄聖智絶仁義蔑禮樂見素抱朴為修二家之源非太遠其流非太近故互為奴主而不相入今論中假問皆簡二家有無俗諦所攝涅槃則出之此折演之大理也疏世典等者孔子不述太古之事但自唐虞以下成書即尚書堯典等也北山録天地始篇具敘之鴻濛廣大之象也穹窿謂窪而高如穹帳者也磅亦廣闊堅重之相一生二者一氣也亦混沌也二即陰陽亦二儀也磐古者即人倫之首祖也磐古生天地之間王萬八千歲頭極東足極西左手極南右手極北開目為晝閉目為夜吐氣成風雲吸氣為雷霆四時行焉百物生焉一生二二生三皆老氏四十二篇文形分物兆者謂磐古眼為日月骨肉為山陵腸胃成江河衣毛成草木等也萬物下謂三才生萬物也叢繁也亦雜也三生萬物亦老氏文次二對者老氏第二篇云有無相生難易相成長短相形高下相傾等傾謂傾向亦謂諸法相待而起若無高則亦無下也定數者謂諸法相因而生是自然之定數疏幽顯兩途者幽謂鬼神等顯謂人畜等然皆屬有境大也內教說大身修羅身長八萬四千由旬摩竭大魚迦樓羅鳥背闊數十萬里等莊子說北溟有魚其名曰鯤鯤之大不知其幾千里列子湯問篇說五仙山一曰岱輿二曰員嶠三曰方壺四曰灜洲五曰蓬萊其山高下周旋皆三萬里浮留海中不得暫峙仙聖毒之訴於上帝帝命禺疆使巨鼇十五舉首而戴之迭為三番六萬歲一交焉釋曰三萬里之山鼇首戴之則鼇之首又大如山也此海之東有大人國名曰龍伯有一人欲取其鼇行數步而至五山之所一釣而連六鼇合負而趨歸其國釋曰龍伯之人又不知乎大於鼇者幾十萬里也恑奇也律中說過去世時有三親友象獼猴鵽鳥依一尼拘律樹止共相謂言同依此樹宜相恭敬獼猴鵽鳥問象言汝憶事近遠象言我憶小時行此樹齊盡我腹象與鵽鳥問獼猴獼猴答言我憶小時此樹舉手及頭象語獼猴汝生年多我象與獼猴共問鵽鵽言我憶雪山右面有大尼拘律樹我食果子來此便轉即生此樹共相謂言鵽生年多象以獼猴置其頭上獼猴以鵽置其肩上共遊人間從村至村從邑至邑常說偈言若人能懷法必敬諸長老現在有名譽將來生善道時鵽說如是法人皆隨從法訓流布汝等於我法中出家應更相恭敬如是佛法流布自今已去聽隨長幼恭敬禮拜迎逆問訊時諸比丘聞佛教誨比丘長幼相次恭敬禮拜又外紀說伏犧蛇身人首神農牛首人身史記說中衍鳥身人言皆恑奇之相也譎詐也世之諂詐之流其類尤多但不任真而行者皆詐也莊子田子方篇云溫伯雪子過魯尤魯人多𥷋見之雪子每出見客入必歎之其僕曰每見之客必入而歎之何邪曰人之見我者進退一成規一成矩從容一若龍一若虎其諫我也似子其導我也似父是以歎也然進退規矩皆形容儒者禮法謂不任真矯激而詐怪者春秋傳鄭殺大夫伯有國人見伯有介甲而行又齊襄公嘗殺公子彭生襄公出獵見野豕人立而啼襄公曰彭生也襄公墮車妍美也如西施孋姬毛嬙之類醜陋也世傳無艷女者齊人白頭深目長指大節昂鼻結喉肥項少髮折腰跌胸皮膚若漆年四十不售嫁等巨大也細小也列子湯問篇云從中州以東四十萬里得僬僥國人長一尺五寸東北極有人名曰諍人長九寸又云江浦之間生麼蟲其名曰蟭螟群飛而集於蚊睫弗相觸也可為細矣莊子文者齊物篇云故為是舉莛與楹厲與西施恑譎怪道通為一莛梁也謂梁橫楹厲醜女也謂厲太醜施太美也亦謂物殊而道平等也何晏等者西晉紀云初何晏等祖述莊老立論以為天地萬物皆以無為本無也者開物成務無往不存者也陰陽恃以化生賢者恃以成德故無之為用無爵而貴矣王夷甫之徒皆愛重之由是朝士大夫皆以浮誕為美裴頠著崇有論以譏之略云夫利欲可損而未可絶有也事務可節而未可全無也蓋有飾為高談之具者深列有形之纍盛稱空無之美形器之纍有徵空無之義離檢又云處宮不親所職謂之雅遠奉身散其廉操謂之曠達又云甚者至於裸形褻慢無所不至士行又虧矣論主下謂有名所徵之意總括儒老有無之說恐謂涅槃妙理亦不出此故論主演超境一章以遣之疏數名等者謂慧數是盡惑業之緣所顯生空之理名為滅諦無漏下見道已去名為無漏淨慧擇滅者擇謂揀擇體亦是慧無為生空之理方是涅槃通有餘無餘但身智存名有餘身智灰名無餘耳疏論語文即季氏篇吾聞其語矣未見其人也疏超越也者以前云不出有無今云超出有無疏問以等者兩對中皆上句問下句屬以證涅槃是真有無是俗仁王經者初卷云了知一二非一非二即勝義諦取著一二若有若無即世俗諦疏不待皆非者若有無互不相待亦互不生起疏皆是緣有者無雖無體以有求之必有此無故無亦緣有之法豈足下謂有唯有邊無但無邊各偏互違奚比乎非有非無之中哉疏初句等者謂色聲等法是識所緣故名為境坌汙淨心故名為塵皆緣生下但俗諦所收疏髣佛等者謂比擬其理法象之也相絶者釋託情絶域言亡者釋得意亡言也但可下意云謂涅槃是有是無情計分別非有非無令人亡情會理是立言之本意若云非有非無是涅槃亦認指是月服藥成病俱未免其知覺之妄疏紛繞等者謂紛紛繞繞煩亂之貌惑業皆然也三有者謂欲有色有無色有引出者法華第一云衆生處處著引之令得出但假下意謂無為亦權指無實故彼經第三說化城譬喻但導師方便爾廣示如玄談故論云借無以示虗設令非其有者令非斥棄逐三有生死而入無餘非謂非有是斷滅虗無恐儒老下以二家談有無似內宗有為無為之名恐彼引內經為例謂涅槃為無故此簡別以示小乘無餘假借而出有大涅槃則兩不在也一揀者大涅槃也二揀者假借而非無疏初句等者前論云豈曰有無之外別有一有而可稱哉據此不出有無也次句下前論云良以有無之數止乎六境之內六境之內非涅槃之宅等據此不在有無疏二所等者唯擇後句前二易故不釋疏初明等者釋前三句以前云不出不在求悟無處又不許是空廓無體既有其道幽妙之路可尋故千聖萬聖同其軌轍而歸涅槃非虗歸也疏若方等者謂無其體言誰不在不出乎其道既存不出有無必在有無如何不出又不在邪疏初三句等者名能起於言說相能生於名字心能現於有無諸相若順顯云由心現相因相生名字因名字起一切言說也涅槃不爾非有無相故無有無之名無名故亦無不出不在等種種言說主既無說賓亦無聞疏但略示一隅疏理事善惡等下軌持為法潛用大疏釋大經法非法亦然之旨有無為法者亦各任持自性軌則於人令生有無之解無說下二十一經云不聞者名大涅槃乃至非音聲故不可說故等疏令忘名下以不出不在互相違故但寄名顯妙妙不在名若執名求理名違則理乖何以取悟故圓覺云修多羅教如標月指了知所標畢竟非月豫嘗至此謬出偈云照文見心理心非文所籌須知鉤外魚不是魚外鉤論雖然者縱成前理也善吉須菩提也心不緣相無心也耳不循聲無聽也此中最要妙識其旨正思正聽隨聞隨得疏偈答下華嚴離世間品六十種境界無礙用第二云在佛境界而不捨魔境界無礙用亦如志公云魔從佛境出佛從魔境生二頭不相辨混雜國王城疏初句等者謂雖不離煩惱亦不即煩惱此實難言故云在乎妙悟則即妄而真非捨於妄爾齊觀者即空色無礙唯一真之境而已詳論齊有二意一空有無二二心境同如疏文似下齊物篇云天地與我並生而萬物與我為一等疏同我者下明唯同唯異皆失亦同亦異不出不在也亦應具有四句此中但明不出不在故唯約亦同亦異辨也同我者躡上與我同根等唯取同義事理相違者潛用法界觀理事無礙義中第九第十事理相非門相非即相違也不在者以涅槃是理理不在於有無事中今若下出唯同之過也過乃有二一不立有無二不在不成由同下亦彼第七第八事理相即門由相即故同也不出者涅槃之理即于有無所以不出今若下出唯異之過過亦有二一乖乎悟同二不出不成然古釋皆不如此豫詳下結文所以不出不在等理合前後連貫釋之斷無餘惑寶性論初卷法寶品云非有亦非無亦復非有無亦非即於彼亦復不離彼彼謂有無也疏初二句等者且權實一槩而論之由虗冥遍統所以玄也次二句下雖云照理意顯智玄故但云靈鑒有餘則焉猶有餘地矣疏承前者論之初句即本智證真次句即後智照俗玄根下既以根喻理故以拔喻證理無始者絶初際故非照下用生公義意云以相應之慧盡生相時似有其始生相既盡以始同本本來平等同一覺故何始何終故曰非照今有起信下證發心中之文具云又是菩薩功德成滿於色究竟處示一切世間最高大身謂以一念相應慧無明頓盡名一切種智餘文次疏疏略至下理應有至人二字或簡或失雙示不住者謂即住而不住也大疏釋無住涅槃云由雙住故能俱不住等疏初二句等者初即心境對說後顯其同同則無相無名廓然無寄如無知論以緣求智中廣示疏通敘等者以前云菩提之道不可圖度又云六境之內非涅槃之宅等語出下彼說卦中文彼謂窮其造化之理然後盡萬物之性能所以順至於天命今借其辭疏初四句等者謂一則違三三則又非究竟意以一為究竟三則小大差別非究竟非究竟則屬無常生滅升降下升降約人修進之說高下約法以明皆差別不一之義疏理無等者直據理以明之尚無有二何況有三所以究竟故本經二十二云聲聞緣覺所得涅槃等無差別疏無有二上者疑上是正字即法華方便品云十方佛土中唯有一乘法無二亦無三除佛方便說正法華偈云佛道有一未曾有二等疏引化城喻者以對論文可見火宅者彼第二略云有大長者財富無量其家廣大唯有一門有五百人止住其中堂閣朽故梁棟傾危周匝俱時歘然火起長者諸子在此宅中念言我雖於此安隱得出而諸子等無求出意長者語言此舍已燒宜時疾出而諸子等樂著嬉戲不肯信受爾時長者更設方便而告之言汝等所可玩好希有難得汝若不取後必憂悔如此種種羊車鹿車牛車今在門外可以遊戲爾時諸子聞父所說珍玩之物爭出火宅等釋曰三車如其次第即喻三乘火宅喻於三界故彼經云而為三界火宅所燒等疏三乘等者如諸子差別所樂各殊同免火宅之患無差別也所乘等者依大鈔釋也彼說三乘各有教理行果今略就教行釋之教者下法華方便品云依一佛乘分別說三詮示四諦之法名聲聞教詮示十二因緣之法名緣覺教詮示六度等法名菩薩教行者下略而言之則聲聞觀四諦之行緣覺十二因緣之行菩薩悲智雙施自他等運之行廣說如彼統其下即會三歸一之義廣釋如玄談疏習結等者結謂結餘即習氣纖細爾三乘下聲聞能盡煩惱現行不能盡習氣緣覺分斷習氣菩薩位滿種習皆盡疏初句等者謂一切衆生本有之性唯一無差夙熏之緣小大誠異論隨新熏故云不一謂曾於大乘法中熏習成大乘性識心樂欲亦唯大乘餘二例之雙照下以大乘雙斷二障故鑑二空之理為深二乘唯斷煩惱障鑑我空理故為淺也疏由識根等者亦承前以明差別在乎識根識根則小大不同智慮則淺深成異餘疏易見為力下智力有小大爾疏由前等者即難差中所引放光等放光三差在三乘智力之淺深非無為有三智論則如人趣理升降不同非涅槃有差也今引下約教則法隨人異分一成三約行則人自熏殊會三歸一也疏先定等者乃先分定人法道理然後從而難之疏初二句等者以法從人人既有三法亦定三以相即故又若下三乘之智有為也無為可知有無超然豈不滯於冥會哉疏以人等者釋一亦無三異則下如放光云皆以無為而有差別今既相即三乘從何而成差乎疏無為例之者謂至無為之彼岸即同無為之樂文擬下彼二十三云道者同於道得者同於得失者同於失同於道者道亦樂得之同於得者得亦樂得之同於失者失亦樂得之然通下尅其能得唯三乘之智智依於人故疏云人疏理雖等者用玄談分教之詞彼云理雖一味詮有淺深等亦如三獸渡河河雖是一不妨三獸所渡淺深各異疏初四句等者網喻三界三鳥雖各出網然力量有小大翱翔有遠近反責下責前一亦無三等也疏三乘等者諸蘊不一名衆和合兆形名生三乘在於界內即分段五蘊在於界外即變易五蘊雖勝劣有殊皆有漏生死未能轉成無漏五蘊相續心者即六粗中第二事識心也和合下即本識心也八地已去至地滿足方破此識如起信論云破和合識相滅相續心相等等覺已降者謂等覺菩薩生相未盡故根本無明未滅故未能證極一法界心皆名衆生也亦前下成立無為是同三乘是異以人下以人望法人恆三而法恆一也以法望人法自一而人自三疏承前等者難中一亦無三異亦無三今以喻顯法但顯三乘即無為一亦有三者在幽鑑之淺深不在於無為疏以未下以三乘之智勝劣有殊所斷惑障厚薄不同所證之理漸而未深由此階級故成三差誰云下有名折之如此無名之家不云異而不證有三異也皆約方便淨涅槃有此淺深非自性淨也論萬纍者惑業不一故名為萬滋益者春秋傳云無使滋蔓蔓難圖也今疏十一智者大品第六云法智比智他心智世智苦智集智滅智道智盡智無生智如實智為十一也大論二十三甚廣釋之今略引云法智者謂欲界四諦下無漏智比智者謂上二界智他心智者了知欲界色界現在他心等智世智者諸有漏智苦智者觀五蘊無常苦空等時所得無漏之智集滅道三各觀本諦所得無漏之智盡智者我見苦已斷集已盡證已修道已如是念時無漏智慧見明覺也無生智者謂我見苦已不復更見斷集已不復更斷盡證已不復更證修道已不復更修如是念時無漏智見明覺如實智者一切法總相別相如實證知無有礙等準論前之十智三乘共有如實一智唯佛獨有今論云爾者以大品十地中始自乾慧至辟支佛地則三乘共履而二乘至此為極故以盡智在二乘無學位第九超出三乘名菩薩地故說無生智在菩薩位不爾何故辟支佛外又立菩薩地乎如實一智果位圓現故論不說請詳疏中皆依智論釋之今云下然菩薩有二類一直學法空者二先小後大者據經中十地施設多約先小後大故論主以盡智為二乘無生為菩薩也盡智則盡見盡斷盡證盡修無生則印後不起此則二智非太異也故大鈔或說小乘十智除如實智又云盡無生智二乘車體等據此二乘亦有無生智但望菩薩淺深有異此中問意即大品通教中意以此通被三乘故菩薩亦藏教中傍化之大如玄談引天台智者四教云一三藏教此教明因緣生滅四真諦理正教小乘傍化菩薩等二者通教即無生四諦通者同也三乘同稟故此教菩薩斷證行相多同二乘故大鈔第四云丈六權智是牛車體又辨三乘同修而有八同謂教理智斷行位因果也三者別教即無量四諦四者圓教即無作四諦廣釋如彼問曰若爾何異二乘答四弘六度自利利他乃至登見五門合斷三十四心一座成正覺等所以別也疏放光等者三乘之智許有淺深究竟智體一而無殊如華嚴說十地證智即佛智故況智因惑起惑謝智亡空亦平等故經云爾因邊下釋智體無生顯空也疏是唯等者釋不體則已以三乘能證之智不相違背所證之理平等無二不證則置之而勿論證則惑可以頓盡理可以頓得云云在疏疏初二句等者三乘之人於見道前修五停心苦無常等諸觀正伏四諦分別兼伏九地俱生至世第一出心見道位初方斷分別至修道位起九無間以斷九地修惑九解脫道中漸漸證理如何頓也此依藏教五位釋之疏中依通教地位敘之此教亦有十地三人同歷一乾慧地大論七十五云聲聞人獨為涅槃故精勤持戒集諸善法雖有智慧不得禪定水不能得道故名乾慧則暖位已下也菩薩從初發心乃至未得順忍亦有此名二性地聲聞從暖位已去至世間第一法菩薩得順忍愛著諸法實相亦不生邪見得禪定水三八忍地聲聞從苦法忍乃至道比忍是十五心釋曰謂世第一出心緣下界上界四諦共一十六心初緣下界苦諦有苦法忍苦法智次緣上界苦比忍苦比智蓋以法智緣下比智緣上也亦云苦類忍等是下地類故如是至道比忍有十五心於中有八忍七智今從忍名故云八忍也菩薩則無生法忍入菩薩位釋曰仁王般若說無生忍七八九三地得之即了法無生亦無有滅如中論諸法不自生等如前具引今以義準之乃七地下品無生忍非二乘無生智也四見地即第十六心道比智見道入離生正位得須陀洹果菩薩則阿跋致此云不退然論釋阿跋致位寬有云初地已上乃至八地等五薄地聲聞或須陀洹或斯陀含斷欲六品俱生煩惱唯下三品在欲界之惑薄故菩薩過阿跋致乃至未成佛斷諸煩惱餘習亦薄六離欲地聲聞已盡欲界三品離欲界生得阿那含果菩薩離欲因緣故得五神通七已作地聲聞得盡智無生智得阿羅漢菩薩成就佛地八辟支佛地準大論翻為因緣覺先世種辟支佛道因緣今世得少因緣出家亦觀深因緣法成道故名辟支佛九菩薩地從乾慧地乃至離欲地如上說釋曰準大論前後菩薩道種智中遍修前之八地而不取證故已作地辟支地不指菩薩論又云歡喜地乃至法雲是菩薩地等十佛地即一切種智上依大論録之中間難者亦唯以他文釋之然皆略示而已疏古譯等者北涼三藏成八十卷疏中引用皆前後論文疏緣起等者二十七經云又未能渡十二因緣河猶如兔馬何以故不見佛性故十二因緣者一無明二行三識四名色五六入六觸七受八愛九取十有十一生十二老死皆前前為緣後後生起如是十二三法所攝謂無明及愛取是惑行及有支是業餘識等七支是苦十二因緣論頌云煩惱初八九業二及與十餘七說為苦三攝十二法然此十二三法互因三世輪轉該攝三界通於四生今略示三世因果之理令識大況謂過去無明為發業支現在愛取為潤業支招識等五支果復由現在愛取有支感未來生老死小乘三際兩重因果同此大乘或唯一重則前十支皆因後二支為果涅槃經中亦依三世明十二有支二十七經云十二因緣一切衆生等共有之亦內亦外何等十二過去煩惱名為無明過去業者則名為行現在世中初始受胎是名為識入胎五分四根未具名為名色具足四根未名觸時是名六入未別苦樂是名為觸染習一愛是名為受習近五欲是名為愛內外貪求是名為取為內外事起身口意業是名為有現在世識名未來生現在色名六入觸受名未來世老死也是名十二因緣略示如此津謂下如易之未濟既濟之義四諦者謂三界有漏色心皆逼迫性名苦諦即三苦八苦等三界分別俱生之惑增長生死名集諦斷障所顯無餘之果寂靜名滅諦總別念觀七覺八正乃至一切菩提分智於三界生死能出能離名為道諦於此四中前三世間因果後二出世因果所以果先因後者於世間中先示其苦令起厭心知苦諦之果乃集因所招令斷之也於出世中先示其滅寂靜永安無形患智勞之辛有無為無餘之樂令起欣心知滅諦之理由道而證令修之也古人云厭如是苦者斷如是集欣如是滅者修如是道故如來始於鹿野為五俱鄰等三轉此法蓋此意也涅槃下亦二十七具云善男子觀十二因緣智凡有四種乃至下智觀者得聲聞道中智觀者得緣覺道乃至上上智觀者得無上菩提等論語即八佾篇疏智慧第一者謂十大弟子各居一長如迦葉波頭陀目乾連神通須菩提解空迦旃延論義迦賓羅曆象阿㝹陀天眼羅睺羅密行等若準增一阿含第三卷中說弟子中各有其能略云寬仁博識如阿若俱鄰善能勸導如優陀夷恆飛虗空如善肘比丘威容庠序如馬勝比丘精進苦行坐禪入定如離日比丘廣立齊講如陀羅婆摩比丘安造房屋與招提僧如小陀羅婆摩比丘等故北山録云若五百無學各以其能求之咸居其甲而非乙也所引涅槃尚云都不識知況盡知乎故比山録云羅漢不識鹽義外黨諸俗深以為誚蓋出朽宅則生死凡夫邈哉何及語外事利解脫聖智或不如凡夫也然孔子域中之聖而能多知楚王過江得物而不識使問孔子子曰萍實也可食吾聞之童謠云楚王過江得萍實圓如斗赤如日剖而食之甜如蜜吳治塗山得專車之骨以問孔子子曰古防風氏之骨也大禹會諸侯於此防風後至禹戮之防風長四十尺也以孔子之多能尚有不知之事如中庸云夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉故列子湯問篇云孔子東遊見小兒辨日遠近一兒曰我以日始出時去人近而日中時去人遠何以知其然哉兒曰日初出也大如車蓋及日中則如盤盂此不為遠者小而近者大乎一兒曰我以日初出而遠日中時為近何者日初出則滄滄涼涼及其日中如探湯此不為近者熱而遠者涼乎孔子不能決兩小兒笑曰孰為子多知乎是知雖俗諦之事非一切種智不能盡知況出世下經意以俗諦為世間真諦為出世間引此兼證下文疏虗無等者老氏云致虗極守靜焉又云天地之間其猶槖籥乎虗而不屈動而愈出又云三十輻共音拱一轂當其無有車之用窺小視也躐踐也等謂等級不可越級而進階升者論語子張第十九云夫子之不可及也猶天之不可階而升也疏例引等者老氏四十八云為學日益為道日損損之又損以至於無損等如見前下即見道之前伏惑見道已去斷惑性宗位次廣則三賢十聖等如華嚴廣說略則信賢聖果如起信圓覺等說寄位下即賢首一乘義分齊中略云謂寄信等四位以斷滅等四相如起信論中信位斷滅賢位斷異聖位斷住果位斷生又有斷惑顯位如斷滅相而顯成信位等廣示如義分齊疏阿惟下古譯阿耨多羅三藐三菩提為此語淨名亦云無以日光等比螢火疏雖別下引經雖別然意中含有前來斷惑之動如下云等是也所以下明譏動之意但欲演其動寂無妨也事理下事動也理靜也清涼教迹云事理雙修依本智而求佛智疏方廣等者大乘經中此理攸同入地者初地已去至七地中智相既亡約本智合理身心無相謂言寂也此據本智證理而說非約分段變易而論然細細而求地地之中斷障證真亦分分寂滅今之論意不取如斯但取初地已上已得寂滅之靜如何至於寂滅之靜復存取捨之動乎疏勝分者然諸位之中當位之行名為自分進後之行名為勝分約增勝義邊以好尚是心心未寂滅涉求是身身亦未寂疏以此四者者即取捨損益之四文義下謂寂滅與好尚等異戾乖也即動靜之行相違疏南喻等者前引法身已上經文說寂智論說動也如疏可辨南為朱明者以五色布於五方則青為東方赤南白西黑北黃中以五行配之則東方甲乙木南方丙丁火西方庚辛金北方壬癸水中方戊己土故南為朱明北為玄冥又離卦屬南象亦明象也疏然稟下謂性宗修行必動靜無違止觀俱進事理雙修悲智平等如物不遷云不釋動以求靜等是也疏寂也下涉動名為為作也捨動名無為老氏亦云無為而無不為若云至理無為則非四相所遷名無為故無為名一亦隨義別疏次四句下以寂而常動故動與寂非一也動而常寂故動即是寂非異也後四句下冥真之心理行也涉俗之心事行也真俗齊照雙流也如儒童菩薩地地之中身心寂滅不失自分亦地地中進求後位不失勝分豈云靜而違動不復進求動而違靜不成寂滅故二行無違方成無住之修疏承前等者為前文每四句中成一對動靜之義可知疏據前下疏中會身心互舉推驗前文可見亦無餘義疏義如者然論之上下釋不有不無之名出義各殊今此釋經又成一義不若有心之有非有也不若無心之無非無也疏衆庶如孝經庶人章之庶人即蠢蠢無知泛常之流疏為斥等者聖無妄相故云不有靈照炳然故云不無疏初二句等者由忘絶故所以不有次二句由智存故所以契理而不無也恆沙下起信相大中文云所謂自體有大智慧光明義故遍照法界義故乃至具足如是過於恆沙不思議佛法隨理者又曰雖實有此功德義而無差別之相等同一味故唯一真如此義云何以無分別離分別相是故無二後二句下意云若心想未盡自有我相心想既滅功自無相清涼心要云寂寂運無涯之照此明寂而常動也如何積德之動以乖寂滅之靜乎疏答問等者文易不解但出前後之意本經二十一云如來涅槃非有為非無為等疏智論等者亦取意引之智論但云施頭目髓腦不云國財蓋舉重攝輕以內例外乃至者具云持戒忍辱禪定時在山林中身體乾枯云云在疏釋曰下以儒童在七地中見然燈佛依智論釋智相未盡者前文已釋三輪者一不念能施二不念受者三不念果報本經二十四略云不見施者受者及施果報等未或下謂七地已前已斷相續執取等心由智相未盡滅故三輪未得全空住相下金剛經云菩薩於法應無所住行於布施不住色布施不住聲香味觸法布施乃至云其福德不可思量如南西北方四維上下虗空等以知住相行施則著我人等相但為生天之福不得無漏之果施既下例餘行也謂凡行諸行一一皆須忘相三輪空寂方成出世之因故清涼云非真流之行無以契真施雖下儒童得無生忍而忍心施之方契真也故言不貴於多寡中理為奇施不貴於重輕契真成要鮮少也蹄涔下蹄跡有水曰名蹄涔施華緣者太子本起端應經略云定光佛興世有聖王名制勝治鉢頭摩大國我時為菩薩名曰儒童居山行禪聞世有佛心獨歡喜披鹿皮衣行欲入國會五百道士論說道義師徒皆悅各送銀錢一枚菩薩受之入城見民治道灑掃燒香即問行者答曰佛來入城菩薩大喜今得見佛當求我願王家婢名瞿夷過水瓶密持七莖青蓮華儒童即探銀盡用與之女貪銀寶與華五莖自留二枚回別意疑此何道士披鹿皮衣不惜銀寶追呼男子以誠告我菩薩云欲以上佛求所願也瞿夷曰善請寄二華亦獻於佛須臾佛至國王臣民拜謁散華華悉墮地菩薩見佛散五莖華皆止空中後散二華住佛肩上佛知至意因記之曰汝自是後九十一劫劫號為賢當得作佛名釋迦文菩薩受決疑解望止便逮清淨不起法忍放光下釋空行菩薩由修三空故名空行三空無相即成寂靜行五波羅即為動也疏賢劫下第三具云一切諸法無有與者而自逮得以是勸助救諸窮匱是曰布施成具下即成具光明定意經頌云不教令自行不為而過為等禪經下坐禪三昧法門經下卷具云是慈三昧略說有三種緣生緣法緣無緣諸未得道是名生緣阿羅漢辟支佛是名法緣諸佛世尊是名無緣思益即第一云以無所得故得以無所知故知所以者何我所得法不可見不可聞不可覺不可識等疏初二句等者責前有名動而違靜淨名下香積佛國品略云舍利弗心念日時欲至此諸菩薩當於何食乃至維摩詰化一菩薩往上方界度四十二恆河沙佛土國名衆香佛號香積與諸菩薩方共坐食到彼詞曰願得世尊所食之餘當於娑婆世界施作佛事於是香積如來以衆香鉢盛滿香飯與化菩薩與彼九百萬菩薩須臾至摩詰舍等至菩薩品云爾時衆香菩薩合掌白佛我等初見此土生下劣想今自悔責諸佛方便不可思議度衆生故現佛國異唯然世尊願賜少法還於彼士佛告諸菩薩有盡無盡解脫法汝等當學何謂為盡謂有為法何謂無盡謂無為法如菩薩者不盡有為不住無為何謂不盡有為謂不離大慈大捨大悲乃至教化衆生終不厭倦何謂菩薩不住無為謂修學空不以空為證修學無相無作不以無相無作為證等釋曰此明菩薩具修有為事行而無為之業修而不住事行動也理行靜也二行雙修動靜何違彼疏下即四注睿公之言慧心不明者謂不修事行寂而無照缺一切種智疏隨一為源者謂涅槃為源有不因修成之過衆生為源涅槃有始成之非如下具示疏反顯等者謂乘是車乘故疏云控御以明反流向源衆生乃三乘之本三乘屬因修涅槃即果證疏有始等者大經第二十八云善男子涅槃無因而體是果何以故無生滅故乃至云無始終故等豈不相違疏有不因等者出過細研有名之意謂涅槃之理因修而生即大經本無今有之義權小之見也未知此理是了因所了非作因所作故本經二十一云一者作因二者了因如陶師輪繩是名作因如燈燭等照暗中物是名了因善男子大涅槃者不從作因而有唯從了因了因者所謂三十七助道法六波羅蜜是名了因是知三乘之修但修了因之智以盡集諦之惑惑盡之時涅槃自顯豈涅槃之性修而後成哉疏生公云者依大鈔引即涅槃疏序釋大涅槃之義稱常下續云常必滅纍復曰般泥洹爾寂照鑑公引涅槃心鏡鈔云生公造涅槃疏五十餘紙唯解磐根錯節難解之處於是經宗大開奧藏稱為關中疏演此下謂方便淨即三乘之智智有淨惑之能為方便涅槃智性本有亦自性涅槃以理智必相融攝故疏聖人等者謂三乘聖智皆有冥契之功今言至人唯目如來以三乘冥理未極未免有象如來冥極可謂無象心雖下釋無象而成象也謂聖人以方便淨契合自性清淨涅槃此性舉體為一切法也故論云萬物無非我造疏會證等者謂聖人了乎萬物本空即是自性由證萬法以成聖人如華嚴梵行品云知一切法即心自性等正與此義相符大經二十五云佛告生名婆羅門言我今此身即是涅槃楞嚴下第二卷文清涼云一念相應一念佛念念相應念念佛石頭者即唐代南嶽石頭山希遷禪師也無己者即無我也靡無也然即萬物而為心故云無所不己誰云下言無自他之別無非己之法身也杜順和尚法身頌云懷州牛喫禾益州馬腹脹天下覔醫人灸猪左膞上亦以法身體同無自他之別故圓鑑智也即寂之照故云虗照體玄者謂即心之性即萬象而非萬象故云體玄自現者以萬象本虗法身自現爾評曰諸祖拈示依禪者斷例不容更注恐轉落情識瞎人智眼不如忘言體會內悟為得今且向流通會上略犯脣吻令人速入準林間録永明師於天台韶國師會中負柴至門忽一枝墮地聞乃悟之說偈云撲落非他物縱橫不是塵山河及大地全露法王身非他物者以身非外來發己聞性聲性聞性無二性也南北曰縱東西曰橫言舉聲之相即我聞性非是聲塵後二句意云此聲既爾山河萬象無非我之法身疏初二句等者如華嚴宗不證大方廣何成佛華嚴若非佛華嚴亦不證大方廣人法相即一體無外疏初文等者大品第九具云不應色中求般若波羅蜜多亦不應離色求般若波羅蜜等放光第九云須菩提告拘翼言般若波羅蜜亦不於五陰中求亦不離五陰中求等涅槃即二十七次云佛者即是佛性何以故一切諸佛以此為性故以緣起即如故云見法即是見佛如智非異皆證前云聖不異理也疏前引等者示論文前後血脉也此文極難故疏細示之清涼下玄談文性宗斷證之理實異他宗如大疏云照惑無本即是智體又云照體無自即是證如鈔云若以智會如非真如矣冥真下即教迹敘體大也佛用下即宋高僧傳說兩種語一蘇漫多謂泛爾平語言辭也二底彥多謂典正言辭佛說多依蘇漫多意在於義不依於文又被一切故若底彥多非中下所能解故方便下論主觀機設教中華之人尚文賤朴文質彬彬始為可觀故此論文為千古希唱高人達士寶而玩之逗猶通也封文下謂封滯於文不見其義之流謂濫同儒道之理贊寧者即宋初時僧作高僧傳三十卷彼傳第三譯經科謂云若用外書須招彼謗今觀房融潤文於楞嚴僧肇徵引而造論宜當此誚等評曰房融文士不當用書而潤經肇公通人何妨徵引而作論以經是佛言論是自語也慧達者即陳朝僧嘗序此論彼序云世諺云肇之所作固並成實真諦地論通宗莊老所資孟浪之說此實巨蠱之言欺誣亡歿街巷陋音未之足拾孟浪者孟大也浪虗也愚瑣者愚謂愚昧瑣謂細瑣立言下即論主立論之本意不害下不以辭故害意也故今下謂古釋見文似莊老多以莊老之義釋之如豫則多出彼意然後依內教釋之雅言者毛詩有大雅小雅雅正也文雅也令知下論主本假儒者之辭以示佛理非即文而雷同於老莊也疏顯前等者此義前後多出不復更示一念下亦心要文依圓教者彼經無古今之名有三世之說獨李長者合論云十世古今始終不離於當念謂古今即三世也二相即入者乃十玄門中十世隔法異成門依此以辨時世圓融亦有二門相即乃諸法自在門相入乃一多相容不同門但十門之異通異體相即相入十世隔法唯同體相即相入也本末下本即涅槃之理末即萬物之事窮本即萬法而皆涅槃極末即涅槃而恆萬法情非情下杜順和尚頌云情與無情共一體處處皆同真法界染謂染緣起非染可知疏二文互影者前文但言不離諸法不言無邊後文但言無邊不言不離故云互影疏如智等者心境雙亡名曰玄寂玄寂無名故假寄無極之名以顯玄寂之理故疏云非別等疏三乘下意謂三乘等人先證涅槃名進後證涅槃名退故非先後已證則冥同故疏淨名下即第二觀衆生品云時維摩詰室有一天女見諸大人聞所說法便現其身即以天華散諸菩薩大弟子上華至諸菩薩即皆墮落至大弟子便著不墮一切弟子神力去華不能令去爾時天問舍利弗何故去華答曰此華不如法是以去之天曰勿謂此華不如法所以者何是華無所分別仁者自生分別想耳若於佛法出家有所分別為不如法若無所分別是則如法觀諸菩薩華不著者以斷一切分別想故譬如人畏時非人得其便如是弟子畏生死故色聲香味觸得其便云云舍利弗言天止此室其已久如答曰我止此室如耆年解脫舍利弗言止此久邪天曰耆年解脫亦何如久舍利弗默然不答天曰如何耆舊大智而默答曰解脫者無所言說故吾於是不知所云天曰言說文字皆解脫相等釋曰天女之意以時無實體妄心所現久非定久近非定近如夢所度何長何短故示云如耆年解脫時相本虗即解脫故身子又謂解脫是久遠之法以法取時而云久也故天女云云評曰準淨名疏天女即居士之家神所在皆隨主人之高下摩詰既聖人示迹故家神亦菩薩權形此經本抑小揚大故身子亦示其言屈令慕小者得速返也疏九折等者總敘折意也所以下敘一論之始終也謂始示涅槃之體次乃一折一演判決簡擇令人識悟有餘無餘權應假號大般涅槃無名無相非有非無不出不在而妙道存焉三乘之人同修同歸直由智力淺深乃成三異非謂無為三於三乘次明三乘斷證之道重惑不可頓祛無為不可頓證要損之又損之而方淨益之又益之以漸圓而積德涉求不違寂身心寂滅不違動動靜不違於妙行則有無不係於靈臺三乘建入證之深因一理獲圓成之妙果心境冥會終始如如進之弗先退之弗後至此究竟乃問得之之方存陰盡陰等故今折之也疏初二句下謂五陰即衆生之體陰外無別衆生故論云極於五陰之內疏順經等者以前引經得涅槃者五陰都盡故也有內者謂三有之內也疏存陰等者以陰存故有能得之人故為順理又却違經以聖教是定量故違經談理令誰服從一應下亦依假設也陰外何有衆生之性以經云五陰都盡而得涅槃故今論云果若有得則衆生之性不止於五陰此則順理違教二恐違下順教出理也盡粗下亦隨理而釋之無別教證謂有名之意必要有能得之人得所得涅槃五陰苟盡誰為能得故疏云爾此意下明折演之意折意是三乘權漸必存能得所得演意即一乘終實顯本來即是能所雙亡也疏前演下明承前起不存者不存能得所得之相方為玄得下論云然則衆生非衆生誰為得之者等疏忘得下以涅槃但是修顯之果故疏云從此而顯疏法真等者法謂倣法謂涅槃之真離一切相智法倣真亦忘得相妙契其真同於真也依僞下即妄想心也妄想之心能所兩分智若有得即同妄想疏有得者下亦情見未盡不能契證故云有得無得者下謂情盡見除全忘得相與理契合故云得也二十三經云若使如來計有得相是則諸佛不得涅槃以無得故名得涅槃等心經下具云無智亦無得即能所雙亡也由雙亡故三世諸佛依無得之般若得阿耨菩提等疏言隨等者法謂諸法之體謂一切言說皆隨所說之法而生起既談下釋論中若即涅槃等涅槃下釋論中誰獨非涅槃等起信下具云一切諸法唯依妄念而有差別若離心念則無一切境界之相是故一切法從本已來離言說相離名字相離心緣相畢竟平等無有變異不可破壞唯是一心故名真如又云言真如者亦無有相謂言說之極因言遣言此真如體無有可遣以一切法悉皆真故亦無可立以一切法悉皆如故釋曰以真如即涅槃故所以引證故出現品云佛子菩薩摩訶薩欲知如來大涅槃者當須了知根本自性如真如涅槃如來涅槃亦如是等此則自性清淨涅槃也疏融冶故等者疏意間而釋之由融冶二儀所以天人一理由蕩滌萬有所以一異同源約見聞下謂色性聲性即自性故不見不聞者即前云五目不覩其容耳聽不聞其響疏如來非衆生者真妄異故非非衆生者性無二故如來涅槃者亦經正文疏生死等者圓覺經金剛藏略云譬如幻翳妄見空華乃至云生死涅槃同於起滅等釋曰謂生死無實隨緣起滅如翳眼見空華也陽𦦨者謂春月陽氣發生渴鹿認之為水楞伽等經皆說一云地中水影有時而現實亦無水疏取前論大患永滅超度四流以釋之以是自性清淨涅槃故生死如空華四流如陽𦦨若方便淨者空華雖虗亦須除翳陽𦦨雖假亦須滅想故圭山云佛本是而勤修惑元無而須斷以衆生處幻夢之鄉受虗妄生死生死雖虗依然流浪煩惱元假法爾燒然豈其獨恃天真便云了道全忘進習即謂還源故起信云若人雖念寶性不以方便種種磨治終無得淨疏此以義等者豫遍尋放光並無成段之文如論者故知論主合集經義而引之薩婆若即一切智準此經義論云從有得邪從無得邪等四句皆答云不後文第五云不逮正覺猶云都無得邪亦答云不也文少左右旨中無違疏無得等者冥忘得也通同也謂方便淨同自性也釋論中誰獨不然若云新得何時失之故楞伽下魏譯云大慧一闡提者有二種一者焚燒一切善根謂謗菩薩藏二者憐愍一切衆生即大悲菩薩大慧問言此二何者常不入涅槃佛告大慧謂大悲菩薩何以故以能善知一切諸法本來涅槃是故不入涅槃非捨一切善根闡提等如是下即圓覺如來責剛藏三問之言疏此有等者據論意約境說得約心說知約形言見約聲言聞疏意約玄得之意以辨之故云皆下句辨得也謂得知得見得聞也絶域者非世間出世間故如何云獨建三有之外哉故前表云排方外之談是也非俗者無分別心非緣慮也大象大音文借老氏不存相下即性而見見見為普眼不循聲下不循聲而聞聞聞則普聞是故下即莊子天道篇如前引離朱乃古之善視者見秋毫於百步之外觀音下即楞嚴第五說二十五聖圓通觀音菩薩於耳門得之經略云返聞聞自性聞復翳根除等慈覺禪師頌云返聞聞處不聞聞無限勞生入普門瀑落斷崖聽不盡鳥啼猿笑又黃昏疏顯涅槃下疏中敘論之前後血脉可知出現下謂出現品中示涅槃用大如經云佛子如來住於無量無礙究竟法界虗空界真如法性無生無滅及以妄際為諸衆生隨時示現本願持故無有休息不捨一切衆生一切剎一切法大疏釋曰初住實際故不住生死後不捨衆生故不住涅槃由雙住故能俱不住前即大智後即大悲大悲般若常所輔翼所以名為無住涅槃又云自性涅槃衆生等有二乘無學容有前三唯佛世尊獨言具四故就無住總以結之即安住涅槃建大事也今此論中四種二種涅槃之理隨義發明或前或後末後依證得之體起廣大之用有餘無餘既皆應生之用則無住之義亦含具也可思至哉下美論成立之巧也清涼謂論主宗出現之經而作此論細揣其旨良有所以故今疏鈔皆引大疏之義斷之三語者即上語中語後語記録下北山録宗師議篇云或說什門四聖即生也肇也融也睿也生公十四科等玩味無斁若驪龍之戲玄珠也今古下謂肇公獨絶無人繼者方之寶藏相去實遠斷非法師所作後世依倣而託之者也名德下準裴公休清凉述大師所好之法云肇公四絶論融才解英絶學博外內尤能聞持故有題之昂昂道融師精識不可挫日誦十萬言經目不再過僧睿謙虗內敏學與時競深為秦主賞識稱是四海標領也清涼好之尚且如此其他可知囊括者易坤卦六四云括囊無咎無譽彼意謂人之慎言不出如囊括其口也老書者七十三中文有本云疏而不失謂人之善惡上天必以吉凶應之而無漏失即尚書云福善禍淫是也吾經亦云諸天善神記人罪福毛髮無遺疏八師下準支謙所譯亦名邪旬邪旬問佛所事何師佛言然有八師即不殺等五戒及老病死經意覩老病死持前五戒故通為八與人天八戒有殊疏九折等者通示大義有名以三乘自宗之理折之無名以一乘自宗之義通之有名疑滯通則三乘之路開一實之理顯也論主用法華之意以成其辭但言三乘之路開者影取一實自顯之義捨小者令捨小乘執有餘無餘為實卑生死尊涅槃等之狹見引權下準大疏釋法華略有二義一破小顯大即是會二歸一如方便品云唯此一事實餘二則非真等二會權歸實即是會三歸一彼經云諸求三乘人若有疑惑者佛當為斷除等則昔大乘亦有權義今論兼之如大疏廣說無名下謂無名所演一乘之義契於中道一實之理故真也有名所折依名取相乃至有得皆僞也分文下瑤疏釋此段為總結四論三乘之路開指此論三乘三位開也真僞之途辨彼云結物不遷論及不真空論物不遷世諦故僞不真空第一義諦故真賢聖之道存彼云結無知論以般若是賢聖所修之因故無名之致顯彼云結涅槃也雲庵疏云三乘之路開結難差等四章真僞之途辨結論初七章賢聖之存結詰漸等四章也無名之致顯結窮源等四章也若大鈔意即但結此論亦無分文之義
